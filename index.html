<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Radio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text-main);
            overflow: hidden;
        }

        /* زر التبرع - أزرق بشكل افتراضي */
        .donate-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: #0070ba;
            border: 1px solid #0070ba;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4);
        }

        .donate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 112, 186, 0.6);
            background: #005ea6;
        }

        .app-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px 25px 25px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .logo-frame {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: #1e293b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--accent);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2), inset 0 0 0 4px rgba(255, 255, 255, 0.05);
            overflow: hidden;
            transition: transform 0.5s ease;
        }

        .logo-frame.playing {
            animation: spinDisc 8s linear infinite;
        }

        @keyframes spinDisc {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .station-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        .station-meta {
            font-size: 13px;
            font-weight: 300;
            color: var(--text-sub);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover:not(:disabled) {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .ctrl-btn.play-btn {
            width: 65px;
            height: 65px;
            background: var(--accent);
            color: #fff;
            font-size: 24px;
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }

        .ctrl-btn.play-btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        audio {
            display: none;
        }

        /* ملاحظة تغيير الدولة */
        .footer-note {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 300;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        .footer-note i {
            margin-right: 6px;
            color: var(--accent);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            z-index: 999;
            color: var(--text-sub);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn" title="Support Us">
        <i class="fab fa-paypal"></i>
    </a>

    <div id="loading">
        <div class="spinner"></div>
        <span>LOADING STATIONS...</span>
    </div>

    <div class="app-card">
        <div class="logo-frame" id="stationLogo">
            <i class="fas fa-music"></i>
        </div>

        <div class="station-name" id="stationTitle">Select Country</div>
        <div class="station-meta" id="stationSub">Use Bot Command</div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>

        <!-- الملاحظة السفلية -->
        <div class="footer-note">
            <i class="fas fa-exchange-alt"></i> Change country via bot chat
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const loading = document.getElementById('loading');
        const logo = document.getElementById('stationLogo');
        const title = document.getElementById('stationTitle');
        const sub = document.getElementById('stationSub');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('audioPlayer');

        const params = new URLSearchParams(window.location.search);
        const countryName = params.get('name') || '';

        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let hasValid = false;
        let errorCount = 0; // عداد الأخطاء لمنع التشنج
        
        // التحقق مما إذا كان المستخدم يستمع للراديو قبل تغيير الدولة
        let autoPlayRequested = localStorage.getItem('radio_is_playing') === 'true';

        async function fetchRadio(name) {
            if (!name) throw new Error('No country');
            const url = `https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(name)}?order=votes&reverse=true`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Fetch failed');
            const data = await resp.json();
            return data.filter(s => s.url_resolved || s.url);
        }

        function setEmpty(msg) {
            title.textContent = msg || 'Select Country';
            sub.textContent = 'Use Bot Command';
            logo.innerHTML = '<i class="fas fa-music"></i>';
            audio.src = '';
            playBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            hasValid = false;
            logo.classList.remove('playing');
            if (isPlaying) { audio.pause(); isPlaying = false; playIcon.className = 'fas fa-play'; }
        }

        function loadStation(index) {
            if (!stations.length || !hasValid) { setEmpty(); return; }
            const item = stations[index];
            
            title.textContent = item.name || 'Unknown Station';
            sub.textContent = `Station ${index + 1} of ${stations.length}`;
            
            if (item.favicon) {
                const img = new Image();
                img.src = item.favicon;
                img.alt = "logo";
                img.onload = function() {
                    logo.innerHTML = '';
                    logo.appendChild(img);
                };
                img.onerror = function() {
                    logo.innerHTML = '<i class="fas fa-music"></i>';
                };
            } else {
                logo.innerHTML = '<i class="fas fa-music"></i>';
            }
            
            audio.src = item.url_resolved || item.url || '';
            audio.load();
            
            playBtn.disabled = false;
            prevBtn.disabled = false;
            nextBtn.disabled = false;
            
            // التشغيل التلقائي إذا كان يستمع مسبقاً أو ضغط على زر التشغيل
            if (isPlaying || autoPlayRequested) {
                playAudio();
            }
        }

        // دالة التشغيل مع معالجة الأخطاء بصمت
        function playAudio() {
            audio.play().then(() => {
                isPlaying = true;
                autoPlayRequested = false;
                errorCount = 0; // تصفير عداد الأخطاء عند نجاح التشغيل
                playIcon.className = 'fas fa-pause';
                logo.classList.add('playing');
                localStorage.setItem('radio_is_playing', 'true'); // حفظ حالة التشغيل
            }).catch(() => {
                handlePlayError();
            });
        }

        // دالة تخطي المحطات المعطلة تلقائياً
        function handlePlayError() {
            errorCount++;
            // محاولة التخطي لـ 15 محطة كحد أقصى لتجنب تشنج المتصفح إذا كانت كل المحطات معطلة
            if (errorCount < stations.length && errorCount < 15) {
                setTimeout(nextStation, 400); // تخطي بعد جزء من الثانية
            } else {
                isPlaying = false;
                playIcon.className = 'fas fa-play';
                logo.classList.remove('playing');
                title.textContent = 'Stations Unavailable';
                sub.textContent = 'Try another country';
                localStorage.setItem('radio_is_playing', 'false');
            }
        }

        function togglePlay() {
            if (!hasValid || !audio.src) return;
            if (audio.paused) {
                playAudio();
            } else {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
                logo.classList.remove('playing');
                localStorage.setItem('radio_is_playing', 'false'); // حفظ حالة الإيقاف
            }
        }

        function nextStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        }
        
        function prevStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        }

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextStation);
        prevBtn.addEventListener('click', prevStation);
        
        audio.addEventListener('pause', () => { 
            isPlaying = false; 
            playIcon.className = 'fas fa-play'; 
            logo.classList.remove('playing');
        });
        
        audio.addEventListener('play', () => { 
            isPlaying = true; 
            playIcon.className = 'fas fa-pause'; 
            logo.classList.add('playing');
        });

        // إذا انقطع البث فجأة أثناء الاستماع، تخطى للمحطة التالية
        audio.addEventListener('error', () => {
            if(isPlaying || autoPlayRequested) {
                handlePlayError();
            }
        });

        async function init() {
            const name = countryName.trim();
            if (!name) {
                setEmpty('No Country Selected');
                loading.style.display = 'none';
                return;
            }
            
            try {
                const data = await fetchRadio(name);
                if (data.length) {
                    stations = data;
                    hasValid = true;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    const fallbackUrl = `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?order=votes&reverse=true`;
                    const fallbackResp = await fetch(fallbackUrl);
                    const fallbackData = await fallbackResp.json();
                    const validFallback = fallbackData.filter(s => s.url_resolved || s.url);
                    
                    if(validFallback.length) {
                        stations = validFallback;
                        hasValid = true;
                        currentIndex = 0;
                        loadStation(0);
                    } else {
                        setEmpty('No Stations Found');
                        sub.textContent = 'Try another country';
                    }
                }
            } catch (e) {
                setEmpty('Connection Error');
                sub.textContent = 'Please try again later';
            }
            loading.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
