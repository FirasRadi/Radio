<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Radio · Wave</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0b0d15;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* unique gradient glow */
        .bg-glow {
            position: fixed;
            border-radius: 50%;
            filter: blur(130px);
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow.g1 {
            top: -20%;
            left: -20%;
            width: 400px;
            height: 400px;
            background: rgba(168, 85, 247, 0.10);
        }
        .bg-glow.g2 {
            bottom: -20%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: rgba(236, 72, 153, 0.08);
        }

        /* main card – different layout: horizontal orientation */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            background: rgba(16, 20, 34, 0.75);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8);
            padding: 24px 22px 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* header with country and actions */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header .brand {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 600;
            color: #94a3b8;
        }
        .header .brand i {
            color: #a78bfa;
            font-size: 16px;
        }
        .header .brand .country-tag {
            background: rgba(255, 255, 255, 0.04);
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #f1f5f9;
            font-weight: 700;
            font-size: 13px;
        }
        .header-actions {
            display: flex;
            gap: 6px;
        }
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            color: #94a3b8;
            font-size: 15px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #f1f5f9;
        }
        .icon-btn.pulse {
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.2);
            animation: pulse-ring 2s infinite;
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
            70% { box-shadow: 0 0 0 8px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        /* main station area – horizontal layout */
        .station-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 4px 0;
        }
        .artwork {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.06);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.4s;
            position: relative;
        }
        .artwork img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #0f131c;
        }
        .artwork .fallback {
            font-size: 30px;
            color: #475569;
        }
        .artwork.playing {
            border-color: #a78bfa;
            box-shadow: 0 0 30px rgba(167, 139, 250, 0.15);
        }
        .artwork.playing::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #a78bfa;
            border-right-color: #a78bfa;
            opacity: 0.4;
            animation: spin-slow 4s linear infinite;
        }
        @keyframes spin-slow {
            100% { transform: rotate(360deg); }
        }

        .station-info {
            flex: 1;
            min-width: 0;
        }
        .station-info .name {
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .station-info .meta {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
            font-weight: 500;
        }

        /* timer badges – placed under station row */
        .badge-row {
            display: flex;
            gap: 12px;
            padding-left: 96px;
            min-height: 24px;
            margin-top: -6px;
        }
        .badge {
            display: none;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            padding: 1px 12px;
            border-radius: 30px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #94a3b8;
            font-family: 'Inter', monospace;
        }
        .badge.show {
            display: flex;
        }
        .badge.sleep {
            color: #818cf8;
            border-color: rgba(129, 140, 248, 0.2);
        }
        .badge.start {
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.2);
        }
        .badge i {
            font-size: 10px;
        }

        /* controls – volume and transport */
        .controls-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
        }
        .ctrl-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active {
            transform: scale(0.92);
        }
        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.07);
        }

        .play-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.25);
            flex-shrink: 0;
        }
        .play-btn:active {
            transform: scale(0.92);
        }
        .play-btn i {
            margin-left: 2px;
        }

        .vol-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
        }
        .vol-wrap i {
            color: #475569;
            font-size: 13px;
        }
        .vol-wrap input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            transition: 0.2s;
        }
        .vol-wrap input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #a78bfa;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        }
        .vol-wrap input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #a78bfa;
            cursor: pointer;
            border: none;
        }

        /* bottom tools: fav + timer + paypal support text */
        .tools-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 12px;
            margin-top: 4px;
        }
        .tools-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .fav-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #94a3b8;
            padding: 4px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
        }
        .fav-btn.active {
            color: #f87171;
        }
        .fav-btn.active i {
            animation: heart-pop 0.3s ease;
        }
        @keyframes heart-pop {
            50% { transform: scale(1.25); }
        }

        .timer-trigger {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            transition: 0.2s;
        }
        .timer-trigger:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #f1f5f9;
        }
        .timer-trigger i {
            font-size: 14px;
        }
        .timer-trigger.active {
            color: #fbbf24;
        }

        .support-text {
            font-size: 11px;
            color: #475569;
            font-weight: 500;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .support-text a {
            color: #94a3b8;
            text-decoration: none;
            border-bottom: 1px dashed #475569;
            transition: 0.2s;
        }
        .support-text a:hover {
            color: #f1f5f9;
            border-color: #94a3b8;
        }
        .support-text i {
            font-size: 12px;
            color: #0070ba;
        }

        /* footer note – country change in bot */
        .footer-note {
            text-align: center;
            font-size: 10px;
            color: #f87171;
            font-weight: 500;
            opacity: 0.5;
            padding-top: 6px;
            border-top: 1px solid rgba(248, 113, 113, 0.05);
            letter-spacing: 0.2px;
        }
        .footer-note i {
            margin-right: 4px;
            font-size: 9px;
        }

        /* ─── Timer Drawer (completely new design) ─── */
        .drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: 0.35s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .drawer-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .drawer {
            width: 100%;
            max-width: 480px;
            background: #141a2b;
            border-radius: 32px 32px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 22px 32px;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .drawer-overlay.open .drawer {
            transform: translateY(0);
        }
        .drawer-handle {
            width: 48px;
            height: 4px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.06);
            margin: 0 auto 4px;
            cursor: pointer;
        }
        .drawer-title {
            text-align: center;
            font-weight: 700;
            font-size: 17px;
            color: #f1f5f9;
            letter-spacing: 0.3px;
        }

        /* new timer picker: circular style with plus/minus */
        .timer-picker {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            padding: 10px 0;
        }
        .picker-unit {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .picker-unit .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #475569;
            font-weight: 700;
        }
        .picker-unit .value {
            font-size: 34px;
            font-weight: 700;
            font-family: 'Inter', monospace;
            color: #f1f5f9;
            background: rgba(255, 255, 255, 0.03);
            padding: 4px 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-width: 60px;
            text-align: center;
        }
        .picker-unit .steps {
            display: flex;
            gap: 6px;
            margin-top: 2px;
        }
        .picker-unit .steps button {
            width: 36px;
            height: 30px;
            border-radius: 10px;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .picker-unit .steps button:active {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(0.92);
        }

        /* mode toggle (start/stop) as pill buttons */
        .mode-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mode-toggle .mode-btn {
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            color: #94a3b8;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mode-toggle .mode-btn.active-sleep {
            background: rgba(129, 140, 248, 0.15);
            border-color: rgba(129, 140, 248, 0.3);
            color: #818cf8;
        }
        .mode-toggle .mode-btn.active-start {
            background: rgba(52, 211, 153, 0.12);
            border-color: rgba(52, 211, 153, 0.25);
            color: #34d399;
        }

        .drawer-actions {
            display: flex;
            gap: 10px;
        }
        .drawer-actions .btn {
            flex: 1;
            padding: 14px 0;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }
        .drawer-actions .btn:active {
            transform: scale(0.97);
        }
        .drawer-actions .btn-abort {
            background: rgba(248, 113, 113, 0.08);
            color: #f87171;
            flex: 0.4;
            display: none;
        }
        .drawer-actions .btn-abort.show {
            display: block;
        }
        .drawer-actions .btn-arm {
            background: rgba(167, 139, 250, 0.12);
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.15);
        }
        .drawer-actions .btn-arm.start-mode {
            background: rgba(52, 211, 153, 0.12);
            color: #34d399;
            border-color: rgba(52, 211, 153, 0.15);
        }

        /* ─── Favorites modal ─── */
        .fav-modal {
            position: fixed;
            inset: 0;
            background: #0b0d15;
            z-index: 105;
            padding: 24px 20px 30px;
            transform: translateX(100%);
            transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            display: flex;
            flex-direction: column;
        }
        .fav-modal.open {
            transform: translateX(0);
        }
        .fav-modal .fm-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 18px;
        }
        .fav-modal .fm-head button {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 22px;
            cursor: pointer;
        }
        .fav-list {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            margin-right: -4px;
            padding-right: 4px;
        }
        .fav-list::-webkit-scrollbar {
            width: 4px;
        }
        .fav-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }
        .fav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: 0.2s;
            cursor: pointer;
        }
        .fav-item:active {
            transform: scale(0.98);
        }
        .fav-item .info {
            flex: 1;
            overflow: hidden;
        }
        .fav-item .info .name {
            font-weight: 600;
            font-size: 14px;
            color: #f1f5f9;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .fav-item .info .sub {
            font-size: 11px;
            color: #475569;
            margin-top: 1px;
        }
        .fav-item .del {
            background: none;
            border: none;
            color: #475569;
            font-size: 16px;
            padding: 0 6px;
            cursor: pointer;
            transition: 0.2s;
        }
        .fav-item .del:hover {
            color: #f87171;
        }
        .fav-empty {
            color: #475569;
            text-align: center;
            padding: 40px 0;
            font-size: 14px;
        }

        /* loading */
        #loader {
            position: fixed;
            inset: 0;
            background: #0b0d15;
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }
        #loader .spinner {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.06);
            border-top-color: #a78bfa;
            animation: spin 0.9s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        #loader .status {
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            letter-spacing: 0.4px;
        }

        /* responsive */
        @media (max-width: 420px) {
            .card { padding: 16px; border-radius: 28px; }
            .artwork { width: 64px; height: 64px; }
            .station-info .name { font-size: 15px; }
            .play-btn { width: 54px; height: 54px; font-size: 18px; }
            .ctrl-btn { width: 38px; height: 38px; font-size: 14px; }
            .badge-row { padding-left: 76px; }
            .picker-unit .value { font-size: 28px; min-width: 48px; }
            .mode-toggle .mode-btn { padding: 8px 16px; font-size: 12px; }
            .tools-bar { flex-wrap: wrap; gap: 8px; }
            .support-text { font-size: 10px; }
        }
        @media (max-width: 380px) {
            .artwork { width: 56px; height: 56px; }
            .station-info .name { font-size: 13px; }
            .badge-row { padding-left: 68px; }
            .controls-row { gap: 6px; }
            .vol-wrap input[type="range"] { max-width: 80px; }
        }
    </style>
</head>
<body>

    <!-- loading -->
    <div id="loader">
        <div class="spinner"></div>
        <div class="status" id="loadStatus">Connecting…</div>
    </div>

    <!-- glow -->
    <div class="bg-glow g1"></div>
    <div class="bg-glow g2"></div>

    <!-- ─── main card ─── -->
    <div class="card">

        <!-- header -->
        <div class="header">
            <div class="brand">
                <i class="fa-solid fa-waveform"></i>
                Radio <span class="country-tag" id="countryDisplay">—</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="favListBtn"><i class="fa-regular fa-heart"></i></button>
                <button class="icon-btn" id="timerToggle"><i class="fa-regular fa-clock"></i></button>
            </div>
        </div>

        <!-- station row -->
        <div class="station-row">
            <div class="artwork" id="artwork">
                <span class="fallback"><i class="fa-solid fa-signal"></i></span>
            </div>
            <div class="station-info">
                <div class="name" id="stationName">Select station</div>
                <div class="meta" id="stationMeta">Waiting for signal…</div>
            </div>
        </div>

        <!-- timer badges -->
        <div class="badge-row">
            <div class="badge sleep" id="badgeSleep"><i class="fa-regular fa-moon"></i> <span id="badgeSleepVal">--</span></div>
            <div class="badge start" id="badgeStart"><i class="fa-regular fa-bell"></i> <span id="badgeStartVal">--</span></div>
        </div>

        <!-- controls -->
        <div class="controls-row">
            <button class="ctrl-btn" id="prevBtn"><i class="fa-solid fa-backward-step"></i></button>
            <button class="play-btn" id="playBtn"><i class="fa-solid fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn"><i class="fa-solid fa-forward-step"></i></button>
            <div class="vol-wrap">
                <i class="fa-solid fa-volume-low"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.75" />
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </div>

        <!-- tools: fav, timer, support -->
        <div class="tools-bar">
            <div class="tools-left">
                <button class="fav-btn" id="favBtn"><i class="fa-regular fa-heart"></i></button>
                <button class="timer-trigger" id="timerBtn"><i class="fa-regular fa-clock"></i> <span id="timerLabel">Timer</span></button>
            </div>
            <div class="support-text">
                <i class="fa-brands fa-paypal"></i>
                <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank">Support bot developer</a>
            </div>
        </div>

        <!-- footer note -->
        <div class="footer-note">
            <i class="fa-regular fa-circle-info"></i> Change country in bot chat
        </div>
    </div>

    <!-- ─── Timer Drawer (new) ─── -->
    <div class="drawer-overlay" id="drawerOverlay">
        <div class="drawer">
            <div class="drawer-handle" id="drawerHandle"></div>
            <div class="drawer-title">⏱ Timer Scheduler</div>

            <!-- mode toggle -->
            <div class="mode-toggle">
                <button class="mode-btn active-sleep" data-mode="sleep" id="modeSleep"><i class="fa-regular fa-moon"></i> Stop</button>
                <button class="mode-btn" data-mode="start" id="modeStart"><i class="fa-regular fa-bell"></i> Start</button>
            </div>

            <!-- picker -->
            <div class="timer-picker">
                <div class="picker-unit">
                    <span class="label">Hrs</span>
                    <div class="value" id="p_h">0</div>
                    <div class="steps">
                        <button data-field="h" data-dir="up"><i class="fa-solid fa-chevron-up"></i></button>
                        <button data-field="h" data-dir="down"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                </div>
                <div class="picker-unit">
                    <span class="label">Min</span>
                    <div class="value" id="p_m">05</div>
                    <div class="steps">
                        <button data-field="m" data-dir="up"><i class="fa-solid fa-chevron-up"></i></button>
                        <button data-field="m" data-dir="down"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                </div>
                <div class="picker-unit">
                    <span class="label">Sec</span>
                    <div class="value" id="p_s">00</div>
                    <div class="steps">
                        <button data-field="s" data-dir="up"><i class="fa-solid fa-chevron-up"></i></button>
                        <button data-field="s" data-dir="down"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                </div>
            </div>

            <div class="drawer-actions">
                <button class="btn btn-abort" id="abortTimerBtn"><i class="fa-regular fa-trash-can"></i> Abort</button>
                <button class="btn btn-arm" id="armTimerBtn"><i class="fa-regular fa-check"></i> Arm</button>
            </div>
        </div>
    </div>

    <!-- ─── Favorites Modal ─── -->
    <div class="fav-modal" id="favModal">
        <div class="fm-head">
            <span><i class="fa-regular fa-heart" style="color:#f87171;margin-right:6px;"></i> Favorites</span>
            <button id="closeFavBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <!-- audio -->
    <audio id="audioPlayer" preload="none"></audio>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready();
            tg.expand(); }

        /* ─── helpers ─── */
        const $ = id => document.getElementById(id);
        const qs = (sel, ctx) => (ctx || document).querySelector(sel);
        const qsa = (sel, ctx) => (ctx || document).querySelectorAll(sel);
        const fmt = n => String(n).padStart(2, '0');

        /* ─── get country ─── */
        const urlParams = new URLSearchParams(window.location.search);
        let rawCountry = (tg?.initDataUnsafe?.start_param || urlParams.get('country') || urlParams.get('name') || '').trim();
        rawCountry = rawCountry.replace(/_/g, ' ').replace(/^\s+|\s+$/g, '');
        const countryDisplay = rawCountry || 'World';
        $('countryDisplay').textContent = countryDisplay;

        /* ─── state ─── */
        const state = {
            stations: [],
            idx: 0,
            playing: false,
            custom: false,
            customStation: null,
            favs: JSON.parse(localStorage.getItem('premium_fav_rads')) || [],
            failCount: 0,
            sleepEnd: null,
            sleepTO: null,
            startEnd: null,
            startTO: null,
            tickInterval: null,
            mode: 'sleep',
            vals: { h: 0, m: 5, s: 0 },
        };

        /* ─── DOM refs ─── */
        const audio = $('audioPlayer');
        const artwork = $('artwork');
        const stationName = $('stationName');
        const stationMeta = $('stationMeta');
        const playBtn = $('playBtn');
        const playIcon = $('playIcon');
        const prevBtn = $('prevBtn');
        const nextBtn = $('nextBtn');
        const volumeSlider = $('volumeSlider');
        const favBtn = $('favBtn');
        const favListBtn = $('favListBtn');
        const favModal = $('favModal');
        const favList = $('favList');
        const closeFavBtn = $('closeFavBtn');
        const timerToggle = $('timerToggle');
        const timerBtn = $('timerBtn');
        const timerLabel = $('timerLabel');
        const drawerOverlay = $('drawerOverlay');
        const drawerHandle = $('drawerHandle');
        const modeSleep = $('modeSleep');
        const modeStart = $('modeStart');
        const p_h = $('p_h');
        const p_m = $('p_m');
        const p_s = $('p_s');
        const armTimerBtn = $('armTimerBtn');
        const abortTimerBtn = $('abortTimerBtn');
        const badgeSleep = $('badgeSleep');
        const badgeStart = $('badgeStart');
        const badgeSleepVal = $('badgeSleepVal');
        const badgeStartVal = $('badgeStartVal');
        const loader = $('loader');
        const loadStatus = $('loadStatus');

        /* ─── volume ─── */
        volumeSlider.addEventListener('input', () => { audio.volume = parseFloat(volumeSlider.value); });
        audio.volume = 0.75;

        /* ─── render station ─── */
        function renderStation(s, isCustom) {
            if (!s) {
                stationName.textContent = 'No signal';
                stationMeta.textContent = 'Try another source';
                artwork.innerHTML = '<span class="fallback"><i class="fa-solid fa-signal"></i></span>';
                artwork.classList.remove('playing');
                return;
            }
            stationName.textContent = s.name || 'Unknown';
            stationMeta.textContent = isCustom ? 'Saved' : (state.stations.length ? `${state.idx + 1} · ${s.country || 'World'}` :
                '');
            const img = s.favicon || s.img || '';
            if (img) {
                const imgEl = document.createElement('img');
                imgEl.src = img;
                imgEl.onerror = () => { artwork.innerHTML = '<span class="fallback"><i class="fa-solid fa-tower-broadcast"></i></span>'; };
                imgEl.onload = () => { artwork.innerHTML = '';
                    artwork.appendChild(imgEl); };
                artwork.innerHTML = '';
                artwork.appendChild(imgEl);
            } else {
                artwork.innerHTML = '<span class="fallback"><i class="fa-solid fa-tower-broadcast"></i></span>';
            }
            updateFavHeart(s);
        }

        function updatePlayingState(playing) {
            state.playing = playing;
            if (playing) {
                playIcon.className = 'fa-solid fa-pause';
                artwork.classList.add('playing');
            } else {
                playIcon.className = 'fa-solid fa-play';
                artwork.classList.remove('playing');
            }
        }

        /* ─── fav heart ─── */
        function getStationId(s) { return s.stationuuid || s.id || s.url; }

        function isFav(s) {
            if (!s) return false;
            const id = getStationId(s);
            return state.favs.some(f => f.id === id);
        }

        function updateFavHeart(s) {
            if (!s) { favBtn.classList.remove('active');
                favBtn.innerHTML = '<i class="fa-regular fa-heart"></i>'; return; }
            if (isFav(s)) {
                favBtn.classList.add('active');
                favBtn.innerHTML = '<i class="fa-solid fa-heart"></i>';
            } else {
                favBtn.classList.remove('active');
                favBtn.innerHTML = '<i class="fa-regular fa-heart"></i>';
            }
        }

        function toggleFav() {
            const s = state.custom ? state.customStation : (state.stations[state.idx] || null);
            if (!s) return;
            const id = getStationId(s);
            const existing = state.favs.findIndex(f => f.id === id);
            if (existing > -1) {
                state.favs.splice(existing, 1);
            } else {
                state.favs.push({
                    id: id,
                    name: s.name || 'Station',
                    url: s.url_resolved || s.url || '',
                    img: s.favicon || s.img || '',
                    country: s.country || ''
                });
            }
            localStorage.setItem('premium_fav_rads', JSON.stringify(state.favs));
            updateFavHeart(s);
            renderFavList();
        }

        favBtn.addEventListener('click', toggleFav);

        /* ─── play / pause ─── */
        function play() {
            if (!audio.src) return;
            const p = audio.play();
            if (p) {
                p.then(() => {
                    state.failCount = 0;
                    updatePlayingState(true);
                }).catch(e => {
                    if (e.name !== 'AbortError') {
                        updatePlayingState(false);
                        handlePlayError();
                    }
                });
            }
        }

        function pause() {
            audio.pause();
            updatePlayingState(false);
        }

        function togglePlay() {
            if (state.playing) { pause(); } else { play(); }
        }

        playBtn.addEventListener('click', togglePlay);

        function handlePlayError() {
            stationMeta.textContent = 'Stream unavailable, skipping…';
            state.failCount++;
            if (!state.custom && state.stations.length > 1 && state.failCount < 8) {
                setTimeout(() => {
                    state.idx = (state.idx + 1) % state.stations.length;
                    loadStation(state.idx);
                }, 1500);
            } else {
                stationMeta.textContent = 'Unable to play this stream';
                updatePlayingState(false);
            }
        }

        audio.addEventListener('error', () => {
            if (state.playing) {
                handlePlayError();
            }
        });

        /* ─── load station ─── */
        function loadStation(index) {
            if (!state.stations.length) return;
            const s = state.stations[index];
            if (!s) return;
            state.custom = false;
            state.idx = index;
            const url = s.url_resolved || s.url || '';
            if (!url) { stationMeta.textContent = 'Invalid stream URL';
                return; }
            audio.src = url;
            audio.load();
            renderStation(s, false);
            if (state.playing) {
                setTimeout(play, 200);
            }
            state.failCount = 0;
        }

        function loadCustomStation(obj) {
            if (!obj || !obj.url) return;
            state.custom = true;
            state.customStation = obj;
            audio.src = obj.url;
            audio.load();
            renderStation(obj, true);
            if (state.playing) {
                setTimeout(play, 200);
            }
            state.failCount = 0;
        }

        /* ─── next / prev ─── */
        nextBtn.addEventListener('click', () => {
            if (state.custom) {
                if (state.stations.length) { state.custom = false;
                    loadStation(0); }
                return;
            }
            if (!state.stations.length) return;
            state.idx = (state.idx + 1) % state.stations.length;
            loadStation(state.idx);
        });

        prevBtn.addEventListener('click', () => {
            if (state.custom) {
                if (state.stations.length) { state.custom = false;
                    loadStation(0); }
                return;
            }
            if (!state.stations.length) return;
            state.idx = (state.idx - 1 + state.stations.length) % state.stations.length;
            loadStation(state.idx);
        });

        /* ─── fetch stations ─── */
        async function fetchStations(country) {
            if (!country || country.length < 2) {
                loadStatus.textContent = 'No country specified';
                return [];
            }
            const encoded = encodeURIComponent(country.toLowerCase());
            try {
                loadStatus.textContent = 'Searching stations…';
                let res = await fetch(
                    `https://de1.api.radio-browser.info/json/stations/bycountry/${encoded}?order=votes&reverse=true&limit=100`
                    );
                if (!res.ok) throw new Error('API error');
                let data = await res.json();
                if (!data || !data.length) {
                    loadStatus.textContent = 'Expanding search…';
                    res = await fetch(
                        `https://de1.api.radio-browser.info/json/stations/search?name=${encoded}&order=votes&reverse=true&limit=100`
                        );
                    if (!res.ok) throw new Error('API error');
                    data = await res.json();
                }
                data = data.filter(s => (s.url_resolved || s.url || '').startsWith('https://'));
                return data;
            } catch (e) {
                loadStatus.textContent = 'Search failed';
                return [];
            }
        }

        /* ─── init ─── */
        async function init() {
            if (!rawCountry || rawCountry.length < 2) {
                stationName.textContent = 'Set country in bot';
                stationMeta.textContent = 'Send /start with a country name';
                loader.style.display = 'none';
                return;
            }
            const data = await fetchStations(rawCountry);
            loader.style.display = 'none';
            if (data && data.length) {
                state.stations = data;
                loadStation(0);
            } else {
                stationName.textContent = 'No stations found';
                stationMeta.textContent = 'Try a different country in the bot chat';
                artwork.innerHTML = '<span class="fallback"><i class="fa-regular fa-circle-xmark" style="color:#475569;font-size:32px;"></i></span>';
            }
        }

        /* ─── Favorites list ─── */
        function renderFavList() {
            favList.innerHTML = '';
            if (!state.favs.length) {
                favList.innerHTML = '<li class="fav-empty">❤️ Heart a station to save it here</li>';
                return;
            }
            state.favs.forEach((f, i) => {
                const li = document.createElement('li');
                li.className = 'fav-item';
                li.innerHTML = `
              <div class="info">
                <div class="name">${f.name || 'Station'}</div>
                <div class="sub">${f.country || 'Saved'}</div>
              </div>
              <button class="del" data-idx="${i}"><i class="fa-regular fa-trash-can"></i></button>
            `;
                li.querySelector('.del').addEventListener('click', (e) => {
                    e.stopPropagation();
                    state.favs.splice(i, 1);
                    localStorage.setItem('premium_fav_rads', JSON.stringify(state.favs));
                    renderFavList();
                    const cur = state.custom ? state.customStation : (state.stations[state.idx] || null);
                    if (cur) updateFavHeart(cur);
                });
                li.addEventListener('click', () => {
                    const found = state.stations.find(s => getStationId(s) === f.id);
                    if (found) {
                        favModal.classList.remove('open');
                        state.custom = false;
                        const idx = state.stations.indexOf(found);
                        if (idx > -1) { state.idx = idx;
                            loadStation(idx); }
                    } else if (f.url) {
                        favModal.classList.remove('open');
                        loadCustomStation({ name: f.name, url: f.url, img: f.img, country: f.country });
                    }
                });
                favList.appendChild(li);
            });
        }

        favListBtn.addEventListener('click', () => { renderFavList();
            favModal.classList.add('open'); });
        closeFavBtn.addEventListener('click', () => { favModal.classList.remove('open'); });
        favModal.addEventListener('click', (e) => { if (e.target === favModal) favModal.classList.remove('open'); });

        /* ─── Timer Drawer (new) ─── */
        const DRAWER_LIMITS = { h: 23, m: 59, s: 59 };

        function updatePickerDisplay() {
            p_h.textContent = state.vals.h;
            p_m.textContent = fmt(state.vals.m);
            p_s.textContent = fmt(state.vals.s);
        }

        function adjustPicker(field, dir) {
            const step = dir === 'up' ? 1 : -1;
            state.vals[field] += step;
            if (state.vals[field] < 0) state.vals[field] = DRAWER_LIMITS[field];
            if (state.vals[field] > DRAWER_LIMITS[field]) state.vals[field] = 0;
            updatePickerDisplay();
        }

        document.querySelectorAll('.timer-picker .steps button').forEach(btn => {
            const field = btn.dataset.field;
            const dir = btn.dataset.dir;
            const clickFn = () => adjustPicker(field, dir);
            btn.addEventListener('click', clickFn);
            let hold = null;
            const startHold = () => { hold = setInterval(() => adjustPicker(field, dir), 150); };
            const stopHold = () => { if (hold) { clearInterval(hold);
                    hold = null; } };
            btn.addEventListener('mousedown', startHold);
            btn.addEventListener('mouseup', stopHold);
            btn.addEventListener('mouseleave', stopHold);
            btn.addEventListener('touchstart', (e) => { e.preventDefault();
                startHold(); }, { passive: false });
            btn.addEventListener('touchend', stopHold);
            btn.addEventListener('touchcancel', stopHold);
        });

        function setMode(mode) {
            state.mode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active-sleep', 'active-start'));
            if (mode === 'sleep') {
                modeSleep.classList.add('active-sleep');
                armTimerBtn.className = 'btn btn-arm';
                armTimerBtn.innerHTML = '<i class="fa-regular fa-moon"></i> Arm Stop';
            } else {
                modeStart.classList.add('active-start');
                armTimerBtn.className = 'btn btn-arm start-mode';
                armTimerBtn.innerHTML = '<i class="fa-regular fa-bell"></i> Arm Start';
            }
            const active = mode === 'sleep' ? state.sleepEnd : state.startEnd;
            abortTimerBtn.classList.toggle('show', !!active);
        }

        modeSleep.addEventListener('click', () => setMode('sleep'));
        modeStart.addEventListener('click', () => setMode('start'));

        function openDrawer() {
            setMode(state.mode);
            updatePickerDisplay();
            drawerOverlay.classList.add('open');
        }

        function closeDrawer() { drawerOverlay.classList.remove('open'); }

        timerToggle.addEventListener('click', openDrawer);
        timerBtn.addEventListener('click', openDrawer);
        drawerHandle.addEventListener('click', closeDrawer);
        drawerOverlay.addEventListener('click', (e) => { if (e.target === drawerOverlay) closeDrawer(); });

        armTimerBtn.addEventListener('click', () => {
            const totalSec = (state.vals.h * 3600) + (state.vals.m * 60) + state.vals.s;
            if (totalSec <= 0) { closeDrawer(); return; }
            const ms = totalSec * 1000;
            const now = Date.now();

            if (state.mode === 'sleep') {
                if (state.sleepTO) { clearTimeout(state.sleepTO);
                    state.sleepTO = null; }
                state.sleepEnd = now + ms;
                state.sleepTO = setTimeout(() => {
                    state.sleepEnd = null;
                    state.sleepTO = null;
                    fadeOutAndStop();
                    updateBadges();
                    abortTimerBtn.classList.remove('show');
                }, ms);
            } else {
                if (state.startTO) { clearTimeout(state.startTO);
                    state.startTO = null; }
                state.startEnd = now + ms;
                state.startTO = setTimeout(() => {
                    state.startEnd = null;
                    state.startTO = null;
                    if (!state.playing) {
                        if (state.stations.length) {
                            if (state.custom && state.customStation) {
                                play();
                            } else {
                                loadStation(state.idx);
                                setTimeout(play, 300);
                            }
                        }
                    }
                    updateBadges();
                    abortTimerBtn.classList.remove('show');
                }, ms);
            }
            abortTimerBtn.classList.add('show');
            updateBadges();
            closeDrawer();
            startTick();
        });

        abortTimerBtn.addEventListener('click', () => {
            if (state.mode === 'sleep') {
                if (state.sleepTO) { clearTimeout(state.sleepTO);
                    state.sleepTO = null; }
                state.sleepEnd = null;
            } else {
                if (state.startTO) { clearTimeout(state.startTO);
                    state.startTO = null; }
                state.startEnd = null;
            }
            abortTimerBtn.classList.remove('show');
            updateBadges();
        });

        function fadeOutAndStop() {
            if (!state.playing) return;
            const vol = audio.volume;
            const steps = 12;
            let step = 0;
            const interval = setInterval(() => {
                step++;
                audio.volume = vol * (1 - step / steps);
                if (step >= steps) {
                    clearInterval(interval);
                    pause();
                    audio.volume = parseFloat(volumeSlider.value);
                }
            }, 70);
        }

        /* ─── badge updates ─── */
        function updateBadges() {
            const now = Date.now();
            let hasActive = false;

            if (state.sleepEnd && state.sleepEnd > now) {
                const rem = Math.floor((state.sleepEnd - now) / 1000);
                badgeSleep.classList.add('show');
                badgeSleepVal.textContent = rem > 3600 ? `${Math.floor(rem/3600)}:${fmt(Math.floor((rem%3600)/60))}:${fmt(rem%60)}` :
                    `${fmt(Math.floor(rem/60))}:${fmt(rem%60)}`;
                hasActive = true;
            } else {
                badgeSleep.classList.remove('show');
                if (state.sleepEnd && state.sleepEnd <= now) { state.sleepEnd = null;
                    state.sleepTO = null; }
            }

            if (state.startEnd && state.startEnd > now) {
                const rem = Math.floor((state.startEnd - now) / 1000);
                badgeStart.classList.add('show');
                badgeStartVal.textContent = rem > 3600 ? `${Math.floor(rem/3600)}:${fmt(Math.floor((rem%3600)/60))}:${fmt(rem%60)}` :
                    `${fmt(Math.floor(rem/60))}:${fmt(rem%60)}`;
                hasActive = true;
            } else {
                badgeStart.classList.remove('show');
                if (state.startEnd && state.startEnd <= now) { state.startEnd = null;
                    state.startTO = null; }
            }

            timerToggle.classList.toggle('pulse', hasActive);
            timerBtn.classList.toggle('active', hasActive);
            timerLabel.textContent = hasActive ? 'Timer active' : 'Timer';
            if (!hasActive) {
                abortTimerBtn.classList.remove('show');
            } else {
                const active = state.mode === 'sleep' ? state.sleepEnd : state.startEnd;
                abortTimerBtn.classList.toggle('show', !!active && active > now);
            }
        }

        function startTick() {
            if (state.tickInterval) return;
            state.tickInterval = setInterval(() => {
                updateBadges();
                const now = Date.now();
                if (state.sleepEnd && state.sleepEnd <= now) {
                    if (state.sleepTO) { clearTimeout(state.sleepTO);
                        state.sleepTO = null; }
                    state.sleepEnd = null;
                    fadeOutAndStop();
                    updateBadges();
                }
                if (state.startEnd && state.startEnd <= now) {
                    if (state.startTO) { clearTimeout(state.startTO);
                        state.startTO = null; }
                    state.startEnd = null;
                    if (!state.playing && state.stations.length) {
                        if (state.custom && state.customStation) {
                            play();
                        } else {
                            loadStation(state.idx);
                            setTimeout(play, 300);
                        }
                    }
                    updateBadges();
                }
            }, 1000);
        }

        window.addEventListener('beforeunload', () => {
            if (state.tickInterval) { clearInterval(state.tickInterval);
                state.tickInterval = null; }
        });

        /* ─── start ─── */
        updatePickerDisplay();
        setMode('sleep');
        init();

        /* ─── keyboard ─── */
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') { e.preventDefault();
                togglePlay(); }
            if (e.code === 'ArrowRight') { nextBtn.click(); }
            if (e.code === 'ArrowLeft') { prevBtn.click(); }
        });
    </script>
</body>
</html>
