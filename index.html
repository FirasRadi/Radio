<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Radio Player Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #090c14;
            --surface: rgba(18, 25, 43, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #4ade80;  /* لمسة لونية خضراء ذكية وعصرية */
            --primary-g: #16a34a;
            --blue: #3b82f6;
            --blue-g: #1d4ed8;
            --text-1: #ffffff;
            --text-2: #8b9bb4;
            --font: 'Plus Jakarta Sans', sans-serif;
            --font-mono: 'Roboto Mono', monospace;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font); user-select: none; }
        
        body { background: var(--bg); color: var(--text-1); min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; padding: 20px; }
        
        /* تأثيرات الخلفية الذكية لتصميم معاصر */
        .ambient-glow { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; }
        .ambient-glow.p1 { top: -20%; left: -20%; width: 300px; height: 300px; background: rgba(59, 130, 246, 0.3); }
        .ambient-glow.p2 { bottom: -20%; right: -20%; width: 400px; height: 400px; background: rgba(74, 222, 128, 0.2); }

        /* حاوية الراديو المركزية (زجاج متطور) */
        .premium-card {
            background: var(--surface); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            width: 100%; max-width: 440px; border-radius: 36px; padding: 25px; 
            border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative; z-index: 10; display: flex; flex-direction: column; gap: 20px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .icon-btn { background: rgba(255, 255, 255, 0.05); color: var(--text-2); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid transparent; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-1); transform: translateY(-2px); }
        
        /* مؤشر الدورة الدموية/الحياة للمؤقت المخفي (يبقيك في الطمأنينة) */
        .icon-btn.is-active-pulse { color: #f59e0b; border-color: rgba(245, 158, 11, 0.4); animation: warningPulse 1.8s infinite cubic-bezier(0.66, 0, 0, 1); }
        @keyframes warningPulse { 100% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } }

        /* منطقة الهوية وتصوير الإذاعة */
        .station-core { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 15px 0; }
        
        .disc-wrapper { width: 140px; height: 140px; border-radius: 50%; background: #000; padding: 6px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); transition: 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); position: relative;}
        .disc-wrapper::before { content: ''; position: absolute; inset: -4px; border-radius: 50%; background: conic-gradient(transparent, transparent, var(--text-2), transparent); opacity: 0.2; transition: 0.4s; pointer-events: none;}
        .disc-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: contain; background: #fff; z-index: 2; position: relative;}
        .disc-wrapper .fallback-icon { display: flex; align-items: center; justify-content: center; width:100%; height: 100%; font-size: 50px; color: var(--text-2); background: rgba(255,255,255,0.05); border-radius: 50%;}
        
        .disc-wrapper.is-playing { box-shadow: 0 10px 40px rgba(74, 222, 128, 0.3); transform: scale(1.03); }
        .disc-wrapper.is-playing::before { opacity: 1; background: conic-gradient(from 0deg, var(--primary), var(--blue), var(--primary)); animation: spinFluid 4s linear infinite; }
        
        @keyframes spinFluid { 100% { transform: rotate(360deg); } }

        .s-title { font-size: 22px; font-weight: 800; line-height: 1.2; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 5px; }
        .s-meta { font-size: 13px; color: var(--text-2); letter-spacing: 0.5px; display: flex; justify-content: center; align-items: center; gap: 8px;}
        
        /* مؤشر مصغر عند عمل العداد ليذكر المستخدم بالتوقيت في الواجهة الأساسية */
        .live-timer-tags { display: flex; gap: 8px; justify-content: center; min-height: 25px; margin-top: -10px;}
        .tg-badge { background: rgba(0,0,0,0.4); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-family: var(--font-mono); border: 1px solid var(--border); display: none; align-items: center; gap: 5px;}
        .tg-badge.vis { display: flex; }
        .badge-sleep { color: var(--blue); border-color: rgba(59, 130, 246, 0.3); }
        .badge-start { color: var(--primary); border-color: rgba(74, 222, 128, 0.3); }

        /* منطقة الصوت والتفاعل السريع */
        .actions-tray { display: flex; align-items: center; gap: 15px; padding: 15px; background: rgba(0,0,0,0.25); border-radius: 24px; }
        .fav-trigger { font-size: 24px; color: var(--text-2); background: none; border: none; padding: 5px 10px; cursor: pointer; transition: 0.2s; }
        .fav-trigger.active { color: var(--danger); animation: thump 0.4s; }
        @keyframes thump { 50% { transform: scale(1.3); } }

        .slider-cnt { flex: 1; display: flex; align-items: center; gap: 12px; }
        .slider-cnt i { color: var(--text-2); font-size: 14px;}
        .vol-slide { -webkit-appearance: none; flex: 1; height: 5px; background: var(--border); border-radius: 5px; outline: none; }
        .vol-slide::-webkit-slider-thumb { -webkit-appearance: none; width: 15px; height: 15px; background: #fff; border-radius: 50%; box-shadow: 0 2px 10px rgba(255,255,255,0.4); cursor: pointer; }

        /* مفاتيح اللعب والتوجيه السفلية - حديثة كبرى */
        .main-controls { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 10px 0 5px; }
        .seek-btn { font-size: 20px; color: var(--text-1); background: rgba(255,255,255,0.05); width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; transition: 0.3s; }
        .seek-btn:hover { background: rgba(255,255,255,0.1); }
        .play-hub { 
            width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--text-1), #cbd5e1); color: var(--bg); font-size: 26px; display: flex; justify-content: center; align-items: center; border: none; box-shadow: 0 10px 30px rgba(255, 255, 255, 0.2); cursor: pointer; transition: transform 0.2s, background 0.4s; 
        }
        .play-hub:active { transform: scale(0.95); }
        .play-hub.state-play i.fa-play { padding-left: 3px; }

        /* --------- أدوات ضبط التوقيت باللمس الشاملة 21st Century Style --------- */
        /* تصميم "الدرج الذكي" بالأسفل للصعود */
        .timer-drawer-bg { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(8px); z-index: 100; opacity: 0; visibility: hidden; transition: 0.4s ease; pointer-events: none;}
        .timer-drawer-bg.open { opacity: 1; visibility: visible; pointer-events: all; }
        
        .timer-drawer {
            position: absolute; bottom: 0; left: 0; width: 100%; border-radius: 40px 40px 0 0; background: #0f1523; border-top: 1px solid var(--border); padding: 25px; padding-bottom: 50px; transform: translateY(100%); transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 -20px 50px rgba(0,0,0,0.5);
        }
        .timer-drawer-bg.open .timer-drawer { transform: translateY(0); }
        .drawer-bar { width: 50px; height: 6px; border-radius: 6px; background: rgba(255,255,255,0.1); margin: 0 auto 10px; cursor: pointer;}
        
        .t-tab-heads { display: flex; gap: 10px; border: 1px solid var(--border); padding: 5px; border-radius: 20px; background: rgba(0,0,0,0.3);}
        .t-tab { flex: 1; text-align: center; padding: 12px 10px; border-radius: 16px; color: var(--text-2); font-weight: 700; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .t-tab.act[data-m="sleep"] { background: var(--blue); color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .t-tab.act[data-m="start"] { background: var(--primary); color: var(--bg); box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3); }

        /* منطقة آلة الزمن بدون كتابة Touch Time Machine UI */
        .picker-area { margin: 20px 0; background: rgba(0,0,0,0.3); padding: 20px 10px; border-radius: 28px; }
        
        /* التصميم المرن للأعمدة (أيام، ساعات، دقايق، ثواني) */
        .tm-wheels { display: flex; align-items: stretch; justify-content: center; gap: 10px; }
        .tm-wheel { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; flex: 1;}
        .whl-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-2); font-weight: 800;}
        .whl-btn { background: rgba(255,255,255,0.06); border: none; color: #fff; font-size: 14px; width: 45px; height: 36px; border-radius: 12px; cursor: pointer; user-select: none; transition: 0.1s;}
        .whl-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.9); }
        .whl-val { font-family: var(--font-mono); font-size: 24px; font-weight: 700; color: #fff; line-height: 1; margin: 5px 0;}
        
        .t-apply-row { display: flex; gap: 15px; margin-top: 5px; }
        .btn-exe { flex: 1; border: none; border-radius: 18px; padding: 16px; font-size: 15px; font-weight: 700; color: #fff; cursor: pointer; background: var(--border); transition: 0.2s;}
        .btn-exe.sleep-c { background: var(--blue); box-shadow: 0 4px 20px rgba(59,130,246,0.3);}
        .btn-exe.start-c { background: var(--primary); color: var(--bg); box-shadow: 0 4px 20px rgba(74,222,128,0.3);}
        .btn-cancel { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        
        /* -------- Favorite Full Modal ----------- */
        .f-modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 105; padding: 25px; transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.2, 1, 0.3, 1); display: flex; flex-direction: column;
        }
        .f-modal.open { transform: translateX(0); }
        .fm-header { display: flex; align-items: center; justify-content: space-between; font-size: 22px; font-weight: 700; margin-bottom: 25px; }
        .list-wrap { list-style: none; overflow-y: auto; flex: 1; margin-right: -10px; padding-right: 10px; }
        .list-wrap::-webkit-scrollbar { width: 5px;} .list-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        .li-box {
            display: flex; justify-content: space-between; align-items: center; background: var(--surface);
            padding: 18px 20px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); transition: 0.2s;
        }
        .li-box:active { transform: scale(0.97); border-color: rgba(255,255,255,0.2);}
        .li-body { display: flex; flex-direction: column; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1;}
        .li-b-title { font-weight: 700; font-size: 15px;}
        .li-b-sub { font-size: 12px; color: var(--text-2); margin-top: 3px; font-family: var(--font-mono);}
        .li-rem { background: none; border: none; font-size: 20px; color: var(--text-2); padding-left: 20px; transition: 0.2s;}
        .li-rem:hover { color: var(--danger);}

        /* PayPal Area Original Styling Preserved entirely */
        .paypal-wrapper { position: fixed; bottom: 20px; right: 20px; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .paypal-svg { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .paypal-svg text { font-size: 9.5px; fill: var(--text-2); font-family: monospace; letter-spacing: 0.5px; font-weight: bold; }
        .donate-btn { width: 50px; height: 50px; background: #0070ba; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; text-decoration: none; box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4); position: relative; z-index: 2; transition: 0.3s; }
        .donate-btn:active { transform: scale(0.9); }

        #ldng { position: fixed; inset:0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;}
        .ring { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--text-1); border-radius: 50%; width: 50px; height: 50px; animation: lS 1s linear infinite;}
        @keyframes lS { 100% {transform: rotate(360deg);}}

    </style>
</head>
<body>

    <div id="ldng">
        <div class="ring"></div>
        <div style="font-weight:700; letter-spacing:2px; font-size:12px; color:var(--text-2);" id="txtStt">LOCATING REGION</div>
    </div>

    <!-- Glowing Background effect for ultra-modern UI -->
    <div class="ambient-glow p1"></div>
    <div class="ambient-glow p2"></div>

    <div class="premium-card">
        <header class="header">
            <button class="icon-btn" id="iFavTop"><i class="fa-solid fa-list-ul"></i></button>
            <div class="s-meta" style="font-size: 11px; font-weight: 700; background:rgba(0,0,0,0.3); padding:4px 12px; border-radius:20px;">
                <i class="fa-solid fa-globe" style="color:var(--text-2)"></i>
                <span id="qCtry" style="text-transform: uppercase;">Country Name</span>
            </div>
            <!-- أيقونة التايمر المخفية والنبضية المتقدمة -->
            <button class="icon-btn" id="toglTimrs"><i class="fa-solid fa-clock-rotate-left"></i></button>
        </header>

        <!-- مصغرات الحاضنة عند تفعيل العداد لتريح وتخبر المستخدم بنجاح تشغيل أرقامه المعقدة -->
        <div class="live-timer-tags">
            <div class="tg-badge badge-sleep" id="tsTag"><i class="fa-solid fa-moon"></i><span id="tsNum">00:00:00</span></div>
            <div class="tg-badge badge-start" id="taTag"><i class="fa-solid fa-power-off"></i><span id="taNum">00:00:00</span></div>
        </div>

        <main class="station-core">
            <div class="disc-wrapper" id="dscIco"><div class="fallback-icon"><i class="fa-solid fa-broadcast-tower"></i></div></div>
            <div style="width: 100%; display: flex; flex-direction:column; margin-top:5px;">
                <div class="s-title" id="dTitle" dir="auto">Waiting Source...</div>
                <div class="s-meta" id="dSub">Searching stations...</div>
            </div>
        </main>

        <div class="actions-tray">
            <button class="fav-trigger" id="heartB"><i class="fa-regular fa-heart"></i></button>
            <div class="slider-cnt">
                <i class="fa-solid fa-volume-off"></i>
                <input type="range" class="vol-slide" id="vSlide" min="0" max="1" step="0.05" value="0.75" />
                <i class="fa-solid fa-volume-high"></i>
            </div>
        </div>

        <footer class="main-controls">
            <button class="seek-btn" id="bDn"><i class="fa-solid fa-backward-step"></i></button>
            <button class="play-hub state-play" id="bPg"><i class="fa-solid fa-play" id="pHIc"></i></button>
            <button class="seek-btn" id="bUp"><i class="fa-solid fa-forward-step"></i></button>
        </footer>
        
        <audio id="coreAu" preload="none"></audio>
    </div>

    <div class="paypal-wrapper">
        <svg class="paypal-svg" viewBox="0 0 100 100">
            <path id="curve" d="M 20 50 A 30 30 0 0 1 80 50" fill="transparent" />
            <text><textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵘᵖᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath></text>
        </svg>
        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn"><i class="fab fa-paypal"></i></a>
    </div>

    <!-- أداة الاختيار الفخمة لمؤقت مخصص باللمس الكامل Touch-time-picker Drawer -->
    <div class="timer-drawer-bg" id="tDrBg">
        <div class="timer-drawer" id="tDrBox">
            <div class="drawer-bar"></div>
            <h3 style="font-weight: 700; text-align:center; font-size: 16px;">Automated Timer Tool</h3>
            
            <div class="t-tab-heads">
                <div class="t-tab act" data-m="sleep">Stop Radio <i class="fa-solid fa-moon"></i></div>
                <div class="t-tab" data-m="start">Start Radio <i class="fa-solid fa-power-off"></i></div>
            </div>

            <!-- الآلة الذكية بدون أرقام للكتابة Touch Machine Area -->
            <div class="picker-area">
                <div class="tm-wheels">
                    <!-- عمود الأيام -->
                    <div class="tm-wheel">
                        <span class="whl-lbl">Day</span>
                        <button class="whl-btn" data-act="inc" data-f="d"><i class="fa-solid fa-chevron-up"></i></button>
                        <span class="whl-val" id="pk_d">0</span>
                        <button class="whl-btn" data-act="dec" data-f="d"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                    <!-- عمود الساعات -->
                    <div class="tm-wheel">
                        <span class="whl-lbl">Hrs</span>
                        <button class="whl-btn" data-act="inc" data-f="h"><i class="fa-solid fa-chevron-up"></i></button>
                        <span class="whl-val" id="pk_h">0</span>
                        <button class="whl-btn" data-act="dec" data-f="h"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                    <!-- عمود الدقايق -->
                    <div class="tm-wheel">
                        <span class="whl-lbl">Min</span>
                        <button class="whl-btn" data-act="inc" data-f="m"><i class="fa-solid fa-chevron-up"></i></button>
                        <span class="whl-val" id="pk_m">00</span>
                        <button class="whl-btn" data-act="dec" data-f="m"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                    <!-- عمود الثواني العبقرية للمستخدم الاستثنائي -->
                    <div class="tm-wheel">
                        <span class="whl-lbl">Sec</span>
                        <button class="whl-btn" data-act="inc" data-f="s"><i class="fa-solid fa-chevron-up"></i></button>
                        <span class="whl-val" id="pk_s">00</span>
                        <button class="whl-btn" data-act="dec" data-f="s"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                </div>
            </div>

            <div class="t-apply-row">
                <button class="btn-exe btn-cancel" id="clBkTimer" style="display:none;"><i class="fa-solid fa-trash-can"></i> Abort Active</button>
                <button class="btn-exe sleep-c" id="acApTim"><i class="fa-solid fa-check"></i> Arm Tracker</button>
            </div>
        </div>
    </div>

    <!-- Favorite Stations List native Window -->
    <div class="f-modal" id="fMWin">
        <div class="fm-header">
            <span>Your Frequencies <i class="fa-solid fa-bolt" style="color:var(--primary); font-size: 16px;"></i></span>
            <button class="icon-btn" id="clFvM"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <ul class="list-wrap" id="lbLs"></ul>
    </div>


    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        /* ---------- Data Core Params Fetch ----------- */
        const uPar = new URLSearchParams(window.location.search);
        // الحصول المباشر الصارم على بيانات بوت تيليجرام
        const exactOriginReq = (tg?.initDataUnsafe?.start_param?.replace(/_/g, ' ') || uPar.get('country') || uPar.get('name') || '').trim();
        document.getElementById('qCtry').textContent = exactOriginReq ? exactOriginReq : "Select Zone";
        
        // المتغيرات السائلة الرئيسية للتحكم بالصوت والأجهزة
        const CoreData = { S: [], ix: 0, bPlay: false, customSrc: false, failPings: 0, sF: JSON.parse(localStorage.getItem('premium_fav_rads')) || [] };
        let TIM_SY = { cRnd: null, S_EN: null, S_TO: null, ST_EN: null, ST_TO: null }; // State Timers Memory Engine

        const eMap = {
            gT: document.getElementById('dTitle'), gS: document.getElementById('dSub'), au: document.getElementById('coreAu'),
            phIcon: document.getElementById('pHIc'), pCircl: document.getElementById('bPg'), IcoCont: document.getElementById('dscIco'),
            v: document.getElementById('vSlide'), btHr: document.getElementById('heartB'), bNx: document.getElementById('bUp'), bPr: document.getElementById('bDn')
        };

        /* --------------------------- */
        /*   21st CENTURY TIME ENGINE  */
        /* --------------------------- */
        
        let cTab = 'sleep'; 
        let curVals = { d:0, h:0, m:0, s:0 };
        const LIM = { d:30, h:23, m:59, s:59 };
        
        const F0 = x => x < 10 ? '0'+x : x;
        const R_VW = () => { 
            document.getElementById('pk_d').innerText = curVals.d; 
            document.getElementById('pk_h').innerText = curVals.h;
            document.getElementById('pk_m').innerText = F0(curVals.m); 
            document.getElementById('pk_s').innerText = F0(curVals.s); 
        };

        const mkInc = (fd, stp=1) => { curVals[fd] += stp; if(curVals[fd] > LIM[fd]) {curVals[fd] = 0; if(fd==='s') mkInc('m'); else if(fd==='m') mkInc('h'); else if(fd==='h') mkInc('d'); } R_VW();};
        const mkDec = (fd, stp=1) => { curVals[fd] -= stp; if(curVals[fd] < 0) curVals[fd] = LIM[fd]; R_VW(); };

        /* خوارزمية ذكية لاختيار الوقت بلمس مستمر تنجز ٦٥ ثانية واشياء غريبة بكفاءة وتعديل آلي */
        let pressInterval = null;
        document.querySelectorAll('.whl-btn').forEach(btn => {
            const hClick = (bAct, fieldId) => { (bAct==='inc') ? mkInc(fieldId) : mkDec(fieldId); };
            const runAuto = (bAct, fieldId) => { hClick(bAct, fieldId); pressInterval = setInterval(()=>hClick(bAct, fieldId), 120); };
            const cls = (e) => { clearInterval(pressInterval); };
            
            btn.addEventListener('mousedown', (e) => runAuto(btn.dataset.act, btn.dataset.f));
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); runAuto(btn.dataset.act, btn.dataset.f); }, {passive:false});
            btn.addEventListener('mouseup', cls); btn.addEventListener('mouseleave', cls); btn.addEventListener('touchend', cls);
        });

        // Tabs Action Change (Sleep or Start modal inner logic)
        document.querySelectorAll('.t-tab').forEach(b => {
            b.onclick = () => {
                document.querySelectorAll('.t-tab').forEach(x=>x.classList.remove('act'));
                b.classList.add('act'); cTab = b.dataset.m; 
                document.getElementById('acApTim').className = (cTab === 'sleep' ? "btn-exe sleep-c" : "btn-exe start-c");
                verifyDltOp(cTab);
            }
        });
        
        const verifyDltOp = (modeInFocus) => {
            document.getElementById('clBkTimer').style.display = ((modeInFocus === 'sleep' && TIM_SY.S_EN) || (modeInFocus === 'start' && TIM_SY.ST_EN)) ? "inline-block" : "none";
        };

        /* Timer Drawer Mechanics Overlay  */
        const TDraw = document.getElementById('tDrBg'); const TDrt_tr = document.getElementById('toglTimrs');
        const TGMenuUi = () => { curVals = {d:0,h:0,m:15,s:0}; R_VW(); verifyDltOp(cTab); TDraw.classList.add('open'); }
        const ClosMUi = () => TDraw.classList.remove('open');
        TDrt_tr.onclick = TGMenuUi; document.getElementById('tDrBox').querySelector('.drawer-bar').onclick = ClosMUi;
        TDraw.addEventListener('click', (e) => { if(e.target===TDraw) ClosMUi(); });

        /* Tick Watch Process (Visual Notification Badge on Home) */
        const bD1 = document.getElementById('tsTag'), bD2 = document.getElementById('taTag'), btnPlsTg = document.getElementById('toglTimrs');
        const bNumS = document.getElementById('tsNum'), bNumSt = document.getElementById('taNum');
        
        const updateBadgesBgWatch = () => {
            let leftA = false, leftB = false;
            if(TIM_SY.S_EN){ 
                let tMs = Math.round((TIM_SY.S_EN - Date.now())/1000); 
                if(tMs<=0) { rst_Sl(true); } 
                else { leftA=true; bD1.classList.add('vis'); bNumS.textContent = `${tMs>3600? F0(Math.floor(tMs/3600))+':':''}${F0(Math.floor((tMs%3600)/60))}:${F0(tMs%60)}`; }
            } else bD1.classList.remove('vis');
            
            if(TIM_SY.ST_EN){ 
                let ttS = Math.round((TIM_SY.ST_EN - Date.now())/1000); 
                if(ttS<=0) { rst_St(true); } 
                else { leftB=true; bD2.classList.add('vis'); bNumSt.textContent = `${ttS>3600? F0(Math.floor(ttS/3600))+':':''}${F0(Math.floor((ttS%3600)/60))}:${F0(ttS%60)}`; }
            } else bD2.classList.remove('vis');

            leftA || leftB ? btnPlsTg.classList.add('is-active-pulse') : btnPlsTg.classList.remove('is-active-pulse');
            if(!leftA && !leftB && TIM_SY.cRnd) { clearInterval(TIM_SY.cRnd); TIM_SY.cRnd = null;}
        }

        const StartGlobTik = () => { if(!TIM_SY.cRnd) TIM_SY.cRnd = setInterval(updateBadgesBgWatch, 1000); updateBadgesBgWatch();};

        /* Engine Setup Applying requested durations via touch mechanics computed strictly via maths seconds logic to ms. */
        document.getElementById('acApTim').onclick = () => {
            const rawMsDur = ((curVals.d * 86400) + (curVals.h * 3600) + (curVals.m * 60) + curVals.s) * 1000;
            if(rawMsDur <= 0) return ClosMUi();
            if (cTab === 'sleep') { 
                rst_Sl(); rst_St(); EngineCoreOp.hStartSys(); 
                TIM_SY.S_EN = Date.now() + rawMsDur; TIM_SY.S_TO = setTimeout(() => { rst_Sl(); EngineCoreOp.smoFader(); }, rawMsDur);
            } else {
                rst_St(); rst_Sl();
                TIM_SY.ST_EN = Date.now() + rawMsDur; TIM_SY.ST_TO = setTimeout(() => { rst_St(); EngineCoreOp.hStartSys(); }, rawMsDur);
            }
            StartGlobTik(); ClosMUi();
        };

        const rst_Sl = (exEnd=false) => { clearTimeout(TIM_SY.S_TO); TIM_SY.S_EN = null; TIM_SY.S_TO = null; updateBadgesBgWatch(); }
        const rst_St = (exEnd=false) => { clearTimeout(TIM_SY.ST_TO); TIM_SY.ST_EN = null; TIM_SY.ST_TO = null; updateBadgesBgWatch(); }
        document.getElementById('clBkTimer').onclick = () => { if(cTab==='sleep')rst_Sl(); else rst_St(); verifyDltOp(cTab); }

        
        /* --------------------------- */
        /*   AUDIO SYS ENGINE          */
        /* --------------------------- */

        const RadioLogicReq = {
            async gUrlC() {
                try {
                    const bStr = encodeURIComponent(exactOriginReq.toLowerCase());
                    let uR = await fetch(`https://de1.api.radio-browser.info/json/stations/bycountry/${bStr}?order=votes&reverse=true`);
                    if(!uR.ok || (await uR.clone().json()).length === 0) { 
                        // الذكاء الاصطناعي لا يبحث عن دولة وهمية كـ default إن لم تنجح، بل يحاول استخدام نظام عام (string mode fallback).
                        document.getElementById('txtStt').innerText = "WIDENING SPECTRUM";
                        uR = await fetch(`https://de1.api.radio-browser.info/json/stations/search?name=${bStr}&order=votes&reverse=true`);
                    }
                    const rd = await uR.json();
                    return rd.filter(s => (s.url_resolved||s.url).startsWith('https://'));
                } catch(e) { return [];}
            }
        };

        const EngineCoreOp = {
            cRenderHst(x1, x2, icoZ) {
                eMap.gT.textContent = x1; eMap.gS.textContent = x2;
                if(icoZ){
                    let zD = new Image(); zD.src=icoZ; zD.onload=()=>{eMap.IcoCont.innerHTML = `<img src="${icoZ}" />`}; zD.onerror=()=> eMap.IcoCont.innerHTML = '<div class="fallback-icon"><i class="fa-solid fa-signal"></i></div>';
                } else eMap.IcoCont.innerHTML = '<div class="fallback-icon"><i class="fa-solid fa-signal"></i></div>';
                this.cHertUp();
            },
            ldMemIx(zx){
                if(CoreData.S.length === 0) return; CoreData.ix = zx; CoreData.customSrc = false; let ob = CoreData.S[CoreData.ix];
                this.cRenderHst(ob.name, `Stream Data ${zx+1} | ${CoreData.S.length}`, ob.favicon);
                eMap.au.src = ob.url_resolved || ob.url; this.enbCtrl(); if(CoreData.bPlay) this.plxRun();
            },
            ldExCustomUrlObj(objDat){
                CoreData.customSrc = true; this.cRenderHst(objDat.name, 'Stored Radio Node', objDat.img); eMap.au.src = objDat.url; this.enbCtrl(); this.plxRun();
            },
            plxRun() { let cA = eMap.au.play(); if(cA) cA.then(()=>{CoreData.bPlay=true; CoreData.failPings=0; eMap.phIcon.className='fa-solid fa-pause'; eMap.pCircl.className='play-hub'; eMap.IcoCont.classList.add('is-playing'); }).catch(bX=>{if(bX.name!=='AbortError')this.bgx();}); },
            stPxBrak() { eMap.au.pause(); CoreData.bPlay=false; eMap.phIcon.className='fa-solid fa-play'; eMap.pCircl.className='play-hub state-play'; eMap.IcoCont.classList.remove('is-playing'); },
            hTogglx() { CoreData.bPlay ? this.stPxBrak() : this.plxRun(); },
            hStartSys() { if(eMap.au.src || CoreData.S.length) { if(!eMap.au.src) this.ldMemIx(0); this.plxRun(); }},
            bgx() { 
                this.stPxBrak(); eMap.gS.textContent="Sync failure..."; eMap.IcoCont.innerHTML = '<div class="fallback-icon"><i class="fa-solid fa-tower-broadcast fa-shake" style="color:var(--danger)"></i></div>';
                if(!CoreData.customSrc && CoreData.S.length > 1 && CoreData.failPings < 10) { CoreData.failPings++; setTimeout(() => this.ldMemIx((CoreData.ix+1)%CoreData.S.length), 1700); } 
            },
            smoFader() { if(!CoreData.bPlay) return; let cuI = 20, zV = eMap.v.value; let ti_o = setInterval(()=>{cuI--; eMap.au.volume = Math.max(0,(cuI/20)*zV); if(cuI<=0) {clearInterval(ti_o); this.stPxBrak(); eMap.au.volume = zV;} }, 150);} ,
            cHertUp(){ let yid = CoreData.customSrc ? CoreData.sF.find(z=>z.url === eMap.au.src)?.id : CoreData.S[CoreData.ix]?.stationuuid;
                if(!yid)return; eMap.btHr.className = CoreData.sF.some(x=>x.id===yid) ? "fav-trigger active" : "fav-trigger"; 
                eMap.btHr.innerHTML = CoreData.sF.some(x=>x.id===yid) ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-regular fa-heart"></i>';
            }, enbCtrl(){ [eMap.pCircl, eMap.bPr, eMap.bNx].forEach(n=>n.disabled=false); }
        }

        eMap.v.addEventListener('input', a => { eMap.au.volume = a.target.value; }); eMap.au.addEventListener('error', () => EngineCoreOp.bgx());
        eMap.pCircl.onclick = () => EngineCoreOp.hTogglx(); eMap.bNx.onclick = () => { if(CoreData.S.length) EngineCoreOp.ldMemIx((CoreData.ix + 1) % CoreData.S.length); }; eMap.bPr.onclick = () => { if(CoreData.S.length) EngineCoreOp.ldMemIx((CoreData.ix - 1 + CoreData.S.length) % CoreData.S.length); };


        /* ----------- User Personal Frequencies Mem ------------------ */
        eMap.btHr.onclick = () => {
            const trCx = CoreData.customSrc ? CoreData.sF.find(x=>x.url===eMap.au.src) : CoreData.S[CoreData.ix];
            if(!trCx)return; const kIds = trCx.stationuuid || trCx.id; const xiI = CoreData.sF.findIndex(m=>m.id === kIds);
            if(xiI > -1) CoreData.sF.splice(xiI,1); else CoreData.sF.push({ id:kIds, name:trCx.name, url:trCx.url_resolved||trCx.url, img:trCx.favicon||trCx.img });
            localStorage.setItem('premium_fav_rads', JSON.stringify(CoreData.sF)); EngineCoreOp.cHertUp(); RNDMListQ();
        };

        const UiFavWin = document.getElementById('fMWin'); const UilstF = document.getElementById('lbLs');
        const RNDMListQ = () => {
            UilstF.innerHTML = CoreData.sF.length ? '' : '<div style="color:var(--text-2); text-align:center; padding:20px 0;">Heart your stations to drop them here.</div>';
            CoreData.sF.forEach((lA, Iix) => {
                let bn = document.createElement('li'); bn.className='li-box';
                bn.innerHTML = `<div class="li-body"><div class="li-b-title"><i class="fa-solid fa-play" style="font-size:12px; color:var(--primary); margin-right:5px;"></i> ${lA.name||'Audio Signal'}</div><div class="li-b-sub">MEM#0${Iix+1} NODE</div></div><button class="li-rem"><i class="fa-solid fa-trash-can"></i></button>`;
                bn.querySelector('.li-body').onclick = () => { let cIxSrch = CoreData.S.findIndex(bxX=>bxX.stationuuid===lA.id);
                    UiFavWin.classList.remove('open'); if(cIxSrch > -1) EngineCoreOp.ldMemIx(cIxSrch); else EngineCoreOp.ldExCustomUrlObj(lA);
                };
                bn.querySelector('.li-rem').onclick = (exV) => { exV.stopPropagation(); CoreData.sF.splice(Iix,1); localStorage.setItem('premium_fav_rads',JSON.stringify(CoreData.sF)); RNDMListQ(); EngineCoreOp.cHertUp();};
                UilstF.appendChild(bn);
            });
        };
        
        document.getElementById('iFavTop').onclick = () => { RNDMListQ(); UiFavWin.classList.add('open'); }; document.getElementById('clFvM').onclick = () => { UiFavWin.classList.remove('open'); };


        /* Initialization Setup Runtime  */
        (async () => {
            if(!exactOriginReq || exactOriginReq.length < 2) { eMap.gT.textContent="Country Parameter Null"; eMap.gS.textContent="Pass valid country into TG"; document.getElementById('ldng').style.display='none'; eMap.IcoCont.innerHTML='<div class="fallback-icon"><i class="fa-solid fa-user-astronaut"></i></div>'; return;}
            CoreData.S = await RadioLogicReq.gUrlC();
            document.getElementById('ldng').style.display='none';
            if(CoreData.S.length) EngineCoreOp.ldMemIx(0); else { eMap.gT.textContent="Signals lost."; eMap.gS.textContent=`Try spelling / alternative format for "${exactOriginReq}" in the Bot Chat`; }
        })();

    </script>
</body>
</html>
