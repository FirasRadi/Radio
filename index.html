<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Aura Radio - The Masterpiece</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Syncopate:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #050505;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- Massive Background Text --- */
        .bg-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Syncopate', sans-serif;
            font-size: 15vw;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            z-index: 0;
            pointer-events: none;
            letter-spacing: -2px;
            transition: opacity 1s ease;
        }

        /* --- The Living Canvas --- */
        #auraCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            cursor: pointer;
        }

        /* --- UI Overlay --- */
        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: space-between;
            padding: 40px 30px;
            pointer-events: none; /* Let clicks pass to canvas */
        }

        /* --- Top Header --- */
        .header {
            text-align: center;
            animation: fadeInDown 1s ease;
        }

        .station-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 24px; font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .station-meta {
            font-size: 12px; font-weight: 300;
            color: var(--text-muted);
            letter-spacing: 4px; text-transform: uppercase;
        }

        /* --- Bottom Controls --- */
        .controls {
            display: flex; justify-content: space-between; align-items: center;
            pointer-events: auto; /* Enable clicks for controls */
            padding: 0 20px;
        }

        .magnetic-btn {
            background: transparent; border: none;
            color: var(--text-main); font-size: 24px;
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            transition: color 0.3s ease;
        }
        
        .magnetic-btn::after {
            content: ''; position: absolute;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            transform: scale(0); transition: transform 0.3s ease;
            z-index: -1;
        }

        .magnetic-btn:hover::after { transform: scale(1); }
        .magnetic-btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .hint {
            font-size: 11px; color: var(--text-muted);
            letter-spacing: 2px; text-align: center;
            opacity: 0.6; pointer-events: none;
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            animation: pulseHint 2s infinite alternate;
        }

        /* --- Loading Screen --- */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }

        .loader-dot {
            width: 15px; height: 15px; background: #fff; border-radius: 50%;
            animation: breathe 1.5s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        @keyframes breathe { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(3); opacity: 1; } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulseHint { from { opacity: 0.2; } to { opacity: 0.8; } }
    </style>
</head>
<body>

    <div class="bg-text" id="bgText">AURA</div>

    <!-- The Living Blob Canvas -->
    <canvas id="auraCanvas" title="Tap to Play/Pause"></canvas>

    <div class="ui-layer">
        <div class="header">
            <div class="station-name" id="stationTitle">SEARCHING...</div>
            <div class="station-meta" id="stationSub">CONNECTING TO FREQUENCIES</div>
        </div>

        <div class="hint" id="hintText">SWIPE TO CHANGE • TAP CENTER TO PLAY</div>

        <div class="controls">
            <button class="magnetic-btn" id="prevBtn" disabled><i class="fas fa-chevron-left"></i></button>
            
            <!-- Minimal Volume Control -->
            <div style="display: flex; align-items: center; gap: 15px; width: 40%; max-width: 150px;">
                <i class="fas fa-volume-down" style="font-size: 12px; color: var(--text-muted);"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" 
                       style="width: 100%; height: 2px; -webkit-appearance: none; background: rgba(255,255,255,0.2); outline: none;">
            </div>

            <button class="magnetic-btn" id="nextBtn" disabled><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader"><div class="loader-dot"></div></div>
    
    <audio id="audioPlayer" preload="none"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // --- Core Elements ---
        const ui = {
            loader: document.getElementById('loader'),
            bgText: document.getElementById('bgText'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            canvas: document.getElementById('auraCanvas'),
            hint: document.getElementById('hintText'),
            vol: document.getElementById('volumeSlider')
        };

        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let hasValid = false;

        // URL / Telegram parameters
        const urlName = new URLSearchParams(window.location.search).get('name') || '';
        const tgName = (tg.initDataUnsafe.start_param || '').replace(/_/g, ' '); 
        const countryName = tgName || urlName;

        // --- Generative Canvas Blob (The Masterpiece) ---
        const ctx = ui.canvas.getContext('2d');
        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetColor1 = '#4ade80', targetColor2 = '#3b82f6';
        let currentColor1 = targetColor1, currentColor2 = targetColor2;

        function resize() {
            width = ui.canvas.width = window.innerWidth;
            height = ui.canvas.height = window.innerHeight;
            mouseX = width / 2; mouseY = height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        // Mouse interaction for Blob
        ui.canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
        ui.canvas.addEventListener('mouseleave', () => { mouseX = width / 2; mouseY = height / 2; });

        // Generate unique color palette based on station name hashing
        function generateColors(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            const hue = Math.abs(hash % 360);
            return {
                c1: `hsl(${hue}, 80%, 55%)`,
                c2: `hsl(${(hue + 50) % 360}, 90%, 45%)`
            };
        }

        // Interpolate colors smoothly (Simple HEX/RGB simulation by using CSS transition on Canvas would be hard, so we just set them directly for now, Canvas glow handles blending)
        function updateBlobColor(stationName) {
            const colors = generateColors(stationName);
            targetColor1 = colors.c1;
            targetColor2 = colors.c2;
            ui.bgText.textContent = countryName.toUpperCase();
        }

        function drawBlob() {
            ctx.clearRect(0, 0, width, height);
            
            const time = Date.now() * 0.0015;
            const cx = width / 2;
            const cy = height / 2;
            const baseRadius = Math.min(width, height) * 0.3;
            const points = [];
            const numPoints = 80;

            // Audio reactivity intensity
            const intensity = isPlaying ? (0.3 + (ui.vol.value * 0.5)) : 0.05;
            const speedMultiplier = isPlaying ? 2 : 0.5;

            for (let i = 0; i < numPoints; i++) {
                const angle = (i / numPoints) * Math.PI * 2;
                
                // Magic math for organic shape
                const noise = 
                    Math.sin(angle * 3 + time * speedMultiplier) * (30 * intensity) + 
                    Math.cos(angle * 4 - time * speedMultiplier) * (40 * intensity) +
                    Math.sin(angle * 2 + time * 1.5) * (15 * intensity);

                // Mouse gravity logic
                let px = cx + Math.cos(angle) * baseRadius;
                let py = cy + Math.sin(angle) * baseRadius;
                let distToMouse = Math.hypot(mouseX - px, mouseY - py);
                let gravity = 0;
                if(distToMouse < 200) {
                    gravity = (200 - distToMouse) * 0.15; // Pull towards mouse
                }

                const r = baseRadius + noise + gravity;
                points.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
            }

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            
            // Draw smooth bezier curves
            for (let i = 0; i < points.length; i++) {
                const current = points[i];
                const next = points[(i + 1) % points.length];
                const midX = (current.x + next.x) / 2;
                const midY = (current.y + next.y) / 2;
                ctx.quadraticCurveTo(current.x, current.y, midX, midY);
            }
            ctx.closePath();

            // Gradient and Glow
            const grad = ctx.createLinearGradient(cx - baseRadius, cy - baseRadius, cx + baseRadius, cy + baseRadius);
            grad.addColorStop(0, targetColor1);
            grad.addColorStop(1, targetColor2);
            
            ctx.fillStyle = grad;
            ctx.shadowColor = targetColor1;
            ctx.shadowBlur = isPlaying ? 50 + (Math.sin(time*5)*10) : 20; // Breathing glow
            ctx.fill();

            requestAnimationFrame(drawBlob);
        }
        drawBlob(); // Start rendering loop

        // --- Magnetic Buttons (Awwwards Style) ---
        document.querySelectorAll('.magnetic-btn').forEach(btn => {
            btn.addEventListener('mousemove', (e) => {
                if(btn.disabled) return;
                const rect = btn.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width/2) * 0.5;
                const y = (e.clientY - rect.top - rect.height/2) * 0.5;
                btn.style.transform = `translate(${x}px, ${y}px)`;
            });
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = `translate(0px, 0px)`;
            });
        });

        // --- Swipe Gestures ---
        let touchStartX = 0;
        let touchEndX = 0;
        ui.canvas.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
        ui.canvas.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, {passive: true});

        function handleSwipe() {
            if(!hasValid) return;
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) nextStation(); // Swipe Left
            if (touchEndX > touchStartX + threshold) prevStation(); // Swipe Right
        }

        // --- Radio Logic ---
        async function fetchRadio(name) {
            let resp = await fetch(`https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(name)}?order=votes&reverse=true`);
            let data = await resp.json();
            if(!data.length) {
                resp = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?order=votes&reverse=true`);
                data = await resp.json();
            }
            return data.filter(s => (s.url_resolved || s.url)?.startsWith('https://'));
        }

        function loadStation(index) {
            if (!stations.length || !hasValid) return;
            const item = stations[index];
            
            ui.title.textContent = (item.name || 'UNKNOWN').toUpperCase();
            ui.sub.textContent = `FREQ ${index + 1}/${stations.length} • ${(item.tags ? item.tags.split(',')[0].toUpperCase() : 'AURA')}`;
            
            updateBlobColor(item.name || 'Random');
            
            ui.audio.src = item.url_resolved || item.url || '';
            ui.audio.volume = ui.vol.value;
            
            ui.prevBtn.disabled = false;
            ui.nextBtn.disabled = false;
            
            if (isPlaying) playAudio();
        }

        async function playAudio() {
            try {
                ui.hint.textContent = "DECRYPTING AURA...";
                await ui.audio.play();
                isPlaying = true;
                ui.hint.textContent = "SWIPE L/R TO EXPLORE • TAP TO PAUSE";
            } catch (err) {
                if (err.name !== 'AbortError') {
                    isPlaying = false;
                    ui.hint.textContent = "SIGNAL LOST - AUTO SKIPPING...";
                    setTimeout(nextStation, 1500);
                }
            }
        }

        function togglePlay() {
            if (!hasValid || !ui.audio.src) return;
            if (ui.audio.paused) {
                playAudio();
            } else {
                ui.audio.pause();
                isPlaying = false;
                ui.hint.textContent = "PAUSED • TAP TO RESUME";
            }
        }

        // Canvas acts as play/pause button
        ui.canvas.addEventListener('click', togglePlay);

        function nextStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        }
        
        function prevStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        }

        ui.nextBtn.addEventListener('click', nextStation);
        ui.prevBtn.addEventListener('click', prevStation);
        ui.vol.addEventListener('input', e => ui.audio.volume = e.target.value);

        // --- Boot Sequence ---
        async function boot() {
            if (!countryName.trim()) {
                ui.title.textContent = "NO ENTITY FOUND";
                ui.sub.textContent = "PLEASE SPECIFY A REGION";
                ui.loader.style.opacity = '0';
                setTimeout(() => ui.loader.style.display = 'none', 1000);
                return;
            }
            
            try {
                const data = await fetchRadio(countryName.trim());
                if(data.length) {
                    stations = data;
                    hasValid = true;
                    loadStation(0);
                } else {
                    ui.title.textContent = "SILENCE";
                    ui.sub.textContent = "NO FREQUENCIES IN THIS REGION";
                }
            } catch (e) {
                ui.title.textContent = "CONNECTION SEVERED";
                ui.sub.textContent = "AURA CORE OFFLINE";
            }
            
            ui.loader.style.opacity = '0';
            setTimeout(() => ui.loader.style.display = 'none', 1000);
        }

        setTimeout(boot, 800);
    </script>
</body>
</html>
