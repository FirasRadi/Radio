<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-base: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* ── Player Card ── */
        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            border: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-btn {
            background: var(--border-glass);
            border: none;
            color: var(--text-sub);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; transform: scale(1.05); }

        /* المؤشر التنبيهي */
        .icon-btn.active-timer {
            color: var(--warning);
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            animation: pulseWarning 2s infinite;
        }
        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        /* ── Logo ── */
        .logo-container { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .logo {
            width: 120px; height: 120px; border-radius: 50%; background: rgba(15, 23, 42, 0.6);
            display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--primary);
            overflow: hidden; border: 4px solid var(--border-glass); transition: border-color 0.4s ease, box-shadow 0.4s ease;
        }
        .logo img { width: 100%; height: 100%; object-fit: contain; background-color: #fff; border-radius: 50%; padding: 4px; }
        .logo.playing {
            border-color: var(--primary); box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            animation: spinDisc 10s linear infinite;
        }
        @keyframes spinDisc { 100% { transform: rotate(360deg); } }

        .station-name { font-size: 20px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .station-counter { font-size: 13px; color: var(--text-sub); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }

        /* ── Toggleable Timer Section ── */
        .timer-section { display: none; flex-direction: column; gap: 12px; margin-top: 5px; }
        .timer-section.show { display: flex; animation: expandSection 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes expandSection { 0% { opacity: 0; transform: translateY(-10px); } 100% { opacity: 1; transform: translateY(0); } }

        .timer-row {
            background: rgba(0, 0, 0, 0.2); border-radius: 16px; padding: 12px 14px;
            display: flex; flex-direction: column; gap: 12px; border: 1px solid var(--border-glass); transition: all 0.3s ease;
        }
        .timer-row.sleep-row { border-left: 4px solid var(--primary); }
        .timer-row.start-row { border-left: 4px solid var(--success); }
        .timer-row.active-timer-row {
            border-color: rgba(255, 255, 255, 0.2); background: rgba(0, 0, 0, 0.4); box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .timer-header { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .timer-label { font-weight: 600; font-size: 13px; letter-spacing: 0.8px; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
        .sleep-row .timer-label { color: #60a5fa; }
        .start-row .timer-label { color: #4ade80; }

        /* ── NEW Advanced Custom Countdown Visualizer ── */
        .advanced-readout {
            font-family: monospace, monospace; font-size: 16px; font-weight: 700; color: var(--warning);
            background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 10px;
            letter-spacing: 1px; display: none; border: 1px solid rgba(251, 191, 36, 0.3); text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }
        .advanced-readout.visible { display: block; }

        /* ── Unified Input Grid Form For Any User Need ── */
        .timer-presets-wrap { display: flex; flex-direction: column; gap: 8px; }
        .timer-presets-row { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }

        /* الأقراص المألوفة اختصارات */
        .timer-preset-pill {
            background: var(--border-glass); border: 1px solid transparent; color: #cbd5e1;
            padding: 5px 10px; border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 11px; transition: all 0.2s ease;
        }
        .timer-preset-pill:hover { background: var(--primary); color: #fff; transform: translateY(-2px); }
        .start-row .timer-preset-pill:hover { background: var(--success); }

        .custom-input-grid {
            display: flex; gap: 5px; justify-content: center; align-items: center;
        }
        .custom-input-grid input {
            width: 48px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-glass);
            color: var(--text-main); text-align: center; border-radius: 8px; padding: 6px 4px; outline: none; font-size:12px;
        }
        .custom-input-grid input::placeholder { color: rgba(255,255,255,0.25); }
        .custom-input-grid input:focus { border-color: var(--primary); }
        .btn-set-custom {
            background: var(--primary); color: #fff; border: none; padding: 7px 14px; border-radius: 8px;
            cursor: pointer; font-weight: 600; font-size: 11px; transition: 0.2s; box-shadow: 0 2px 10px rgba(59,130,246,0.3);
        }
        .btn-set-custom:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .start-row .btn-set-custom { background: var(--success); box-shadow: 0 2px 10px rgba(34, 197, 94,0.3); }

        /* إخفاء واجهة الإدخال عند البدء */
        .timer-inputs-area { display: flex; flex-direction: column; gap: 8px; }
        
        .timer-cancel-pill { display: none; color: var(--danger); background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.2); border:1px solid rgba(239, 68, 68, 0.2); padding: 5px 10px; border-radius: 20px; font-size: 11px; cursor: pointer;}
        .timer-cancel-pill.visible { display: inline-flex; align-items: center; gap: 4px; }
        .timer-cancel-pill:hover { background: var(--danger); color: #fff; }

        /* ── Player Controls ── */
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin-top: 10px; }
        .ctrl-btn { border: none; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .nav-btn { width: 46px; height: 46px; background: rgba(255, 255, 255, 0.05); color: var(--text-main); font-size: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); transform: scale(1.1); }
        .play-btn { width: 70px; height: 70px; background: linear-gradient(135deg, var(--primary), var(--primary-hover)); border-radius: 50%; font-size: 24px; color: #fff; box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5); display: flex; align-items: center; justify-content: center; padding-left: 3px; }
        .play-btn:hover:not(:disabled) { transform: scale(1.08) translateY(-2px); }
        .play-btn .fa-pause { padding-left: 0; }

        /* ── Action Bar ── */
        .actions-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.25); padding: 16px 20px; border-radius: 20px; }
        .volume-container { display: flex; align-items: center; gap: 12px; flex-grow: 1; margin-right: 15px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 4px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(59,130,246,0.5); }
        .action-btn { background: none; border: none; font-size: 22px; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
        .action-btn:hover { color: #fff; transform: scale(1.1); }
        .action-btn.active-fav { color: var(--danger); animation: heartBeat 0.4s ease; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .footer-note { font-size: 11px; color: var(--text-sub); margin-top: -5px; }

        /* PayPal UI Box Preserved Correctly */
        .paypal-wrapper {
            position: fixed; bottom: 20px; right: 20px; width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .paypal-svg { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .paypal-svg text { font-size: 9.5px; fill: var(--text-sub); font-family: monospace; letter-spacing: 0.5px; font-weight: bold; }
        .donate-btn { width: 50px; height: 50px; background: #0070ba; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; text-decoration: none; box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4); position: relative; z-index: 2; transition: 0.3s; }
        .donate-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 112, 186, 0.6); }

        /* ── Favorites ── */
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200; display: flex; flex-direction: column; padding: 30px 20px; backdrop-filter: blur(12px); opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .modal.open { opacity: 1; visibility: visible; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border-glass); }
        .close-modal { background: none; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .close-modal:hover { color: var(--danger); transform: rotate(90deg); }
        .fav-list { flex: 1; overflow-y: auto; list-style: none; padding-right: 5px; }
        .fav-list::-webkit-scrollbar { width: 5px; }
        .fav-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .fav-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 14px; margin-bottom: 10px; border: 1px solid var(--border-glass); transition: 0.3s ease; }
        .fav-item:hover { border-color: var(--primary); background: rgba(59,130,246,0.1); transform: translateX(5px); }
        .fav-item-content { display: flex; align-items: center; flex: 1; cursor: pointer; gap: 15px; overflow: hidden; }
        .fav-play-icon { color: var(--primary); font-size: 22px; }
        .fav-info { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size:14px; }
        .fav-remove { color: var(--danger); background: rgba(239, 68, 68, 0.15); border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .fav-remove:hover { background: var(--danger); color: #fff; }

        /* Loader */
        #loading { position: fixed; inset: 0; background: var(--bg-base); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; color: var(--primary); font-weight: 600; letter-spacing: 2px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(59, 130, 246, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <!-- PayPal -->
    <div class="paypal-wrapper">
        <svg class="paypal-svg" viewBox="0 0 100 100">
            <path id="curve" d="M 20 50 A 30 30 0 0 1 80 50" fill="transparent" />
            <text><textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵘᵖᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath></text>
        </svg>
        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn"><i class="fab fa-paypal"></i></a>
    </div>

    <!-- Loader -->
    <div id="loading">
        <div class="spinner"></div>
        <span>FETCHING STATIONS...</span>
    </div>

    <!-- Card -->
    <div class="player-card">
        <!-- Header -->
        <div class="header">
            <button class="icon-btn" id="toggleTimerBtn" title="Show/Hide Timers"><i class="fas fa-stopwatch"></i></button>
            <button class="icon-btn" id="openFavsBtn" title="Saved Stations"><i class="fas fa-list-ul"></i></button>
        </div>

        <div class="logo-container">
            <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
            <div class="station-name" id="stationTitle">Loading...</div>
            <div class="station-counter" id="stationSub">Initializing</div>
        </div>

        <!-- ── ALL NEW Timer Mechanics for Any Limits! ── -->
        <div class="timer-section" id="timerSection">
            
            <!-- Sleep Timer Row -->
            <div class="timer-row sleep-row" id="sleepTimerRow">
                <div class="timer-header">
                    <span class="timer-label"><i class="fas fa-moon"></i> Sleep System</span>
                    <!-- Text readout which replaces limits of slot machines visually without glitches -->
                    <div class="advanced-readout" id="slReadout">00:00</div>
                    <button class="timer-cancel-pill" id="slCancelBtn"><i class="fas fa-times"></i></button>
                </div>

                <div class="timer-inputs-area" id="slInputsArea">
                    <div class="timer-presets-row" id="sleepPresetsGroup">
                        <!-- Default smart suggestions back exactly how requested but up scaled for quick taps! -->
                        <button class="timer-preset-pill" data-mins="1">1m</button>
                        <button class="timer-preset-pill" data-mins="5">5m</button>
                        <button class="timer-preset-pill" data-mins="15">15m</button>
                        <button class="timer-preset-pill" data-mins="30">30m</button>
                        <button class="timer-preset-pill" data-mins="60">1h</button>
                    </div>
                    <!-- Arbitrary full detailed manual selection Inputs -->
                    <div class="custom-input-grid">
                        <input type="number" id="slInpD" placeholder="D" min="0"> :
                        <input type="number" id="slInpH" placeholder="H" min="0" max="999"> :
                        <input type="number" id="slInpM" placeholder="M" min="0"> :
                        <input type="number" id="slInpS" placeholder="S" min="0">
                        <button class="btn-set-custom" id="slRunCustom"><i class="fas fa-check"></i> SET</button>
                    </div>
                </div>
            </div>

            <!-- Start Timer Row -->
            <div class="timer-row start-row" id="startTimerRow">
                <div class="timer-header">
                    <span class="timer-label"><i class="fas fa-clock"></i> Start System</span>
                    <div class="advanced-readout" id="stReadout">00:00</div>
                    <button class="timer-cancel-pill" id="stCancelBtn"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="timer-inputs-area" id="stInputsArea">
                    <div class="timer-presets-row" id="startPresetsGroup">
                        <button class="timer-preset-pill" data-mins="1">1m</button>
                        <button class="timer-preset-pill" data-mins="5">5m</button>
                        <button class="timer-preset-pill" data-mins="15">15m</button>
                        <button class="timer-preset-pill" data-mins="30">30m</button>
                        <button class="timer-preset-pill" data-mins="60">1h</button>
                    </div>
                    <div class="custom-input-grid">
                        <input type="number" id="stInpD" placeholder="D" min="0"> :
                        <input type="number" id="stInpH" placeholder="H" min="0" max="999"> :
                        <input type="number" id="stInpM" placeholder="M" min="0"> :
                        <input type="number" id="stInpS" placeholder="S" min="0">
                        <button class="btn-set-custom" id="stRunCustom"><i class="fas fa-check"></i> SET</button>
                    </div>
                </div>
            </div>

        </div>
        <!-- End Advanced Customizing Interface -->

        <!-- Controls Area -->
        <div class="controls">
            <button class="ctrl-btn nav-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn nav-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <div class="actions-bar">
            <div class="volume-container">
                <i class="fas fa-volume-down" style="color:var(--text-sub); font-size:14px;"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <i class="fas fa-volume-up" style="color:var(--text-sub); font-size:16px;"></i>
            </div>
            <button class="action-btn" id="saveFavBtn" title="Save Station"><i class="far fa-heart"></i></button>
        </div>
        <div class="footer-note">Change country inside the bot chat.</div>
        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <!-- Modals Overlay-->
    <div class="modal" id="favModal">
        <div class="modal-header">
            <span>Your Favorites</span>
            <button class="close-modal" id="closeFavsBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }

        const DOM = {
            loading: document.getElementById('loading'), logo: document.getElementById('stationLogo'), title: document.getElementById('stationTitle'), sub: document.getElementById('stationSub'),
            playBtn: document.getElementById('playBtn'), playIcon: document.getElementById('playIcon'), prevBtn: document.getElementById('prevBtn'), nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'), vol: document.getElementById('volumeSlider'), saveBtn: document.getElementById('saveFavBtn'),
            openFavs: document.getElementById('openFavsBtn'), closeFavs: document.getElementById('closeFavsBtn'), favModal: document.getElementById('favModal'), favList: document.getElementById('favList'),
            toggleBtn: document.getElementById('toggleTimerBtn'), tContainer: document.getElementById('timerSection'),
            tRows: { 
                slR: document.getElementById('sleepTimerRow'), stR: document.getElementById('startTimerRow') 
            },
            tmReads: { slRead: document.getElementById('slReadout'), stRead: document.getElementById('stReadout') },
            inBoxes: { slInA: document.getElementById('slInputsArea'), stInA: document.getElementById('stInputsArea') },
            inCans: { slC: document.getElementById('slCancelBtn'), stC: document.getElementById('stCancelBtn') },
            customBtns: { runSl: document.getElementById('slRunCustom'), runSt: document.getElementById('stRunCustom') }
        };

        // Extraction strictly matching target parameters of bot, No defaulting! (Safety and accuracy standard).
        const PARAMS = new URLSearchParams(window.location.search);
        const targetRaw = (tg?.initDataUnsafe?.start_param || '').replace(/_/g, ' ') || PARAMS.get('name') || PARAMS.get('country') || '';
        const TARGET_COUNTRY = targetRaw.trim();

        let stations = [], curId = 0, playingState = false, errorC = 0, autoSkipping = false, sToOut = null, isFavModePlaying = false;
        let storedRadios = JSON.parse(localStorage.getItem('radio_saved_list')) || [];
        
        let CoreTmr = { tInt: null, endSlp: null, endStr: null, outSlp: null, outStr: null };

        // ============ Unlimited Custom Dynamic Counters System Engine ============ //
        DOM.toggleBtn.addEventListener('click', () => DOM.tContainer.classList.toggle('show'));

        const tgUpdateLedIndicator = () => { 
            (CoreTmr.endSlp || CoreTmr.endStr) ? DOM.toggleBtn.classList.add('active-timer') : DOM.toggleBtn.classList.remove('active-timer'); 
        };

        const FormattedRemainsString = (futureTs) => {
            if(!futureTs) return { remain: 0, read: "00:00" };
            const T = Math.max(0, Math.floor((futureTs - Date.now()) / 1000));
            const cDays = Math.floor(T / 86400);
            const cHrs = Math.floor((T % 86400) / 3600);
            const cMins = Math.floor((T % 3600) / 60);
            const cSecs = T % 60;

            let st = [];
            // Dynamically pushes needed groups scaling flawlessly visually mapping DD HH MM SS neatly avoiding screen clip bugs.
            if(cDays > 0) st.push(`${String(cDays).padStart(2,'0')}d`);
            if(cHrs > 0 || cDays > 0) st.push(`${String(cHrs).padStart(2,'0')}h`);
            st.push(`${String(cMins).padStart(2,'0')}m`);
            st.push(`${String(cSecs).padStart(2,'0')}s`);
            return { remain: T, read: st.join(':') };
        }

        const GlobalIntervalFire = () => { if (!CoreTmr.tInt) CoreTmr.tInt = setInterval(ExecGlobalRoutine, 1000); ExecGlobalRoutine(); }
        const KillGlobalInterval = () => { if(CoreTmr.tInt) { clearInterval(CoreTmr.tInt); CoreTmr.tInt=null; } }

        const ApplySleepUIClean = () => {
            clearTimeout(CoreTmr.outSlp); CoreTmr.outSlp = null; CoreTmr.endSlp = null;
            DOM.tRows.slR.classList.remove('active-timer-row');
            DOM.tmReads.slRead.classList.remove('visible');
            DOM.inCans.slC.classList.remove('visible');
            DOM.inBoxes.slInA.style.display = 'flex'; tgUpdateLedIndicator();
        }

        const ApplyStartUIClean = () => {
            clearTimeout(CoreTmr.outStr); CoreTmr.outStr = null; CoreTmr.endStr = null;
            DOM.tRows.stR.classList.remove('active-timer-row');
            DOM.tmReads.stRead.classList.remove('visible');
            DOM.inCans.stC.classList.remove('visible');
            DOM.inBoxes.stInA.style.display = 'flex'; tgUpdateLedIndicator();
        }
