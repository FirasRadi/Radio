<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0088cc;
            --bg: #0f1014;
            --card: rgba(255, 255, 255, 0.1);
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .player-container {
            width: 85%;
            max-width: 400px;
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo-area {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #1e1e1e, #111);
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        h2 { margin: 10px 0 5px; font-size: 22px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
            padding: 10px;
        }
        .btn:hover { color: var(--primary); transform: scale(1.1); }
        .btn-play {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        audio { width: 100%; height: 40px; margin-top: 10px; border-radius: 10px; }

        .support-btn {
            margin-top: 20px;
            background: #0070ba;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .support-btn:hover { background: #005ea6; }

        #loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loading"><i class="fas fa-spinner fa-spin fa-2x"></i></div>

    <div class="player-container">
        <div class="logo-area" id="station-logo">
            <i class="fas fa-radio"></i>
        </div>
        <h2 id="title">اختر دولة</h2>
        <p id="sub-title">جاري تحميل القنوات...</p>

        <div class="controls">
            <button class="btn" onclick="prevChannel()"><i class="fas fa-step-backward"></i></button>
            <button class="btn btn-play" onclick="togglePlay()"><i id="play-icon" class="fas fa-play"></i></button>
            <button class="btn" onclick="nextChannel()"><i class="fas fa-step-forward"></i></button>
        </div>

        <audio id="audio-player" onplay="updateIcon(true)" onpause="updateIcon(false)"></audio>

        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="support-btn">
            <i class="fab fa-paypal"></i> دعم المطور
        </a>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let channels = [];
        let currentIndex = 0;
        const audio = document.getElementById('audio-player');
        const playIcon = document.getElementById('play-icon');

        const urlParams = new URLSearchParams(window.location.search);
        const countryName = urlParams.get('country') || "Egypt";

        // جلب البيانات من IPTV-ORG
        async function fetchChannels() {
            try {
                const response = await fetch('https://iptv-org.github.io/api/channels.json');
                const data = await response.json();
                
                // فلترة القنوات حسب الدولة
                channels = data.filter(c => 
                    c.country.toLowerCase() === countryName.toLowerCase() || 
                    (c.languages && c.languages.includes(countryName.toLowerCase()))
                );

                if (channels.length > 0) {
                    loadChannel(0);
                } else {
                    document.getElementById('title').innerText = "لا يوجد قنوات";
                }
                document.getElementById('loading').style.display = 'none';
            } catch (err) {
                console.error("Error fetching channels", err);
                document.getElementById('loading').innerText = "خطأ في تحميل البيانات";
            }
        }

        function loadChannel(index) {
            const channel = channels[index];
            document.getElementById('title').innerText = channel.name;
            document.getElementById('sub-title').innerText = "قناة " + (index + 1) + " من " + channels.length;
            
            // تحديث اللوجو إذا وجد
            const logoArea = document.getElementById('station-logo');
            if (channel.logo) {
                logoArea.innerHTML = `<img src="${channel.logo}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
            } else {
                logoArea.innerHTML = `<i class="fas fa-radio"></i>`;
            }

            // ملاحظة: iptv-org قنواته تحتاج روابط بث (Streams) 
            // سنحاول جلب الرابط الأول للقناة
            const streamUrl = `https://iptv-org.github.io/api/streams.json`;
            fetch(streamUrl).then(res => res.json()).then(streams => {
                const stream = streams.find(s => s.channel === channel.id);
                if (stream) {
                    audio.src = stream.url;
                } else {
                    document.getElementById('sub-title').innerText = "رابط البث غير متوفر";
                }
            });
        }

        function togglePlay() {
            if (audio.paused) audio.play();
            else audio.pause();
        }

        function updateIcon(isPlaying) {
            playIcon.className = isPlaying ? "fas fa-pause" : "fas fa-play";
        }

        function nextChannel() {
            currentIndex = (currentIndex + 1) % channels.length;
            loadChannel(currentIndex);
        }

        function prevChannel() {
            currentIndex = (currentIndex - 1 + channels.length) % channels.length;
            loadChannel(currentIndex);
        }

        fetchChannels();
    </script>
</body>
</html>
