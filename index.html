<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio & TV Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    background:#0f1014;
    color:white;
    font-family:Arial;
    margin:0;
    text-align:center;
}

.player {
    width:90%;
    max-width:420px;
    margin:auto;
    margin-top:30px;
}

video {
    width:100%;
    background:black;
    border-radius:12px;
}
button {
    padding:10px;
    margin:5px;
}
</style>
</head>

<body>

<div class="player">

<h2 id="title">Loading...</h2>
<p id="sub"></p>

<video id="video" controls></video>

<div>
    <button onclick="prev()">⏮</button>
    <button onclick="toggle()">⏯</button>
    <button onclick="next()">⏭</button>
</div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.ready();

let countryCode = new URLSearchParams(location.search).get("code");
let countryName = new URLSearchParams(location.search).get("name");

let channels = [];
let streams = [];
let index = 0;

const video = document.getElementById("video");

async function init() {

    if (!countryCode) {
        document.getElementById("title").innerText = "No country";
        return;
    }

    const [chRes, stRes] = await Promise.all([
        fetch("https://iptv-org.github.io/api/channels.json").then(r => r.json()),
        fetch("https://iptv-org.github.io/api/streams.json").then(r => r.json())
    ]);

    streams = stRes;

    channels = chRes.filter(c =>
        c.country &&
        c.country.toLowerCase() === countryCode.toLowerCase()
    );

    if (!channels.length) {
        document.getElementById("title").innerText = "No channels";
        return;
    }

    load(0);
}

function load(i) {

    index = i;

    let ch = channels[i];

    document.getElementById("title").innerText = ch.name;
    document.getElementById("sub").innerText =
        countryName + " - " + (i+1) + "/" + channels.length;

    let stream = streams.find(s => s.channel === ch.id);

    if (!stream || !stream.url) {
        document.getElementById("sub").innerText = "No stream available";
        return;
    }

    play(stream.url);
}

function play(url) {

    if (Hls.isSupported() && url.includes(".m3u8")) {
        let hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }

    video.play();
}

function next() {
    index = (index + 1) % channels.length;
    load(index);
}

function prev() {
    index = (index - 1 + channels.length) % channels.length;
    load(index);
}

function toggle() {
    if (video.paused) video.play();
    else video.pause();
}

init();

</script>

</body>
</html>
