<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Aura Radio - Ultra Utility</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg: #0b0e14; --card: rgba(22, 27, 34, 0.9);
            --accent: #7928ca; --accent-light: #ff0080;
            --text: #ffffff; --sub: #8b949e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }

        /* Animated Ambient Background */
        .aura-bg { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 50% 50%, #1a1f2e 0%, #0b0e14 100%); }
        .aura-glow { position: absolute; width: 300px; height: 300px; background: var(--accent); filter: blur(120px); border-radius: 50%; opacity: 0.15; transition: 2s; }

        .app-container { width: 100%; max-width: 400px; padding: 20px; z-index: 10; transition: 0.5s; }
        .app-card { background: var(--card); backdrop-filter: blur(20px); border-radius: 35px; padding: 30px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 25px 50px rgba(0,0,0,0.5); position: relative; }

        /* Top Actions */
        .top-nav { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .nav-btn { background: rgba(255,255,255,0.05); border: none; color: var(--sub); width: 42px; height: 42px; border-radius: 12px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-btn.active { color: var(--accent-light); background: rgba(255, 0, 128, 0.1); }

        /* Main Display */
        .display-section { text-align: center; margin-bottom: 30px; }
        .logo-box { width: 140px; height: 140px; margin: 0 auto 20px; border-radius: 30px; background: #000; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 50px; color: var(--accent); }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .logo-box.pulse { animation: pulseLogo 2s infinite; }
        @keyframes pulseLogo { 0% { transform: scale(1); } 50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(121, 40, 202, 0.4); } 100% { transform: scale(1); } }

        .station-title { font-size: 22px; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .station-tags { font-size: 13px; color: var(--sub); letter-spacing: 1px; }

        /* Controls */
        .main-controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 30px; }
        .play-btn { width: 75px; height: 75px; border-radius: 50%; background: linear-gradient(45deg, var(--accent), var(--accent-light)); border: none; color: white; font-size: 28px; cursor: pointer; box-shadow: 0 10px 25px rgba(121, 40, 202, 0.4); transition: 0.3s; }
        .play-btn:active { transform: scale(0.9); }
        .secondary-btn { background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; opacity: 0.7; transition: 0.3s; }
        .secondary-btn:hover { opacity: 1; transform: scale(1.1); }

        /* --- THE GIFT: Ambient Mixer Panel --- */
        .mixer-panel { display: none; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 15px; margin-bottom: 20px; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .mixer-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .mixer-row i { width: 20px; font-size: 14px; color: var(--sub); }
        .mixer-row input { flex: 1; height: 4px; accent-color: var(--accent-light); cursor: pointer; }

        /* Search Overlay */
        .search-bar { display: none; margin-bottom: 20px; }
        .search-bar input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 12px 15px; border-radius: 12px; color: white; outline: none; }

        /* Status & Badge */
        .info-footer { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--sub); padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); }
        .badge { background: var(--accent); color: white; padding: 2px 8px; border-radius: 6px; font-weight: 600; }

        /* Zen Mode Class */
        .zen-active .top-nav, .zen-active .main-controls, .zen-active .mixer-panel, .zen-active .info-footer, .zen-active .secondary-btn { display: none !important; }
        .zen-active .app-card { background: transparent; border: none; box-shadow: none; }
        .zen-active .station-title { font-size: 28px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="aura-bg"><div class="aura-glow" id="glow"></div></div>

    <div class="app-container" id="appContainer">
        <div class="app-card">
            
            <div class="top-nav">
                <button class="nav-btn" id="searchToggle"><i class="fas fa-search"></i></button>
                <button class="nav-btn" id="mixerToggle" title="Ambient Mixer"><i class="fas fa-sliders-h"></i></button>
                <button class="nav-btn" id="zenToggle" title="Zen Mode"><i class="fas fa-spa"></i></button>
                <button class="nav-btn" id="surpriseBtn" title="Surprise Discovery"><i class="fas fa-random"></i></button>
            </div>

            <div class="search-bar" id="searchBar">
                <input type="text" id="searchInput" placeholder="Search by name, genre, language...">
            </div>

            <!-- Ambient Mixer Panel -->
            <div class="mixer-panel" id="mixerPanel">
                <div class="mixer-row">
                    <i class="fas fa-cloud-showers-heavy"></i>
                    <input type="range" id="rainVol" min="0" max="1" step="0.1" value="0">
                </div>
                <div class="mixer-row">
                    <i class="fas fa-fire"></i>
                    <input type="range" id="fireVol" min="0" max="1" step="0.1" value="0">
                </div>
                <div class="mixer-row">
                    <i class="fas fa-coffee"></i>
                    <input type="range" id="cafeVol" min="0" max="1" step="0.1" value="0">
                </div>
            </div>

            <div class="display-section">
                <div class="logo-box" id="logoBox"><i class="fas fa-broadcast-tower"></i></div>
                <h1 class="station-title" id="stationTitle">Ready to Explore</h1>
                <p class="station-tags" id="stationTags">Select a country or use Search</p>
            </div>

            <div class="main-controls">
                <button class="secondary-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                <button class="play-btn" id="playBtn"><i class="fas fa-play" id="playIcon"></i></button>
                <button class="secondary-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="info-footer">
                <span id="statusText">SYSTEM IDLE</span>
                <span class="badge" id="qualityBadge">HQ</span>
            </div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="mainAudio" crossorigin="anonymous"></audio>
    <audio id="rainAudio" loop src="https://www.soundjay.com/nature/rain-01.mp3"></audio>
    <audio id="fireAudio" loop src="https://www.soundjay.com/nature/fire-crackling-01.mp3"></audio>
    <audio id="cafeAudio" loop src="https://www.soundjay.com/misc/sounds/coffee-shop-1.mp3"></audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        const state = {
            masterList: [],
            activeList: [],
            currentIndex: 0,
            isPlaying: false,
            isDiscovery: false,
            country: (tg.initDataUnsafe.start_param || new URLSearchParams(window.location.search).get('name') || '').replace(/_/g, ' ')
        };

        const ui = {
            play: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            title: document.getElementById('stationTitle'),
            tags: document.getElementById('stationTags'),
            logo: document.getElementById('logoBox'),
            status: document.getElementById('statusText'),
            glow: document.getElementById('glow'),
            mixerPanel: document.getElementById('mixerPanel'),
            searchBar: document.getElementById('searchBar'),
            searchInput: document.getElementById('searchInput'),
            app: document.getElementById('appContainer')
        };

        // --- THE GIFT: Ambient Mixing Logic ---
        const ambient = {
            rain: document.getElementById('rainAudio'),
            fire: document.getElementById('fireAudio'),
            cafe: document.getElementById('cafeAudio')
        };

        ['rain', 'fire', 'cafe'].forEach(sound => {
            document.getElementById(`${sound}Vol`).addEventListener('input', (e) => {
                const vol = e.target.value;
                ambient[sound].volume = vol;
                if (vol > 0 && ambient[sound].paused) ambient[sound].play();
                else if (vol == 0) ambient[sound].pause();
                tg.HapticFeedback.selectionChanged();
            });
        });

        // --- Discovery Mode (Surprise Me) ---
        let discoveryInterval;
        document.getElementById('surpriseBtn').onclick = function() {
            state.isDiscovery = !state.isDiscovery;
            this.classList.toggle('active');
            if(state.isDiscovery) {
                ui.status.textContent = "DISCOVERY MODE ACTIVE";
                nextStation();
                discoveryInterval = setInterval(nextStation, 15000); // Change every 15s
            } else {
                clearInterval(discoveryInterval);
                ui.status.textContent = "DISCOVERY STOPPED";
            }
            tg.HapticFeedback.impactOccurred('medium');
        };

        // --- Zen Mode ---
        document.getElementById('zenToggle').onclick = function() {
            ui.app.classList.toggle('zen-active');
            this.classList.toggle('active');
            tg.HapticFeedback.impactOccurred('light');
        };

        // --- Core Radio Logic ---
        async function fetchRadio(name) {
            ui.status.textContent = "FETCHING FREQUENCIES...";
            try {
                let res = await fetch(`https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(name)}?order=votes&reverse=true`);
                let data = await res.json();
                if(!data.length) {
                    res = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?order=votes&reverse=true`);
                    data = await res.json();
                }
                return data.filter(s => (s.url_resolved || s.url)?.startsWith('https://'));
            } catch (e) { return []; }
        }

        function loadStation(index) {
            if(!state.activeList.length) return;
            const s = state.activeList[index];
            ui.title.textContent = s.name;
            ui.tags.textContent = s.tags ? s.tags.split(',').slice(0, 3).join(' • ').toUpperCase() : 'GLOBAL LIVE';
            
            if(s.favicon) {
                ui.logo.innerHTML = `<img src="${s.favicon}" onerror="this.outerHTML='<i class=\\'fas fa-broadcast-tower\\'></i>'">`;
            } else {
                ui.logo.innerHTML = '<i class="fas fa-broadcast-tower"></i>';
            }

            const audio = document.getElementById('mainAudio');
            audio.src = s.url_resolved || s.url;
            
            // Background Glow change based on name
            const hue = s.name.length * 137 % 360;
            ui.glow.style.background = `hsl(${hue}, 70%, 50%)`;
            
            if(state.isPlaying) playStation();
        }

        async function playStation() {
            const audio = document.getElementById('mainAudio');
            try {
                ui.status.textContent = "CONNECTING...";
                await audio.play();
                state.isPlaying = true;
                ui.playIcon.className = 'fas fa-pause';
                ui.logo.classList.add('pulse');
                ui.status.textContent = "LIVE STREAMING";
            } catch (e) {
                ui.status.textContent = "SIGNAL LOST - SKIPPING";
                setTimeout(nextStation, 1000);
            }
        }

        function nextStation() {
            state.currentIndex = (state.currentIndex + 1) % state.activeList.length;
            loadStation(state.currentIndex);
            tg.HapticFeedback.selectionChanged();
        }

        ui.play.onclick = () => {
            const audio = document.getElementById('mainAudio');
            if(audio.paused) {
                state.isPlaying = true;
                playStation();
            } else {
                audio.pause();
                state.isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('pulse');
                ui.status.textContent = "PAUSED";
            }
            tg.HapticFeedback.impactOccurred('medium');
        };

        document.getElementById('nextBtn').onclick = nextStation;
        document.getElementById('prevBtn').onclick = () => {
            state.currentIndex = (state.currentIndex - 1 + state.activeList.length) % state.activeList.length;
            loadStation(state.currentIndex);
        };

        // --- Search Utility ---
        document.getElementById('searchToggle').onclick = () => {
            ui.searchBar.style.display = ui.searchBar.style.display === 'block' ? 'none' : 'block';
            ui.searchInput.focus();
        };

        ui.searchInput.oninput = (e) => {
            const q = e.target.value.toLowerCase();
            state.activeList = state.masterList.filter(s => s.name.toLowerCase().includes(q) || (s.tags && s.tags.toLowerCase().includes(q)));
            state.currentIndex = 0;
            loadStation(0);
        };

        document.getElementById('mixerToggle').onclick = () => {
            ui.mixerPanel.style.display = ui.mixerPanel.style.display === 'flex' ? 'none' : 'flex';
            ui.mixerPanel.style.flexDirection = 'column';
        };

        // Boot App
        async function boot() {
            if(!state.country) {
                ui.title.textContent = "No Region";
                ui.status.textContent = "Use Bot to select country";
                return;
            }
            const data = await fetchRadio(state.country);
            if(data.length) {
                state.masterList = data;
                state.activeList = [...data];
                loadStation(0);
            } else {
                ui.title.textContent = "Offline";
                ui.status.textContent = "No stations found";
            }
        }

        boot();
    </script>
</body>
</html>
