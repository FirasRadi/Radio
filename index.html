<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Global Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-base: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* يجعل البطاقة في المنتصف والأسفل يتبع */
            padding: 20px;
            overflow-x: hidden;
            overflow-y: auto; /* يسمح بالتمرير إذا لزم الأمر */
        }

        /* ── الحاوية الرئيسية للبطاقة + الأزرار السفلية ── */
        .app-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 420px;
            margin: auto 0; /* يدفع المحتوى للتمدد عموديًا */
        }

        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            border: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .header-country {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .icon-btn {
            background: var(--border-glass);
            border: none;
            color: var(--text-sub);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-btn.has-text {
            width: auto;
            padding: 0 14px;
            border-radius: 22px;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: scale(1.05);
        }

        .header-timer-text {
            display: none;
            font-family: monospace;
            font-size: 13px;
            font-weight: 700;
            margin-left: 6px;
            color: var(--warning);
        }
        .icon-btn.has-text .header-timer-text {
            display: inline-block;
        }

        .icon-btn.active-timer {
            color: var(--warning);
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            animation: pulseWarning 2s infinite;
        }
        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary);
            overflow: hidden;
            border: 4px solid var(--border-glass);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }
        .logo img, .logo canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
        }
        .logo img {
            background-color: #fff;
            padding: 4px;
        }
        .logo canvas {
            background: transparent;
        }
        .logo.playing {
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            /* لا دوران للـ canvas، فقط الشخص يرقص بداخله */
        }
        /* نلغي animation spinDisc للراقص، لأننا لا نريده أن يدور */
        .logo.playing.dancer {
            animation: none;
        }

        .station-name {
            font-size: 20px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .station-counter {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .controls {
            display: flex; justify-content: center; align-items: center; gap: 25px; margin-top: 10px;
        }
        .ctrl-btn { border: none; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .nav-btn {
            width: 46px; height: 46px; background: rgba(255, 255, 255, 0.05);
            color: var(--text-main); font-size: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); transform: scale(1.1); }

        .play-btn {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border-radius: 50%; font-size: 24px; color: #fff; box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
            display: flex; align-items: center; justify-content: center; padding-left: 3px; 
        }
        .play-btn:hover:not(:disabled) { transform: scale(1.08) translateY(-2px); }
        .play-btn .fa-pause { padding-left: 0; }

        .actions-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.25); padding: 16px 20px; border-radius: 20px;
        }
        .volume-container { display: flex; align-items: center; gap: 12px; flex-grow: 1; margin-right: 15px; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.15); border-radius: 4px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }

        .action-btn { background: none; border: none; font-size: 22px; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
        .action-btn:hover { color: #fff; transform: scale(1.1); }
        .action-btn.active-fav { color: var(--danger); animation: heartBeat 0.4s ease; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .footer-note { 
            font-size: 11px; 
            color: var(--danger); 
            margin-top: -5px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* ── الأزرار السفلية (PayPal + مشاركة) ── */
        .bottom-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: auto; /* يدفعهم للأسفل دائمًا */
            padding: 10px 0 5px;
            width: 100%;
            max-width: 420px;
        }

        .paypal-wrapper {
            position: relative; /* لم تعد fixed */
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .paypal-svg { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .paypal-svg text { 
            font-size: 11.5px; 
            fill: var(--text-sub); font-family: monospace; letter-spacing: 0.5px; font-weight: bold; 
        }
        .donate-btn {
            width: 50px; height: 50px; background: #0070ba; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4); position: relative; z-index: 2; transition: 0.3s;
        }
        .donate-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 112, 186, 0.6); }

        .share-btn {
            width: 50px; height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.6);
        }

        /* ── Bottom Sheet Timer ── */
        .sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 140; opacity: 0; visibility: hidden; transition: 0.3s ease;
        }
        .sheet-overlay.open { opacity: 1; visibility: visible; }

        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #1e293b; border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 20px 24px 30px; z-index: 150; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            transition: bottom 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; flex-direction: column; gap: 15px;
        }
        .bottom-sheet.open { bottom: 0; }

        .sheet-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 5px;
        }
        .sheet-header-timer {
            color: var(--warning); font-family: monospace; font-size: 15px; margin-left: 8px; font-weight: 700;
        }
        .close-sheet { background: none; border: none; color: var(--text-sub); font-size: 20px; cursor: pointer; }
        
        .compact-timer-row {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass);
            border-radius: 16px; padding: 12px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .timer-info {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; font-weight: 600;
        }
        .timer-info-left { display: flex; align-items: center; gap: 8px; }
        
        .digital-timer {
            font-family: monospace; font-size: 18px; font-weight: 700; color: var(--warning);
            background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 6px; display: none;
        }
        .digital-timer.visible { display: block; }

        .timer-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .timer-actions button {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: 0.2s; flex: 1; text-align: center;
        }
        .timer-actions button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .cancel-timer-btn {
            background: rgba(239, 68, 68, 0.15); color: var(--danger); border: none;
            padding: 8px; border-radius: 12px; font-size: 13px; font-weight: 600;
            cursor: pointer; width: 100%; display: none; transition: 0.2s; margin-top: 5px;
        }
        .cancel-timer-btn.visible { display: block; }
        .cancel-timer-btn:hover { background: var(--danger); color: #fff; }

        /* ── Modal (Favorites) ── */
        .modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200;
            display: flex; flex-direction: column; padding: 30px 20px; backdrop-filter: blur(12px); opacity: 0; visibility: hidden; transition: 0.3s ease;
        }
        .modal.open { opacity: 1; visibility: visible; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border-glass); }
        .close-modal { background: none; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .close-modal:hover { color: var(--danger); transform: rotate(90deg); }
        
        .fav-list { flex: 1; overflow-y: auto; list-style: none; padding-right: 5px; }
        .fav-list::-webkit-scrollbar { width: 5px; }
        .fav-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .fav-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 14px; margin-bottom: 10px; border: 1px solid var(--border-glass); transition: 0.3s ease; }
        .fav-item:hover { border-color: var(--primary); background: rgba(59,130,246,0.1); transform: translateX(5px); }
        .fav-item-content { display: flex; align-items: center; flex: 1; cursor: pointer; gap: 15px; overflow: hidden; }
        .fav-play-icon { color: var(--primary); font-size: 22px; }
        .fav-info { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size:14px; }
        
        .fav-remove { color: var(--danger); background: rgba(239, 68, 68, 0.15); border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .fav-remove:hover { background: var(--danger); color: #fff; }

        #loading { position: fixed; inset: 0; background: var(--bg-base); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; color: var(--primary); font-weight: 600; letter-spacing: 2px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(59, 130, 246, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }

        /* تنبيه النسخ */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="loading">
        <div class="spinner"></div>
        <span>FETCHING STATIONS...</span>
    </div>

    <!-- الحاوية الرئيسية (بطاقة + أزرار سفلية) -->
    <div class="app-container">
        <!-- بطاقة المشغل -->
        <div class="player-card">
            <div class="header">
                <button class="icon-btn" id="toggleTimerBtn" title="Timers">
                    <i class="fas fa-stopwatch"></i>
                    <span id="mainHeaderTimer" class="header-timer-text"></span>
                </button>
                
                <div class="header-country" id="headerCountry">Global Radio</div>
                
                <button class="icon-btn" id="openFavsBtn" title="Saved Stations"><i class="fas fa-list-ul"></i></button>
            </div>

            <div class="logo-container">
                <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
                <div class="station-name" id="stationTitle">Loading...</div>
                <div class="station-counter" id="stationSub">Initializing</div>
            </div>

            <div class="controls">
                <button class="ctrl-btn nav-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
                <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
                <button class="ctrl-btn nav-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
            </div>

            <div class="actions-bar">
                <div class="volume-container">
                    <i class="fas fa-volume-down" style="color:var(--text-sub); font-size:14px;"></i>
                    <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                    <i class="fas fa-volume-up" style="color:var(--text-sub); font-size:16px;"></i>
                </div>
                <button class="action-btn" id="saveFavBtn" title="Save Station"><i class="far fa-heart"></i></button>
            </div>

            <div class="footer-note">Change country inside the bot chat.</div>
            <audio id="audioPlayer" preload="metadata"></audio>
        </div>

        <!-- الأزرار السفلية: PayPal + مشاركة -->
        <div class="bottom-actions">
            <div class="paypal-wrapper">
                <svg class="paypal-svg" viewBox="0 0 100 100">
                    <path id="curve" d="M 18 50 A 32 32 0 0 1 82 50" fill="transparent" />
                    <text>
                        <textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵘᵖᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath>
                    </text>
                </svg>
                <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn">
                    <i class="fab fa-paypal"></i>
                </a>
            </div>
            <button class="share-btn" id="shareBtn" title="Share this station">
                <i class="fas fa-share-alt"></i>
            </button>
        </div>
    </div>

    <!-- Bottom Sheet Timer -->
    <div class="sheet-overlay" id="timerOverlay"></div>
    <div class="bottom-sheet" id="timerSheet">
        <div class="sheet-header">
            <div>
                <i class="fas fa-stopwatch" style="color:var(--primary); margin-right:5px;"></i> Auto Timers
                <span id="sheetHeaderTimer" class="sheet-header-timer"></span>
            </div>
            <button class="close-sheet" id="closeTimerBtn"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="compact-timer-row">
            <div class="timer-info">
                <div class="timer-info-left"><i class="fas fa-moon" style="color:#60a5fa"></i> Sleep</div>
                <span class="digital-timer" id="sleepDigital">00:00</span>
            </div>
            <div class="timer-actions" id="sleepActions">
                <button data-min="1">1m</button>
                <button data-min="5">5m</button>
                <button data-min="15">15m</button>
                <button data-min="30">30m</button>
                <button data-min="60">1h</button>
            </div>
            <button class="cancel-timer-btn" id="sleepCancelBtn">Cancel Sleep Timer</button>
        </div>

        <div class="compact-timer-row">
            <div class="timer-info">
                <div class="timer-info-left"><i class="fas fa-clock" style="color:#4ade80"></i> Start</div>
                <span class="digital-timer" id="startDigital">00:00</span>
            </div>
            <div class="timer-actions" id="startActions">
                <button data-min="1">1m</button>
                <button data-min="5">5m</button>
                <button data-min="15">15m</button>
                <button data-min="30">30m</button>
                <button data-min="60">1h</button>
            </div>
            <button class="cancel-timer-btn" id="startCancelBtn">Cancel Start Timer</button>
        </div>
    </div>

    <!-- Favorites Modal -->
    <div class="modal" id="favModal">
        <div class="modal-header">
            <span>Your Favorites</span>
            <button class="close-modal" id="closeFavsBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <!-- Toast للنسخ -->
    <div class="toast" id="toast"></div>

    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }

        const DOM = {
            loading: document.getElementById('loading'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            vol: document.getElementById('volumeSlider'),
            saveBtn: document.getElementById('saveFavBtn'),
            openFavs: document.getElementById('openFavsBtn'),
            closeFavs: document.getElementById('closeFavsBtn'),
            favModal: document.getElementById('favModal'),
            favList: document.getElementById('favList'),
            
            headerCountry: document.getElementById('headerCountry'),
            mainHeaderTimer: document.getElementById('mainHeaderTimer'),
            
            timersToggleBtn: document.getElementById('toggleTimerBtn'),
            timerOverlay: document.getElementById('timerOverlay'),
            timerSheet: document.getElementById('timerSheet'),
            closeTimerBtn: document.getElementById('closeTimerBtn'),
            sheetHeaderTimer: document.getElementById('sheetHeaderTimer'),
            
            sleepDigital: document.getElementById('sleepDigital'),
            sleepActions: document.getElementById('sleepActions'),
            sleepCancelBtn: document.getElementById('sleepCancelBtn'),
            
            startDigital: document.getElementById('startDigital'),
            startActions: document.getElementById('startActions'),
            startCancelBtn: document.getElementById('startCancelBtn'),

            shareBtn: document.getElementById('shareBtn'),
            toast: document.getElementById('toast')
        };

        let stations = []; 
        let currentIndex = 0; 
        let isPlaying = false; 
        
        let savedStations = [];
        try {
            savedStations = JSON.parse(localStorage.getItem('radio_saved_list')) || [];
        } catch (e) { savedStations = []; }

        let errorCount = 0; 
        let isExternalFavPlaying = false; 
        let autoSkipInProgress = false; 
        let skipTimeout = null;

        const PARAMS = new URLSearchParams(window.location.search);
        const TG_PARAM = tg?.initDataUnsafe?.start_param || '';
        let targetRaw = TG_PARAM.replace(/_/g, ' ') || PARAMS.get('name') || PARAMS.get('country') || '';
        const TARGET_COUNTRY = targetRaw.trim();

        // ── Timer Logic (كما هي) ──
        let timers = { sleepEnd: null, startEnd: null, tickInt: null, sleepTo: null, startTo: null };
        const toggleTimerSheet = () => { /* ... بدون تغيير ... */ };
        DOM.timersToggleBtn.addEventListener('click', toggleTimerSheet);
        DOM.closeTimerBtn.addEventListener('click', toggleTimerSheet);
        DOM.timerOverlay.addEventListener('click', toggleTimerSheet);

        const formatTime = (totalSeconds) => {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
        };
        const getRemaining = (endMs) => (!endMs ? { total: 0 } : { total: Math.max(0, Math.round((endMs - Date.now()) / 1000)) });
        const updateHeaderTimerUI = () => { /* ... */ };
        const stopEngine = () => { if(timers.tickInt) { clearInterval(timers.tickInt); timers.tickInt = null; } };
        const startEngine = () => { if (!timers.tickInt) timers.tickInt = setInterval(timerTick, 1000); timerTick(); };
        const clearSleepUI = () => { clearTimeout(timers.sleepTo); timers.sleepTo = null; timers.sleepEnd = null; DOM.sleepDigital.classList.remove('visible'); DOM.sleepCancelBtn.classList.remove('visible'); updateHeaderTimerUI(); };
        const clearStartUI = () => { clearTimeout(timers.startTo); timers.startTo = null; timers.startEnd = null; DOM.startDigital.classList.remove('visible'); DOM.startCancelBtn.classList.remove('visible'); updateHeaderTimerUI(); };
        const timerTick = () => { /* ... */ };
        DOM.sleepActions.addEventListener('click', e => { /* ... */ });
        DOM.startActions.addEventListener('click', e => { /* ... */ });
        DOM.sleepCancelBtn.addEventListener('click', clearSleepUI); 
        DOM.startCancelBtn.addEventListener('click', clearStartUI);

        // ── Radio Service ──
        const radioService = {
            async fetchByStr(country) {
                try {
                    const endpoints = [ 
                        `https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(country)}?order=votes&reverse=true`,
                        `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(country)}?order=votes&reverse=true`
                    ];
                    for (const url of endpoints) {
                        const res = await fetch(url);
                        if (res.ok) {
                            const data = await res.json();
                            const valids = data.filter(s => (s.url_resolved || s.url).startsWith('https://'));
                            if(valids.length > 0) return valids;
                        }
                    }
                    return [];
                } catch(e) { return []; }
            }
        };

        const audioController = { /* ... كما هي ... */ };

        // ── الراقص المرعب (Canvas Dancer) ──
        let dancerAnimFrame = null;
        let dancerCanvas = null;
        let dancerCtx = null;
        let dancerStationId = '';

        const stopDancer = () => {
            if (dancerAnimFrame) {
                cancelAnimationFrame(dancerAnimFrame);
                dancerAnimFrame = null;
            }
            if (dancerCanvas) {
                dancerCanvas.remove();
                dancerCanvas = null;
                dancerCtx = null;
            }
            DOM.logo.classList.remove('dancer');
        };

        const startDancer = (stationId) => {
            stopDancer();
            if (!stationId) return;
            
            // أنشئ canvas جديد داخل الشعار
            dancerCanvas = document.createElement('canvas');
            dancerCanvas.width = 120;
            dancerCanvas.height = 120;
            dancerCanvas.style.width = '100%';
            dancerCanvas.style.height = '100%';
            dancerCanvas.style.borderRadius = '50%';
            dancerCtx = dancerCanvas.getContext('2d');
            
            // نظف الشعار وأضف canvas
            DOM.logo.innerHTML = '';
            DOM.logo.appendChild(dancerCanvas);
            DOM.logo.classList.add('dancer'); // نمنع دوران الشعار نفسه
            dancerStationId = stationId;

            // معاملات فريدة مستمدة من stationId (نحولها إلى أرقام)
            const hash = (str) => {
                let h = 0;
                for (let i = 0; i < str.length; i++) {
                    h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
                }
                return Math.abs(h);
            };
            const seed = hash(stationId);
            
            // مولد أرقام شبه عشوائي معتمد على seed
            const pseudoRandom = (function(s) {
                return function() {
                    s = (s * 1664525 + 1013904223) & 0xFFFFFFFF;
                    return (s >>> 0) / 0xFFFFFFFF;
                };
            })(seed);
            
            // بارامترات الرقصة الفريدة
            const params = {
                // ترددات مختلفة للأطراف (دورات في الثانية مضروبة في 2π)
                freqLeftArm: 1.5 + pseudoRandom() * 3,
                freqRightArm: 1.8 + pseudoRandom() * 3.2,
                freqLeftLeg: 2.1 + pseudoRandom() * 2.8,
                freqRightLeg: 2.4 + pseudoRandom() * 2.5,
                // سعة الحركة (بالراديان) لكل مفصل
                ampShoulder: 0.3 + pseudoRandom() * 0.7,
                ampElbow: 0.3 + pseudoRandom() * 0.7,
                ampHip: 0.2 + pseudoRandom() * 0.6,
                ampKnee: 0.2 + pseudoRandom() * 0.6,
                // إزاحة طور عشوائية
                phaseLeftArm: pseudoRandom() * Math.PI * 2,
                phaseRightArm: pseudoRandom() * Math.PI * 2,
                phaseLeftLeg: pseudoRandom() * Math.PI * 2,
                phaseRightLeg: pseudoRandom() * Math.PI * 2,
                // هل يهتز الجذع أفقياً؟
                bodyShake: pseudoRandom() > 0.5,
                shakeFreq: 8 + pseudoRandom() * 12,
                shakeAmp: 1 + pseudoRandom() * 2,
                // وميض العينين
                eyeBlink: pseudoRandom() > 0.6,
                blinkInterval: 1000 + pseudoRandom() * 3000,
            };

            let startTime = performance.now();
            let lastBlink = 0;
            let blinkState = 0;

            const drawDancer = (now) => {
                if (!dancerCtx) return;
                const ctx = dancerCtx;
                const w = 120, h = 120;
                ctx.clearRect(0, 0, w, h);
                
                // خلفية دائرية شفافة قليلاً
                ctx.save();
                ctx.beginPath();
                ctx.arc(60, 60, 56, 0, Math.PI*2);
                ctx.clip();
                
                const t = (now - startTime) / 1000; // الزمن بالثواني
                
                // مركز الجذع (أعلى قليلاً)
                const cx = 60, cyBase = 50;
                let bodyOffsetX = 0;
                if (params.bodyShake) {
                    bodyOffsetX = Math.sin(t * params.shakeFreq) * params.shakeAmp;
                }
                const bodyX = cx + bodyOffsetX;
                const bodyY = cyBase;
                
                // أطوال الأجزاء
                const headRadius = 7;
                const neckY = bodyY - 15;
                const shoulderY = neckY;
                const hipY = bodyY + 20;
                const torsoLen = hipY - shoulderY;
                
                // حساب زوايا الأطراف باستخدام دوال مثلثية بترددات وسعات فريدة
                const angleLShoulder = Math.sin(t * params.freqLeftArm + params.phaseLeftArm) * params.ampShoulder;
                const angleRShoulder = Math.sin(t * params.freqRightArm + params.phaseRightArm) * params.ampShoulder;
                const angleLElbow = Math.sin(t * params.freqLeftArm * 1.3 + params.phaseLeftArm + 1) * params.ampElbow;
                const angleRElbow = Math.sin(t * params.freqRightArm * 1.3 + params.phaseRightArm + 1) * params.ampElbow;
                
                const angleLHip = Math.sin(t * params.freqLeftLeg + params.phaseLeftLeg) * params.ampHip;
                const angleRHip = Math.sin(t * params.freqRightLeg + params.phaseRightLeg) * params.ampHip;
                const angleLKnee = Math.sin(t * params.freqLeftLeg * 1.2 + params.phaseLeftLeg + 0.5) * params.ampKnee;
                const angleRKnee = Math.sin(t * params.freqRightLeg * 1.2 + params.phaseRightLeg + 0.5) * params.ampKnee;
                
                // نقاط التثبيت
                const shoulderPos = { x: bodyX, y: shoulderY };
                const hipPos = { x: bodyX, y: hipY };
                
                // رسم الخطوط المضيئة
                ctx.save();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2.2;
                ctx.shadowColor = '#3b82f6';
                ctx.shadowBlur = 8;
                ctx.lineCap = 'round';
                
                // الرأس (دائرة)
                ctx.beginPath();
                ctx.arc(bodyX, neckY - headRadius + 2, headRadius, 0, Math.PI*2);
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 10;
                ctx.fill();
                // العينين (تومض أحياناً)
                if (params.eyeBlink) {
                    if (now - lastBlink > params.blinkInterval) {
                        lastBlink = now;
                        blinkState = 1; // ابدأ وميض
                    }
                    if (blinkState > 0) {
                        blinkState -= 0.05;
                        if (blinkState < 0) blinkState = 0;
                    }
                    const eyeY = neckY - headRadius + 2;
                    ctx.fillStyle = '#0f172a';
                    ctx.shadowBlur = 0;
                    if (blinkState > 0.5) {
                        // عيون مغلقة (خط)
                        ctx.fillRect(bodyX-4, eyeY-1, 3, 2);
                        ctx.fillRect(bodyX+1, eyeY-1, 3, 2);
                    } else {
                        // عيون مفتوحة (نقط)
                        ctx.beginPath();
                        ctx.arc(bodyX-2.5, eyeY, 1.2, 0, Math.PI*2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(bodyX+2.5, eyeY, 1.2, 0, Math.PI*2);
                        ctx.fill();
                    }
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 10;
                }
                
                // الجذع
                ctx.beginPath();
                ctx.moveTo(shoulderPos.x, shoulderPos.y);
                ctx.lineTo(hipPos.x, hipPos.y);
                ctx.stroke();
                
                // الذراع اليسرى
                const elbowL = {
                    x: shoulderPos.x + Math.sin(angleLShoulder) * 18,
                    y: shoulderPos.y + Math.cos(angleLShoulder) * 18
                };
                const handL = {
                    x: elbowL.x + Math.sin(angleLShoulder + angleLElbow) * 16,
                    y: elbowL.y + Math.cos(angleLShoulder + angleLElbow) * 16
                };
                ctx.beginPath();
                ctx.moveTo(shoulderPos.x, shoulderPos.y);
                ctx.lineTo(elbowL.x, elbowL.y);
                ctx.lineTo(handL.x, handL.y);
                ctx.stroke();
                
                // الذراع اليمنى
                const elbowR = {
                    x: shoulderPos.x + Math.sin(angleRShoulder) * 18,
                    y: shoulderPos.y + Math.cos(angleRShoulder) * 18
                };
                const handR = {
                    x: elbowR.x + Math.sin(angleRShoulder + angleRElbow) * 16,
                    y: elbowR.y + Math.cos(angleRShoulder + angleRElbow) * 16
                };
                ctx.beginPath();
                ctx.moveTo(shoulderPos.x, shoulderPos.y);
                ctx.lineTo(elbowR.x, elbowR.y);
                ctx.lineTo(handR.x, handR.y);
                ctx.stroke();
                
                // الرجل اليسرى
                const kneeL = {
                    x: hipPos.x + Math.sin(angleLHip) * 20,
                    y: hipPos.y + Math.cos(angleLHip) * 20
                };
                const footL = {
                    x: kneeL.x + Math.sin(angleLHip + angleLKnee) * 18,
                    y: kneeL.y + Math.cos(angleLHip + angleLKnee) * 18
                };
                ctx.beginPath();
                ctx.moveTo(hipPos.x, hipPos.y);
                ctx.lineTo(kneeL.x, kneeL.y);
                ctx.lineTo(footL.x, footL.y);
                ctx.stroke();
                
                // الرجل اليمنى
                const kneeR = {
                    x: hipPos.x + Math.sin(angleRHip) * 20,
                    y: hipPos.y + Math.cos(angleRHip) * 20
                };
                const footR = {
                    x: kneeR.x + Math.sin(angleRHip + angleRKnee) * 18,
                    y: kneeR.y + Math.cos(angleRHip + angleRKnee) * 18
                };
                ctx.beginPath();
                ctx.moveTo(hipPos.x, hipPos.y);
                ctx.lineTo(kneeR.x, kneeR.y);
                ctx.lineTo(footR.x, footR.y);
                ctx.stroke();
                
                ctx.restore();
                
                dancerAnimFrame = requestAnimationFrame(drawDancer);
            };
            
            dancerAnimFrame = requestAnimationFrame(drawDancer);
        };

        // ── UIController المعدل لاستخدام الراقص ──
        const UIController = {
            loadIndex(index) {
                if (!stations.length) return; 
                currentIndex = index;
                const s = stations[currentIndex]; 
                isExternalFavPlaying = false;
                
                this.updateUI(s.name, `Station ${currentIndex + 1} / ${stations.length}`, s.favicon, s.stationuuid);
                DOM.audio.src = s.url_resolved || s.url || '';
                this.enableControls(); 
                checkFavState(s.stationuuid); 
                
                if (isPlaying) audioController.play();
            },
            loadExternalFav(fav) {
                isExternalFavPlaying = true; 
                this.updateUI(fav.name, "Saved Station", fav.img, fav.id);
                DOM.audio.src = fav.url; 
                this.enableControls(); 
                checkFavState(fav.id); 
                audioController.play();
            },
            updateUI(title, subtitle, imgSrc, stationId) {
                DOM.title.textContent = title || 'Unknown'; 
                DOM.sub.textContent = subtitle;
                
                // إذا كان هناك شعار صحيح نحمّله، وإلا نبدأ الراقص
                if (imgSrc) {
                    const img = new Image(); 
                    img.src = imgSrc; 
                    img.onload = () => {
                        stopDancer();
                        DOM.logo.innerHTML = `<img src="${imgSrc}"/>`;
                    };
                    img.onerror = () => {
                        // فشل التحميل، استخدم الراقص
                        startDancer(stationId || 'default');
                    };
                } else {
                    startDancer(stationId || 'default');
                }
                DOM.audio.volume = DOM.vol.value;
            },
            enableControls() { 
                [DOM.playBtn, DOM.nextBtn, DOM.prevBtn].forEach(b => b.disabled = false); 
            },
            emptyState() { 
                DOM.title.textContent = 'No Stations Found'; 
                DOM.sub.textContent = 'Please enter a valid country in bot';
                stopDancer();
                DOM.logo.innerHTML = '<i class="fas fa-times-circle" style="color:var(--danger)"></i>';
            }
        };

        // ── مشاركة الرابط ──
        DOM.shareBtn.addEventListener('click', () => {
            let stationId = '';
            if (!isExternalFavPlaying && stations[currentIndex]) {
                stationId = stations[currentIndex].stationuuid || '';
            } else if (isExternalFavPlaying) {
                // حاول استخراج id من savedStations
                const currentSrc = DOM.audio.src;
                const fav = savedStations.find(s => s.url === currentSrc);
                if (fav) stationId = fav.id;
            }
            const shareUrl = `https://t.me/Time_of_world_origins_bot/Radio?startapp=${stationId || ''}`;
            
            const shareText = `استمع إلى ${DOM.title.textContent} على راديو عالمي! 🎵 ${shareUrl}`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Global Radio Player',
                    text: shareText,
                    url: shareUrl,
                }).catch(() => {});
            } else {
                // نسخ إلى الحافظة
                navigator.clipboard.writeText(shareUrl).then(() => {
                    DOM.toast.textContent = 'تم نسخ الرابط!';
                    DOM.toast.classList.add('show');
                    setTimeout(() => DOM.toast.classList.remove('show'), 2000);
                }).catch(() => {
                    alert('انسخ الرابط يدوياً:\n' + shareUrl);
                });
            }
        });

        // ── باقي الأكواد (تشغيل، تفضيل، إلخ) ──
        // (نفس ما كانت عليه، فقط تأكد من استدعاء startDancer عند الحاجة)
        // ... [باقي الكود كما هو بدون تغيير يذكر] ...

        // عند بدء التشغيل، نوقف الراقص إذا لزم
        const originalBoot = bootApp;
        bootApp = async function() {
            await originalBoot();
            // لا داعي لفعل شيء آخر
        };
    </script>
