<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Radio Player Premium</title>
    <meta name="theme-color" content="#09090b" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <style>
        :root {
            --bg-color: #09090b;       /* لون أسود فاخر مثل واجهة أبل الموسيقية */
            --surface-color: #18181b; 
            --primary: #3b82f6;        /* أزرق حيوي للمقاطع الحالية والأزرار النشطة */
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --warning: #fbbf24;
            --danger: #ef4444;
            --font-family: 'Inter', 'Tajawal', sans-serif;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* لمنع التمرير العشوائي */
        }

        /* ── Header Top Navigation ── */
        .app-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px; width: 100%;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.08); border: none;
            width: 40px; height: 40px; border-radius: 50%;
            color: var(--text-main); font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s ease;
        }
        .nav-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        .nav-btn.active { color: var(--warning); box-shadow: 0 0 10px rgba(251, 191, 36, 0.4); }

        .location-info {
            text-align: center;
        }
        .location-label { font-size: 10px; color: var(--text-sub); text-transform: uppercase; letter-spacing: 2px; }
        .country-name { font-size: 15px; font-weight: 700; margin-top: 3px; display: flex; align-items: center; gap: 5px; justify-content: center; }

        /* ── Main Display / Cover ── */
        .main-display {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 100%; padding: 0 30px; gap: 30px;
        }

        .cover-art {
            width: 100%; max-width: 260px; aspect-ratio: 1;
            background-color: var(--surface-color); border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5); display: flex;
            align-items: center; justify-content: center; overflow: hidden;
            transition: all 0.5s ease; font-size: 80px; color: var(--text-sub);
        }
        .cover-art img { width: 100%; height: 100%; object-fit: contain; padding: 20px; background: #fff;}
        .cover-art.playing { box-shadow: 0 0 50px rgba(59, 130, 246, 0.25); border: 2px solid rgba(59,130,246, 0.3); transform: scale(1.02); }

        .track-info { width: 100%; text-align: center; }
        .track-title { font-size: 24px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; margin-bottom: 5px;}
        .track-subtitle { font-size: 14px; color: var(--text-sub); font-weight: 500; }

        /* ── Audio Control Elements ── */
        .player-controls {
            width: 100%; padding: 0 24px 40px; display: flex; flex-direction: column; gap: 25px;
        }

        /* شريط مستوى الصوت */
        .volume-row { display: flex; align-items: center; gap: 15px; padding: 0 10px;}
        .volume-row i { color: var(--text-sub); font-size: 14px; }
        input[type="range"] {
            -webkit-appearance: none; flex: 1; height: 6px;
            background: rgba(255, 255, 255, 0.15); border-radius: 4px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: #fff; cursor: pointer; transition: 0.2s;
        }

        /* الأزرار الأساسية (بلاي / نيكست) */
        .controls-row {
            display: flex; align-items: center; justify-content: space-between; width: 100%;
        }

        .side-btn { background: none; border: none; font-size: 22px; color: var(--text-sub); cursor: pointer; transition: 0.2s; padding: 10px; }
        .side-btn:hover { color: var(--text-main); transform: scale(1.1); }
        .side-btn.active-fav { color: var(--danger); }
        .side-btn:disabled { opacity: 0.3; }

        .main-controls { display: flex; align-items: center; gap: 30px; }
        
        .play-btn {
            background: var(--text-main); width: 68px; height: 68px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; font-size: 22px; color: #000; cursor: pointer; transition: transform 0.2s ease, background 0.2s ease;
        }
        .play-btn:hover:not(:disabled) { transform: scale(1.08); background: var(--primary); color: #fff;}
        .play-btn:disabled { opacity: 0.4; }

        /* ── Smart Slide-Up Timers Section ── */
        .timer-drawer {
            position: absolute; bottom: -100%; left: 0; width: 100%; height: auto; max-height: 70%;
            background: var(--surface-color); border-radius: 28px 28px 0 0; z-index: 50;
            padding: 30px 24px 40px; box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; gap: 20px; transition: bottom 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .timer-drawer.open { bottom: 0; }
        .drawer-handle { width: 40px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 4px; margin: -10px auto 10px;}

        /* تنسيق المنبه داخل الدرج بطريقة معاصرة بدون زوايا قبيحة */
        .timer-mode { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 16px 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .timer-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; color: #fff; }
        
        /* مؤقت رقمي عصري سلس بدلا من السلوت ماشين المعقد */
        .digital-countdown { font-family: monospace; font-size: 20px; color: var(--warning); font-weight: 700; display: none; }
        .digital-countdown.visible { display: block; }
        .preset-btns { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
        
        .chip {
            background: rgba(255,255,255,0.1); color: var(--text-main); font-size: 12px; font-weight: 600;
            border-radius: 20px; padding: 6px 12px; border: none; cursor: pointer; transition: 0.2s;
        }
        .chip:hover, .chip.selected { background: var(--primary); color: #fff; }
        .chip-cancel { display: none; background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .chip-cancel.visible { display: inline-block; }

        /* ── Full Screen Favorites Overlay ── */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg-color); z-index: 100;
            transform: translateX(100%); transition: transform 0.4s ease;
            display: flex; flex-direction: column; padding: 24px;
        }
        .modal.open { transform: translateX(0); }
        .modal-header {
            display: flex; align-items: center; gap: 15px; font-size: 22px; font-weight: 700; margin-bottom: 20px; padding-top: 15px;
        }
        .back-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding-right:15px; }
        
        .fav-list { list-style: none; overflow-y: auto; flex: 1; margin: 0 -24px; padding: 0 24px; }
        .fav-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .fav-item:last-child { border: none; }
        
        .fav-text { flex: 1; font-weight: 600; cursor: pointer; margin-right: 15px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: flex; align-items: center; gap: 15px; }
        .fav-text i { color: var(--primary); font-size: 14px;}
        .remove-btn { background: none; color: var(--text-sub); border: none; font-size: 18px; padding: 10px; }
        .remove-btn:hover { color: var(--danger); }

        /* Overlay blur */
        .blur-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 45; opacity: 0; pointer-events: none; transition: 0.3s; }
        .blur-overlay.open { opacity: 1; pointer-events: all;}

        /* Loading */
        #loader {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; font-weight: 600; color: #fff;
        }
        .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-size: 14px; opacity:0.8; letter-spacing: 1px;" id="loadingText">Searching for stations...</div>
    </div>

    <div class="blur-overlay" id="blurOverlay"></div>

    <!-- 1. Header (Country Name always visible based on TG Chat params) -->
    <header class="app-header">
        <button class="nav-btn" id="favListBtn"><i class="fa-solid fa-bars-staggered"></i></button>
        <div class="location-info">
            <div class="location-label">Radios in</div>
            <div class="country-name"><i class="fa-solid fa-location-dot" style="color:var(--primary); font-size: 12px;"></i> <span id="dispCountry">...</span></div>
        </div>
        <button class="nav-btn" id="openTimerDrawer"><i class="fa-solid fa-clock"></i></button>
    </header>

    <!-- 2. Art Work and Info -->
    <main class="main-display">
        <div class="cover-art" id="artCover">
            <i class="fa-solid fa-radio"></i>
        </div>
        <div class="track-info">
            <div class="track-title" id="rTitle" dir="auto">Waiting for connect...</div>
            <div class="track-subtitle" id="rSub">Preparing System</div>
        </div>
    </main>

    <!-- 3. Player controls -->
    <footer class="player-controls">
        <div class="volume-row">
            <i class="fa-solid fa-volume-off"></i>
            <input type="range" id="volRange" min="0" max="1" step="0.05" value="0.75" />
            <i class="fa-solid fa-volume-high"></i>
        </div>

        <div class="controls-row">
            <button class="side-btn" id="btnFavIcon"><i class="fa-regular fa-heart"></i></button>
            <div class="main-controls">
                <button class="side-btn" id="btnPrev"><i class="fa-solid fa-backward-step"></i></button>
                <button class="play-btn" id="btnPlay"><i class="fa-solid fa-play" id="icPlay"></i></button>
                <button class="side-btn" id="btnNext"><i class="fa-solid fa-forward-step"></i></button>
            </div>
            <!-- Sync visual alignment placeholder -->
            <button class="side-btn" style="visibility:hidden;"><i class="fa-solid fa-ellipsis"></i></button>
        </div>
    </footer>

    <!-- Smart Sliding Drawer for Timers -->
    <div class="timer-drawer" id="timerPanel">
        <div class="drawer-handle"></div>
        <h3 style="text-align: center; font-size: 16px; margin-bottom: 5px;">Auto Modes</h3>
        
        <!-- Sleep Mode -->
        <div class="timer-mode">
            <div class="timer-title" style="color: #60a5fa;"><i class="fa-solid fa-moon"></i> Sleep 
                <span class="digital-countdown" id="sleepDigits">00:00</span>
            </div>
            <div class="preset-btns" id="sleepOptions">
                <button class="chip" data-time="5">5m</button>
                <button class="chip" data-time="15">15m</button>
                <button class="chip" data-time="30">30m</button>
                <button class="chip chip-cancel" id="btnCanSleep">Cancel</button>
            </div>
        </div>

        <!-- Start Mode -->
        <div class="timer-mode">
            <div class="timer-title" style="color: #4ade80;"><i class="fa-solid fa-clock-rotate-left"></i> Start
                <span class="digital-countdown" id="startDigits">00:00</span>
            </div>
            <div class="preset-btns" id="startOptions">
                <button class="chip" data-time="5">5m</button>
                <button class="chip" data-time="15">15m</button>
                <button class="chip" data-time="30">30m</button>
                <button class="chip chip-cancel" id="btnCanStart">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Favorite Stations Full Screen -->
    <div class="modal" id="favModalWindow">
        <div class="modal-header">
            <button class="back-btn" id="closeFavsBtn"><i class="fa-solid fa-chevron-left"></i></button>
            Favorite Stations
        </div>
        <ul class="fav-list" id="fListItems"></ul>
    </div>

    <audio id="corePlayer" preload="none"></audio>

    <script>
        const tg = window.Telegram?.WebApp;
        if(tg) { tg.ready(); tg.expand(); }

        // ============ State Initialization ============
        let Stations = [], curIdx = 0, playingState = false, customModePlaying = false, failsCounter = 0;
        let storedList = JSON.parse(localStorage.getItem('premium_fav_radios')) || [];

        // Dynamic Parameter Setup: This accurately receives country logic from Bot Link
        const GET_PARAMS = new URLSearchParams(window.location.search);
        let fromUrlParam = GET_PARAMS.get('country') || GET_PARAMS.get('name') || '';
        let fromStartParam = (tg?.initDataUnsafe?.start_param || '').replace(/_/g, ' '); // decoding if tg parameter format
        
        let requestedTarget = fromUrlParam || fromStartParam || 'Egypt'; 
        // fallback safe decode to ensure Arabic works well
        requestedTarget = decodeURIComponent(requestedTarget).trim();
        document.getElementById('dispCountry').textContent = requestedTarget;


        // ============ Elements Maps ============
        const D = {
            ldr: document.getElementById('loader'), txtLoad: document.getElementById('loadingText'),
            bgFade: document.getElementById('blurOverlay'), panTimers: document.getElementById('timerPanel'),
            togTimers: document.getElementById('openTimerDrawer'), artC: document.getElementById('artCover'),
            iP: document.getElementById('icPlay'), tP: document.getElementById('rTitle'),
            tS: document.getElementById('rSub'), aud: document.getElementById('corePlayer'),
            bP: document.getElementById('btnPlay'), bN: document.getElementById('btnNext'), 
            bPr: document.getElementById('btnPrev'), btnF: document.getElementById('btnFavIcon'),
            sOptions: document.getElementById('sleepOptions'), stOptions: document.getElementById('startOptions'),
            canS: document.getElementById('btnCanSleep'), canSt: document.getElementById('btnCanStart'),
            dgSleep: document.getElementById('sleepDigits'), dgStart: document.getElementById('startDigits'),
            wFav: document.getElementById('favModalWindow'), bList: document.getElementById('favListBtn'),
            clList: document.getElementById('closeFavsBtn'), lstD: document.getElementById('fListItems')
        };


        // ============ Clean Data Fetching Layer ============
        async function smartStationFetch(locationStr) {
            try {
                // Method 1: Using Tags exact parameter which API categorizes Countries with 
                let pLoc = encodeURIComponent(locationStr.toLowerCase());
                
                let results = [];
                // API servers tend to fall, de1 is usually robust
                let r1 = await fetch(`https://de1.api.radio-browser.info/json/stations/bycountry/${pLoc}?order=votes&reverse=true`);
                if(r1.ok) results = await r1.json();

                // fallback to general string search if by-country fails returning data (sometimes required for sub-locations or specific formatting)
                if(results.length === 0) {
                    D.txtLoad.textContent = "Switching search mechanism...";
                    let r2 = await fetch(`https://de1.api.radio-browser.info/json/stations/search?name=${pLoc}&order=votes&reverse=true`);
                    if(r2.ok) results = await r2.json();
                }

                return results.filter(k => (k.url_resolved || k.url).startsWith('https')); 
            } catch (err) {
                console.error(err);
                return [];
            }
        }


        // ============ Digital Timer Logic (Slimmed Down) ============
        let TM = { endSlp: null, endSt: null, coreI: null, waitSlp: null, waitSt: null };
        const F0 = n => String(n).padStart(2,'0');

        function procT(tmMs, digEl, pArr) {
            let left = Math.round((tmMs - Date.now())/1000);
            if(left <= 0) left = 0;
            digEl.textContent = `${F0(Math.floor(left/60))}:${F0(left%60)}`;
            return left;
        }
        function uiSlp(r){ TM.endSlp=null; D.dgSleep.classList.remove('visible'); D.canS.classList.remove('visible'); pShow(D.sOptions);  updateTic(); }
        function uiSt(r){ TM.endSt=null; D.dgStart.classList.remove('visible'); D.canSt.classList.remove('visible'); pShow(D.stOptions); updateTic(); }
        
        function pHide(par){ Array.from(par.querySelectorAll('.chip:not(.chip-cancel)')).forEach(c=>c.style.display='none'); }
        function pShow(par){ Array.from(par.querySelectorAll('.chip:not(.chip-cancel)')).forEach(c=>c.style.display='inline-block'); }

        const runGlobalTic = () => {
            if(!TM.coreI) TM.coreI = setInterval(()=> {
                let anyAct = false;
                if(TM.endSlp) { procT(TM.endSlp, D.dgSleep); anyAct=true; }
                if(TM.endSt) { procT(TM.endSt, D.dgStart); anyAct=true; }
                
                if(!anyAct) { clearInterval(TM.coreI); TM.coreI=null; }
            }, 1000);
        };
        const updateTic = () => { (TM.endSlp || TM.endSt) ? D.togTimers.classList.add('active') : D.togTimers.classList.remove('active'); };

        // Bind Setup
        const setSleepM = (m) => {
            if(TM.endSt) { clearTimeout(TM.waitSt); uiSt(); }
            PCTRL.runX(); TM.endSlp = Date.now() + (m * 60000);
            D.dgSleep.classList.add('visible'); D.canS.classList.add('visible'); pHide(D.sOptions); procT(TM.endSlp, D.dgSleep); updateTic();
            TM.waitSlp = setTimeout(()=> { PCTRL.pOffFade(); uiSlp(); }, m * 60000);
            runGlobalTic();
        };

        const setStartM = (m) => {
            if(TM.endSlp) { clearTimeout(TM.waitSlp); uiSlp(); }
            TM.endSt = Date.now() + (m * 60000);
            D.dgStart.classList.add('visible'); D.canSt.classList.add('visible'); pHide(D.stOptions); procT(TM.endSt, D.dgStart); updateTic();
            TM.waitSt = setTimeout(()=> { PCTRL.runX(); uiSt(); }, m * 60000);
            runGlobalTic();
        };

        D.sOptions.addEventListener('click', e => { if(e.target.dataset.time) setSleepM(parseInt(e.target.dataset.time)); });
        D.stOptions.addEventListener('click', e => { if(e.target.dataset.time) setStartM(parseInt(e.target.dataset.time)); });
        D.canS.addEventListener('click', () => { clearTimeout(TM.waitSlp); uiSlp(); });
        D.canSt.addEventListener('click', () => { clearTimeout(TM.waitSt); uiSt(); });


        // ============ Advanced Music System Control ============
        const PCTRL = {
            updScreen(tit, stit, imgL) {
                D.tP.textContent = tit || "Station Audio"; 
                D.tS.textContent = stit;
                if(imgL){ 
                    const mX = new Image(); mX.src=imgL;
                    mX.onload = () => D.artC.innerHTML = `<img src="${imgL}"/>`;
                    mX.onerror= () => D.artC.innerHTML = '<i class="fa-solid fa-radio"></i>';
                } else D.artC.innerHTML = '<i class="fa-solid fa-radio"></i>';
                this.cFsBtn();
            },
            fireIx(dx) {
                if(!Stations.length) return;
                curIdx = dx; const ds = Stations[curIdx]; customModePlaying = false;
                this.updScreen(ds.name, `Local Source ${dx+1} / ${Stations.length}`, ds.favicon);
                D.aud.src = ds.url_resolved || ds.url; this.bEnable();
                if(playingState) this.act();
            },
            fFire(dataX) {
                customModePlaying = true;
                this.updScreen(dataX.name, 'Favorite Memory', dataX.img);
                D.aud.src = dataX.url; this.bEnable(); this.act();
            },
            act() {
                let prom = D.aud.play();
                if(prom) prom.then(() => { playingState = true; failsCounter = 0; D.iP.className="fa-solid fa-pause"; D.artC.classList.add('playing'); }).catch(x => {if(x.name!=='AbortError') this.catchBug();});
            },
            hlt() { D.aud.pause(); playingState = false; D.iP.className="fa-solid fa-play"; D.artC.classList.remove('playing'); },
            tgHlt() { playingState ? this.hlt() : this.act(); },
            runX() { if(D.aud.src || Stations.length) { if(!D.aud.src) this.fireIx(0); this.act(); } },
            catchBug() {
                this.hlt(); D.tS.textContent = "Connection issue, relocating..."; D.artC.innerHTML = '<i class="fa-solid fa-satellite-dish fa-fade"></i>';
                if(!customModePlaying && Stations.length > 1 && failsCounter < 7) {
                    failsCounter++; setTimeout(() => this.fireIx((curIdx+1) % Stations.length), 2000);
                } else D.tP.textContent = "Source Unavailable.";
            },
            pOffFade() {
                if(!playingState) return;
                let c = 20, vV = document.getElementById('volRange').value;
                let dIn = setInterval(()=>{
                    c--; D.aud.volume = Math.max(0, (c/20)*vV);
                    if(c<=0) { clearInterval(dIn); this.hlt(); D.aud.volume = vV; }
                },150);
            },
            cFsBtn() {
                let cvDataId = customModePlaying ? storedList.find(r=>r.url===D.aud.src)?.id : Stations[curIdx]?.stationuuid;
                if(!cvDataId) return;
                let kEx = storedList.some(r => r.id === cvDataId);
                D.btnF.className = kEx ? 'side-btn active-fav' : 'side-btn';
                D.btnF.innerHTML = kEx ? '<i class="fa-solid fa-heart"></i>' : '<i class="fa-regular fa-heart"></i>';
            },
            bEnable() { D.bP.disabled = false; D.bN.disabled=false; D.bPr.disabled=false; }
        };

        D.aud.addEventListener('error', () => PCTRL.catchBug());
        document.getElementById('volRange').addEventListener('input', e=> D.aud.volume = e.target.value);
        
        D.bP.addEventListener('click', () => PCTRL.tgHlt());
        D.bN.addEventListener('click', () => { if(Stations.length) PCTRL.fireIx((curIdx + 1) % Stations.length); });
        D.bPr.addEventListener('click', () => { if(Stations.length) PCTRL.fireIx((curIdx - 1 + Stations.length) % Stations.length); });


        // ============ Favorites Management System ============
        D.btnF.addEventListener('click', () => {
            const mRef = customModePlaying ? storedList.find(x=>x.url === D.aud.src) : Stations[curIdx];
            if(!mRef) return;
            const rID = mRef.stationuuid || mRef.id;
            const yIndex = storedList.findIndex(h => h.id === rID);
            
            if(yIndex > -1) storedList.splice(yIndex,1);
            else storedList.push({ id: rID, name: mRef.name, url: mRef.url_resolved||mRef.url, img: mRef.favicon||mRef.img });
            
            localStorage.setItem('premium_fav_radios', JSON.stringify(storedList)); PCTRL.cFsBtn(); popListRend();
        });

        const popListRend = () => {
            D.lstD.innerHTML = storedList.length ? '' : '<div style="color:var(--text-sub); text-align:center; padding-top:40px;">No saved favorites here.</div>';
            storedList.forEach((st, xIx) => {
                const ll = document.createElement('li'); ll.className = 'fav-item';
                ll.innerHTML = `<div class="fav-text"><i class="fa-solid fa-compact-disc"></i> ${st.name}</div><button class="remove-btn"><i class="fa-solid fa-xmark"></i></button>`;
                ll.querySelector('.fav-text').onclick = () => {
                    let dRealIdx = Stations.findIndex(z=> z.stationuuid === st.id);
                    D.wFav.classList.remove('open');
                    (dRealIdx > -1) ? PCTRL.fireIx(dRealIdx) : PCTRL.fFire(st);
                };
                ll.querySelector('.remove-btn').onclick = e => {
                    e.stopPropagation(); storedList.splice(xIx, 1);
                    localStorage.setItem('premium_fav_radios', JSON.stringify(storedList));
                    popListRend(); PCTRL.cFsBtn();
                };
                D.lstD.appendChild(ll);
            });
        };

        // Window Modals Links
        D.bList.onclick = () => { popListRend(); D.wFav.classList.add('open'); };
        D.clList.onclick = () => { D.wFav.classList.remove('open'); };

        const uiTgMenu = () => {
            const fT = D.panTimers.classList.contains('open');
            D.panTimers.classList.toggle('open');
            fT ? D.bgFade.classList.remove('open') : D.bgFade.classList.add('open');
        }
        D.togTimers.onclick = uiTgMenu;
        D.bgFade.onclick = uiTgMenu; // dismiss clicking outside drawer
        D.panTimers.querySelector('.drawer-handle').onclick = uiTgMenu;


        // ============ Execution Engine Initializing ============
        async function runPlayerReadyProcess() {
            if(!requestedTarget) requestedTarget = 'USA'; 
            Stations = await smartStationFetch(requestedTarget);
            D.ldr.style.display = 'none';

            if(Stations.length) {
                PCTRL.fireIx(0);
                PCTRL.cFsBtn();
            } else {
                D.tP.textContent = "Location Empty.";
                D.tS.textContent = `No signals located around '${requestedTarget}'. Check typing/spelling inside bot chat.`;
                D.artC.innerHTML = '<i class="fa-solid fa-tower-broadcast" style="color:var(--danger)"></i>';
            }
        }
        
        runPlayerReadyProcess();

    </script>
</body>
</html>
