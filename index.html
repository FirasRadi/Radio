<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Radio - Precise Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; color: var(--text-main);
        }

        .app-card {
            position: relative; width: 100%; max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 30px; padding: 30px 25px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            text-align: center; overflow: hidden;
            transition: all 0.3s ease;
        }

        /* --- Top Tools Bar --- */
        .tools-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px;
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: var(--text-sub); width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; transition: 0.3s; position: relative;
        }

        .tool-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-main); }
        .tool-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
        .tool-btn.active-fav { color: var(--danger); border-color: var(--danger); background: rgba(239, 68, 68, 0.1); }

        .timer-badge {
            position: absolute; top: -5px; right: -5px;
            background: var(--accent); color: #fff;
            font-size: 9px; font-weight: 600;
            padding: 2px 6px; border-radius: 10px;
            display: none;
        }

        /* --- Search Box --- */
        .search-container {
            width: 100%; margin-bottom: 20px;
            display: none; opacity: 0; transform: translateY(-10px);
            transition: all 0.3s ease;
        }
        .search-container.show { display: block; opacity: 1; transform: translateY(0); }
        
        .search-input-wrapper { position: relative; width: 100%; }
        .search-input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-sub); }
        .search-input-wrapper input {
            width: 100%; background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border); border-radius: 12px;
            padding: 12px 15px 12px 40px; color: var(--text-main);
            font-size: 14px; outline: none; transition: 0.3s;
        }
        .search-input-wrapper input:focus { border-color: var(--accent); }

        /* --- Logo & Info --- */
        .logo-frame {
            width: 120px; height: 120px; margin: 0 auto 20px; border-radius: 50%;
            background: #111; border: 3px solid #1e293b;
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: var(--accent);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3); overflow: hidden; transition: 0.3s;
        }
        .logo-frame.playing { border-color: var(--accent); box-shadow: 0 0 25px rgba(59, 130, 246, 0.4); animation: spinDisc 8s linear infinite; }
        @keyframes spinDisc { 100% { transform: rotate(360deg); } }
        .logo-frame img { width: 100%; height: 100%; object-fit: cover; }

        .station-name {
            font-size: 20px; font-weight: 600; color: var(--text-main);
            margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 0 10px;
        }

        .station-meta { font-size: 13px; font-weight: 400; color: var(--text-sub); margin-bottom: 25px; height: 20px; }

        /* --- Audio Controls --- */
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 25px; }
        .ctrl-btn {
            background: none; border: none; color: var(--text-sub);
            font-size: 20px; cursor: pointer; transition: 0.2s;
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .ctrl-btn:hover:not(:disabled) { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }
        .ctrl-btn.play-btn { width: 65px; height: 65px; background: var(--accent); color: #fff; font-size: 24px; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .ctrl-btn.play-btn:hover:not(:disabled) { transform: scale(1.05); background: var(--accent-hover); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- Volume Control --- */
        .volume-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; padding: 0 20px; margin-bottom: 10px; }
        .volume-wrapper i { color: var(--text-sub); font-size: 14px; width: 15px; text-align: center; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--accent); cursor: pointer; transition: 0.2s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* --- Loading & Status --- */
        .status-bar { margin-top: 20px; padding-top: 15px; border-top: 1px solid var(--glass-border); font-size: 12px; color: var(--text-sub); }
        
        #fullLoading {
            position: fixed; inset: 0; background: var(--bg-color); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }

        .donate-btn { position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px; background: #0070ba; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; text-decoration: none; z-index: 100; box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4); }
    </style>
</head>
<body>

    <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn" title="Support Us"><i class="fab fa-paypal"></i></a>

    <!-- Initial App Loader -->
    <div id="fullLoading">
        <div class="spinner"></div>
        <span style="font-size: 14px; letter-spacing: 2px; color: var(--text-sub);">CONNECTING...</span>
    </div>

    <div class="app-card">
        
        <!-- Utility Tools -->
        <div class="tools-bar">
            <button class="tool-btn" id="searchBtn" title="Search Stations"><i class="fas fa-search"></i></button>
            <button class="tool-btn" id="timerBtn" title="Sleep Timer">
                <i class="fas fa-moon"></i>
                <span class="timer-badge" id="timerBadge">00:00</span>
            </button>
            <button class="tool-btn" id="favBtn" title="Add to Favorites"><i class="far fa-heart"></i></button>
        </div>

        <!-- Search Bar -->
        <div class="search-container" id="searchContainer">
            <div class="search-input-wrapper">
                <i class="fas fa-filter"></i>
                <input type="text" id="searchInput" placeholder="Filter by name or genre..." autocomplete="off">
            </div>
        </div>

        <!-- Visuals & Info -->
        <div class="logo-frame" id="stationLogo"><i class="fas fa-music"></i></div>
        <div class="station-name" id="stationTitle">Select Country</div>
        <div class="station-meta" id="stationSub">Awaiting Command</div>

        <!-- Main Controls -->
        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <!-- Volume Control -->
        <div class="volume-wrapper">
            <i class="fas fa-volume-down"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            <i class="fas fa-volume-up"></i>
        </div>

        <!-- Real Audio Element -->
        <audio id="audioPlayer" preload="none"></audio>

        <!-- Status Indicator -->
        <div class="status-bar" id="statusBar">
            <i class="fas fa-info-circle"></i> Ready
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // DOM Element References
        const ui = {
            loading: document.getElementById('fullLoading'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            play: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prev: document.getElementById('prevBtn'),
            next: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            searchBtn: document.getElementById('searchBtn'),
            searchBox: document.getElementById('searchContainer'),
            searchInput: document.getElementById('searchInput'),
            favBtn: document.getElementById('favBtn'),
            timerBtn: document.getElementById('timerBtn'),
            timerBadge: document.getElementById('timerBadge'),
            volume: document.getElementById('volumeSlider'),
            status: document.getElementById('statusBar')
        };

        // App State
        let masterStations = []; 
        let activeStations = []; 
        let currentIndex = 0;
        let isPlaying = false;
        let hasValidData = false;
        let retryCount = 0;
        let sleepTimerId = null;
        let timerSeconds = 0;
        
        // Load settings from local storage safely
        let favorites = [];
        try { favorites = JSON.parse(localStorage.getItem('radio_favs')) || []; } catch(e) {}
        let userVolume = localStorage.getItem('radio_vol') || 0.7;
        ui.volume.value = userVolume;
        ui.audio.volume = userVolume;

        // Fetch Country Name
        const urlParam = new URLSearchParams(window.location.search).get('name') || '';
        const tgParam = (tg.initDataUnsafe.start_param || '').replace(/_/g, ' '); 
        const countryName = tgParam || urlParam;

        // --- 1. Fetching Logic ---
        async function fetchStations(name) {
            try {
                let url = `https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(name)}?order=votes&reverse=true`;
                let res = await fetch(url);
                let data = await res.json();
                
                if(!data.length) { // Fallback to byname if country fails
                    url = `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?order=votes&reverse=true`;
                    res = await fetch(url);
                    data = await res.json();
                }
                
                // Filter strictly for secure and working URLs
                return data.filter(s => {
                    const link = s.url_resolved || s.url;
                    return link && link.startsWith('https://');
                });
            } catch (error) {
                return [];
            }
        }

        // --- 2. OS Media Integration (Accuracy Feature) ---
        function updateMediaSession(station) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: station.name || 'Unknown Station',
                    artist: station.tags ? station.tags.split(',')[0].toUpperCase() : countryName.toUpperCase(),
                    album: 'Global Radio',
                    artwork: [{ src: station.favicon || 'https://i.imgur.com/kP5hVn3.png', sizes: '512x512', type: 'image/png' }]
                });
                navigator.mediaSession.setActionHandler('play', () => togglePlay(true));
                navigator.mediaSession.setActionHandler('pause', () => togglePlay(false));
                navigator.mediaSession.setActionHandler('previoustrack', prevStation);
                navigator.mediaSession.setActionHandler('nexttrack', nextStation);
            }
        }

        // --- 3. UI Updating Logic ---
        function updateFavUI(uuid) {
            const isFav = favorites.includes(uuid);
            ui.favBtn.className = isFav ? 'tool-btn active-fav' : 'tool-btn';
            ui.favBtn.innerHTML = isFav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
        }

        function loadStation(index) {
            if (!activeStations.length || !hasValidData) return;
            retryCount = 0; // reset error retries
            
            const station = activeStations[index];
            ui.title.textContent = station.name || 'Unknown Frequency';
            
            // Format tags cleanly
            let metaText = `CH ${index + 1}/${activeStations.length}`;
            if(station.tags) {
                let cleanTags = station.tags.split(',').filter(t => t.length > 2).slice(0, 2).join(' • ');
                if(cleanTags) metaText += ` | ${cleanTags.toUpperCase()}`;
            }
            ui.sub.textContent = metaText;

            // Handle Image safely
            if (station.favicon) {
                ui.logo.innerHTML = `<img src="${station.favicon}" onerror="this.outerHTML='<i class=\\'fas fa-music\\'></i>'">`;
            } else {
                ui.logo.innerHTML = '<i class="fas fa-music"></i>';
            }

            ui.audio.src = station.url_resolved || station.url;
            ui.play.disabled = ui.prev.disabled = ui.next.disabled = false;
            
            updateFavUI(station.stationuuid);
            updateMediaSession(station);
            updateStatus('Ready to play');

            if (isPlaying) {
                executePlay();
            } else {
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('playing');
            }
        }

        // --- 4. Audio Playback & Error Handling ---
        function updateStatus(msg, isError = false) {
            ui.status.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-info-circle'}"></i> ${msg}`;
            ui.status.style.color = isError ? 'var(--danger)' : 'var(--text-sub)';
        }

        async function executePlay() {
            try {
                updateStatus('Buffering stream...');
                await ui.audio.play();
                isPlaying = true;
                ui.playIcon.className = 'fas fa-pause';
                ui.logo.classList.add('playing');
                updateStatus('Live Stream Active');
            } catch (err) {
                if (err.name !== 'AbortError' && err.name !== 'NotAllowedError') {
                    handleStreamError();
                } else {
                    isPlaying = false;
                    ui.playIcon.className = 'fas fa-play';
                    ui.logo.classList.remove('playing');
                    updateStatus('Playback stopped');
                }
            }
        }

        function handleStreamError() {
            retryCount++;
            if (retryCount <= 2) {
                updateStatus(`Reconnecting (${retryCount}/2)...`, true);
                setTimeout(() => { ui.audio.load(); executePlay(); }, 2000);
            } else {
                updateStatus('Station offline. Auto-skipping...', true);
                setTimeout(() => nextStation(), 1500);
            }
        }

        function togglePlay(forceState) {
            if(!hasValidData) return;
            const targetState = typeof forceState === 'boolean' ? forceState : ui.audio.paused;
            
            if (targetState) {
                executePlay();
            } else {
                ui.audio.pause();
                isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('playing');
                updateStatus('Paused');
            }
        }

        function nextStation() {
            if(!activeStations.length) return;
            currentIndex = (currentIndex + 1) % activeStations.length;
            loadStation(currentIndex);
        }

        function prevStation() {
            if(!activeStations.length) return;
            currentIndex = (currentIndex - 1 + activeStations.length) % activeStations.length;
            loadStation(currentIndex);
        }

        // --- 5. Features Implementations ---
        
        // Volume
        ui.volume.addEventListener('input', (e) => {
            ui.audio.volume = e.target.value;
            localStorage.setItem('radio_vol', e.target.value);
        });

        // Favorites
        ui.favBtn.addEventListener('click', () => {
            if(!activeStations.length) return;
            const uuid = activeStations[currentIndex].stationuuid;
            const idx = favorites.indexOf(uuid);
            
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(uuid);
            
            localStorage.setItem('radio_favs', JSON.stringify(favorites));
            updateFavUI(uuid);
        });

        // Search Engine
        ui.searchBtn.addEventListener('click', () => {
            ui.searchBox.classList.toggle('show');
            ui.searchBtn.classList.toggle('active');
            if(ui.searchBox.classList.contains('show')) ui.searchInput.focus();
        });

        ui.searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if(query === '') {
                activeStations = [...masterStations];
            } else {
                activeStations = masterStations.filter(s => 
                    (s.name && s.name.toLowerCase().includes(query)) || 
                    (s.tags && s.tags.toLowerCase().includes(query))
                );
            }
            
            if(activeStations.length > 0) {
                currentIndex = 0;
                loadStation(0);
            } else {
                ui.title.textContent = 'No matches found';
                ui.sub.textContent = 'Try a different keyword';
                ui.logo.innerHTML = '<i class="fas fa-search"></i>';
                ui.audio.src = '';
                ui.play.disabled = ui.prev.disabled = ui.next.disabled = true;
            }
        });

        // Sleep Timer
        ui.timerBtn.addEventListener('click', () => {
            const cycles = [0, 15, 30, 45, 60]; // minutes
            let currentMin = timerSeconds > 0 ? Math.ceil(timerSeconds / 60) : 0;
            let currentIdx = cycles.findIndex(c => c >= currentMin);
            if(currentIdx === -1 || currentIdx === cycles.length - 1) currentIdx = -1;
            
            let nextMin = cycles[currentIdx + 1];
            
            if(sleepTimerId) clearInterval(sleepTimerId);
            
            if(nextMin === 0) {
                timerSeconds = 0;
                ui.timerBtn.classList.remove('active');
                ui.timerBadge.style.display = 'none';
            } else {
                timerSeconds = nextMin * 60;
                ui.timerBtn.classList.add('active');
                ui.timerBadge.style.display = 'block';
                updateTimerDisplay();
                
                sleepTimerId = setInterval(() => {
                    timerSeconds--;
                    updateTimerDisplay();
                    if(timerSeconds <= 0) {
                        clearInterval(sleepTimerId);
                        ui.timerBtn.classList.remove('active');
                        ui.timerBadge.style.display = 'none';
                        togglePlay(false); // Stop audio
                    }
                }, 1000);
            }
        });

        function updateTimerDisplay() {
            let m = Math.floor(timerSeconds / 60);
            let s = timerSeconds % 60;
            ui.timerBadge.textContent = `${m}:${s < 10 ? '0':''}${s}`;
        }

        // Audio Events Bindings
        ui.play.addEventListener('click', () => togglePlay());
        ui.next.addEventListener('click', nextStation);
        ui.prev.addEventListener('click', prevStation);
        ui.audio.addEventListener('error', handleStreamError);

        // --- Boot Application ---
        async function init() {
            if (!countryName.trim()) {
                ui.title.textContent = 'NO REGION SELECTED';
                ui.sub.textContent = 'Please start via bot command';
                ui.loading.style.display = 'none';
                return;
            }
            
            const data = await fetchStations(countryName.trim());
            if (data.length) {
                masterStations = data;
                activeStations = [...data];
                hasValidData = true;
                loadStation(0);
            } else {
                ui.title.textContent = 'NO STATIONS FOUND';
                ui.sub.textContent = 'Try another country';
            }
            ui.loading.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
