<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio & TV Pro</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin:0;
    background:#0f1014;
    color:white;
    font-family:Arial;
    text-align:center;
}

.player {
    width:90%;
    margin:auto;
    margin-top:20px;
}

video {
    width:100%;
    border-radius:15px;
    background:black;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#list {
    margin-top:15px;
    max-height:200px;
    overflow:auto;
}
</style>
</head>

<body>

<h3 id="title">Loading...</h3>

<video id="video" controls></video>

<div class="player">
    <button onclick="prev()">⬅</button>
    <button onclick="toggle()">▶ / ⏸</button>
    <button onclick="next()">➡</button>
</div>

<div id="list"></div>

<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const params = new URLSearchParams(location.search);
const code = (params.get("code") || "").toUpperCase();
const name = params.get("name") || "";

let channels = [];
let streams = [];
let index = 0;
let hls;

async function load() {

    document.getElementById("title").innerText = "Loading " + name;

    const chRes = await fetch("https://iptv-org.github.io/api/channels.json");
    channels = await chRes.json();

    const stRes = await fetch("https://iptv-org.github.io/api/streams.json");
    streams = await stRes.json();

    // 🔥 FIX: فلترة الدولة بشكل صحيح
    channels = channels.filter(c => c.country && c.country.toUpperCase() === code);

    if (!channels.length) {
        document.getElementById("title").innerText = "لا توجد قنوات";
        return;
    }

    renderList();
    play(0);
}

function renderList() {
    let html = "";

    channels.forEach((c, i) => {
        html += `<div>
            ${c.name}
            <button onclick="play(${i})">تشغيل</button>
        </div>`;
    });

    document.getElementById("list").innerHTML = html;
}

function getStream(channelId) {

    let s = streams.find(x => x.channel === channelId && x.url);

    if (!s && channels[index].url) {
        return channels[index].url;
    }

    return s ? s.url : null;
}

function play(i) {

    index = i;

    let ch = channels[index];

    document.getElementById("title").innerText = ch.name;

    let url = getStream(ch.id);

    if (!url) {
        alert("لا يوجد بث");
        return;
    }

    const video = document.getElementById("video");

    if (hls) { hls.destroy(); hls = null; }

    if (url.includes(".m3u8")) {

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        }

    } else {
        video.src = url;
    }

    video.play().catch(()=>{});
}

function next() {
    index = (index + 1) % channels.length;
    play(index);
}

function prev() {
    index = (index - 1 + channels.length) % channels.length;
    play(index);
}

function toggle() {
    let v = document.getElementById("video");
    if (v.paused) v.play();
    else v.pause();
}

load();

</script>

</body>
</html>
