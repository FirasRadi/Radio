<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pure Radio · Electro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            background: #080c1a;
            position: relative;
            overflow: hidden;
        }

        /* خلفية متدرجة عميقة مع كرات ضبابية */
        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at 20% 30%, #1a2a6c, #080c1a 70%);
        }

        .bg-glow::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0, 180, 255, 0.08), transparent 70%);
            top: -100px;
            right: -100px;
            border-radius: 50%;
            animation: floatGlow 20s ease-in-out infinite alternate;
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(130, 0, 255, 0.06), transparent 70%);
            bottom: -100px;
            left: -100px;
            border-radius: 50%;
            animation: floatGlow 25s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatGlow {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(60px, 40px) scale(1.3);
            }
        }

        /* البطاقة الرئيسية – زجاجية نقية */
        .app-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 44px;
            padding: 32px 24px 30px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 2;
            transition: 0.3s;
        }

        /* شعار الراديو – دائرة زرقاء أنيقة */
        .logo-frame {
            width: 80px;
            height: 80px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(145deg, #0d1f3c, #162a52);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: #6ab0fe;
            box-shadow: 0 8px 24px rgba(0, 100, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid rgba(100, 180, 255, 0.1);
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-frame i {
            filter: drop-shadow(0 0 12px rgba(60, 160, 255, 0.2));
        }

        /* النصوص */
        .station-name {
            font-size: 20px;
            font-weight: 700;
            text-align: center;
            color: #f0f6ff;
            letter-spacing: -0.2px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-meta {
            font-size: 13px;
            font-weight: 400;
            color: #8892b0;
            text-align: center;
            margin-bottom: 26px;
            letter-spacing: 0.3px;
        }

        /* أزرار التحكم – تصميم عصري هادئ */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: #8892b0;
            font-size: 20px;
            cursor: pointer;
            transition: 0.25s;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .ctrl-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .ctrl-btn.play-btn {
            width: 64px;
            height: 64px;
            background: linear-gradient(145deg, #1a3a6a, #0f2347);
            color: #8ac4ff;
            font-size: 26px;
            box-shadow: 0 8px 24px rgba(0, 80, 200, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(100, 180, 255, 0.15);
        }

        .ctrl-btn.play-btn:hover {
            transform: scale(1.04);
            background: linear-gradient(145deg, #224a82, #132d5a);
            box-shadow: 0 8px 32px rgba(0, 80, 255, 0.3);
            color: #b5d8ff;
        }

        .ctrl-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
            pointer-events: none;
            transform: none !important;
        }

        /* مشغل الصوت – مخصص بلون أزرق هادئ */
        audio {
            width: 100%;
            height: 42px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.25);
            outline: none;
            margin-top: 2px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        audio::-webkit-media-controls-panel {
            background: rgba(8, 12, 26, 0.7);
        }
        audio::-webkit-media-controls-play-button {
            background: #1a3a6a;
            border-radius: 50%;
        }
        audio::-webkit-media-controls-timeline {
            background: #2a4a7a;
            border-radius: 10px;
        }

        /* صف الدعم – زر PayPal الدائري المتواضع */
        .support-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 22px;
            gap: 14px;
        }

        .paypal-circle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(145deg, #003087, #003087);
            color: #fff;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 4px 16px rgba(0, 48, 135, 0.25);
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .paypal-circle i {
            font-size: 24px;
        }

        .paypal-circle:hover {
            transform: scale(1.06);
            box-shadow: 0 6px 24px rgba(0, 48, 135, 0.4);
            background: linear-gradient(145deg, #0037a0, #002a70);
        }

        .support-label {
            font-size: 12px;
            color: #5a6a8a;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .footer-note {
            margin-top: 20px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 11px;
            font-weight: 400;
            color: #3a4a6a;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .footer-note i {
            margin: 0 4px;
            color: #4a6a9a;
            font-size: 10px;
        }

        /* شاشة التحميل */
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(8, 12, 26, 0.94);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 999;
            color: #8892b0;
            font-size: 13px;
            letter-spacing: 0.5px;
        }
        #loading i {
            font-size: 32px;
            color: #6ab0fe;
            animation: spinPulse 1.4s ease-in-out infinite;
        }

        @keyframes spinPulse {
            0% {
                transform: rotate(0deg) scale(0.9);
                opacity: 0.4;
            }
            50% {
                transform: rotate(180deg) scale(1.2);
                opacity: 1;
            }
            100% {
                transform: rotate(360deg) scale(0.9);
                opacity: 0.4;
            }
        }

        @media (max-width: 440px) {
            .app-card {
                padding: 24px 16px 22px;
                border-radius: 32px;
            }
            .logo-frame {
                width: 68px;
                height: 68px;
                font-size: 28px;
            }
            .station-name {
                font-size: 17px;
            }
            .ctrl-btn.play-btn {
                width: 58px;
                height: 58px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="loading">
        <i class="fas fa-signal"></i>
        <span>Connecting to stations...</span>
    </div>

    <div class="app-card">

        <div class="logo-frame" id="stationLogo">
            <i class="fas fa-radio"></i>
        </div>

        <div class="station-name" id="stationTitle">Select a country</div>
        <div class="station-meta" id="stationSub">Use the bot to set your country</div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-step-forward"></i></button>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>

        <!-- صف الدعم مع دائرة PayPal الزرقاء المتواضعة -->
        <div class="support-row">
            <span class="support-label">support</span>
            <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="paypal-circle" aria-label="PayPal">
                <i class="fab fa-paypal"></i>
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-circle" style="font-size:5px; vertical-align:middle;"></i>
            change country via bot
            <i class="fas fa-circle" style="font-size:5px; vertical-align:middle;"></i>
        </div>

    </div>

    <script>
        // ================================================================
        //  TELEGRAM WEB APP
        // ================================================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ================================================================
        //  DOM REFS
        // ================================================================
        const loading = document.getElementById('loading');
        const logo = document.getElementById('stationLogo');
        const title = document.getElementById('stationTitle');
        const sub = document.getElementById('stationSub');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('audioPlayer');

        // ================================================================
        //  GET COUNTRY NAME (only "name" param)
        // ================================================================
        const params = new URLSearchParams(window.location.search);
        const countryName = params.get('name') || '';

        // ================================================================
        //  STATE
        // ================================================================
        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let hasValidCountry = false;

        // ================================================================
        //  FETCH RADIO STATIONS (radio-browser.info)
        // ================================================================
        async function fetchRadioStations(name) {
            if (!name) throw new Error('No country name.');
            const url =
                `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Network error.');
            const data = await resp.json();
            const filtered = data.filter(s =>
                s.country && s.country.toLowerCase().includes(name.toLowerCase())
            );
            return filtered.length ? filtered : data;
        }

        // ================================================================
        //  UI FUNCTIONS
        // ================================================================

        function setEmptyState(msg) {
            title.textContent = msg || 'Select a country';
            sub.textContent = 'Use the bot to set your country';
            logo.innerHTML = `<i class="fas fa-radio"></i>`;
            audio.src = '';
            playBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            hasValidCountry = false;
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function loadStation(index) {
            if (!stations.length || !hasValidCountry) {
                setEmptyState();
                return;
            }
            const item = stations[index];
            title.textContent = item.name || 'Untitled';
            sub.textContent = `${index + 1} of ${stations.length}`;

            if (item.favicon) {
                logo.innerHTML = `<img src="${item.favicon}" alt="logo" />`;
            } else {
                logo.innerHTML = `<i class="fas fa-radio"></i>`;
            }

            audio.src = item.url_resolved || item.url || '';
            audio.load();

            playBtn.disabled = false;
            prevBtn.disabled = false;
            nextBtn.disabled = false;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function togglePlay() {
            if (!hasValidCountry || !audio.src) return;
            if (audio.paused) {
                audio.play().catch(() => {});
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
            } else {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function nextStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        }

        function prevStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        }

        // ================================================================
        //  INIT
        // ================================================================

        async function initRadio() {
            const name = countryName.trim();
            if (!name) {
                setEmptyState('No country selected');
                loading.style.display = 'none';
                return;
            }

            loading.style.display = 'flex';
            try {
                const data = await fetchRadioStations(name);
                if (data && data.length > 0) {
                    stations = data;
                    hasValidCountry = true;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    setEmptyState('No stations found');
                    sub.textContent = 'Try a different country';
                }
            } catch (err) {
                console.error(err);
                setEmptyState('Loading error');
                sub.textContent = 'Please try again later';
            } finally {
                loading.style.display = 'none';
            }
        }

        // ================================================================
        //  EVENT LISTENERS
        // ================================================================

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextStation);
        prevBtn.addEventListener('click', prevStation);

        audio.addEventListener('pause', () => {
            isPlaying = false;
            playIcon.className = 'fas fa-play';
        });
        audio.addEventListener('play', () => {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
        });

        // START
        initRadio();
    </script>
</body>
</html>
