<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* --- Main Card --- */
        .player-card {
            background: #1e293b;
            width: 100%; max-width: 380px;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
        }

        /* --- Header & Fav List Button --- */
        .header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05); border: none; color: #94a3b8;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 16px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* --- Station Info --- */
        .logo {
            width: 100px; height: 100px; margin: 0 auto 15px; border-radius: 50%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            font-size: 35px; color: #3b82f6; overflow: hidden;
            border: 2px solid #3b82f6;
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .station-name { font-size: 18px; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: ltr; }
        .station-country { font-size: 13px; color: #94a3b8; margin-bottom: 25px; }

        /* --- Main Controls --- */
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 25px; direction: ltr; }
        .ctrl-btn { background: none; border: none; color: #f8fafc; font-size: 20px; cursor: pointer; }
        .play-btn { width: 60px; height: 60px; background: #3b82f6; border-radius: 50%; font-size: 20px; box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- Actions (Volume, Record, Save) --- */
        .actions-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; margin-bottom: 20px;
        }
        
        .volume-container { display: flex; align-items: center; gap: 10px; width: 50%; direction: ltr; }
        .volume-container input { -webkit-appearance: none; width: 100%; height: 4px; background: #475569; border-radius: 2px; outline: none; }
        .volume-container input::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #3b82f6; cursor: pointer; }

        .action-btns { display: flex; gap: 15px; }
        .action-btn { background: none; border: none; font-size: 18px; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .action-btn.active-fav { color: #ef4444; } /* Red for saved */
        .action-btn.recording { color: #ef4444; animation: pulse 1.5s infinite; } /* Red pulse for recording */

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* --- Footer Note --- */
        .footer-note { font-size: 12px; color: #64748b; margin-top: 10px; }

        /* --- Favorites Modal --- */
        .modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 200;
            display: none; flex-direction: column; padding: 20px;
        }
        .modal.open { display: flex; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 700; font-size: 18px; }
        .close-modal { background: none; border: none; color: #f8fafc; font-size: 20px; cursor: pointer; }
        .fav-list { flex: 1; overflow-y: auto; list-style: none; }
        .fav-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px;
        }
        .fav-info { flex: 1; text-align: left; direction: ltr; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding-right: 10px; }
        .fav-remove { color: #ef4444; background: none; border: none; font-size: 16px; cursor: pointer; padding: 5px; }

        /* --- PayPal Button & Circular Text --- */
        .paypal-wrapper {
            position: fixed; bottom: 20px; right: 20px;
            width: 100px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .paypal-svg { position: absolute; width: 100px; height: 100px; pointer-events: none; }
        .paypal-svg text { font-size: 11px; fill: #94a3b8; font-family: monospace; letter-spacing: 1px; }
        .donate-btn {
            width: 45px; height: 45px; background: #0070ba; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 20px; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4);
            position: relative; z-index: 2;
        }

        #loading { position: fixed; inset: 0; background: #0f172a; z-index: 999; display: flex; align-items: center; justify-content: center; color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">جاري المزامنة...</div>

    <!-- PayPal Button with Circular Text -->
    <div class="paypal-wrapper">
        <svg class="paypal-svg" viewBox="0 0 100 100">
            <path id="curve" d="M 15 50 A 35 35 0 0 1 85 50" fill="transparent" />
            <text>
                <textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath>
            </text>
        </svg>
        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn">
            <i class="fab fa-paypal"></i>
        </a>
    </div>

    <!-- Main Player -->
    <div class="player-card">
        <div class="header">
            <button class="icon-btn" id="openFavsBtn" title="المحطات المحفوظة"><i class="fas fa-list-ul"></i></button>
        </div>

        <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
        <div class="station-name" id="stationTitle">...</div>
        <div class="station-country" id="stationSub">...</div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <div class="actions-bar">
            <!-- Volume Slider -->
            <div class="volume-container">
                <i class="fas fa-volume-down" style="color:#94a3b8; font-size:12px;"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <i class="fas fa-volume-up" style="color:#94a3b8; font-size:14px;"></i>
            </div>
            
            <div class="action-btns">
                <!-- Record Button -->
                <button class="action-btn" id="recordBtn" title="تسجيل المقطع"><i class="fas fa-microphone"></i></button>
                <!-- Save Fav Button -->
                <button class="action-btn" id="saveFavBtn" title="حفظ المحطة"><i class="fas fa-heart"></i></button>
            </div>
        </div>

        <div class="footer-note">تغيير الدولة يتم في دردشة البوت.</div>

        <!-- Audio Element (crossorigin needed for recording attempt) -->
        <audio id="audioPlayer" crossorigin="anonymous" preload="none"></audio>
    </div>

    <!-- Favorites Modal -->
    <div class="modal" id="favModal">
        <div class="modal-header">
            <span>المحطات المحفوظة</span>
            <button class="close-modal" id="closeFavsBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        // Elements
        const ui = {
            loading: document.getElementById('loading'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            play: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prev: document.getElementById('prevBtn'),
            next: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            vol: document.getElementById('volumeSlider'),
            saveBtn: document.getElementById('saveFavBtn'),
            recordBtn: document.getElementById('recordBtn'),
            openFavs: document.getElementById('openFavsBtn'),
            closeFavs: document.getElementById('closeFavsBtn'),
            favModal: document.getElementById('favModal'),
            favList: document.getElementById('favList')
        };

        // State
        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let savedStations = JSON.parse(localStorage.getItem('my_saved_stations')) || [];
        
        // Recording State
        let mediaRecorder;
        let recordedChunks = [];
        let isRecording = false;

        // Get Country
        const urlParam = new URLSearchParams(window.location.search).get('name') || '';
        const tgParam = (tg.initDataUnsafe.start_param || '').replace(/_/g, ' '); 
        const countryName = tgParam || urlParam;

        // --- Core Logic ---
        async function init() {
            if (!countryName.trim()) {
                setErrorState();
                return;
            }
            try {
                let res = await fetch(`https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(countryName)}?order=votes&reverse=true`);
                let data = await res.json();
                stations = data.filter(s => (s.url_resolved || s.url)?.startsWith('https://'));
                
                if (stations.length > 0) {
                    loadStation(0);
                } else {
                    setErrorState();
                }
            } catch (e) {
                setErrorState();
            }
            ui.loading.style.display = 'none';
        }

        function setErrorState() {
            ui.title.textContent = 'لا توجد محطات';
            ui.sub.textContent = 'يرجى إدخال دولة صحيحة في البوت';
            ui.loading.style.display = 'none';
        }

        function loadStation(index) {
            if (!stations.length) return;
            const station = stations[index];
            
            ui.title.textContent = station.name || 'محطة غير معروفة';
            ui.sub.textContent = countryName.toUpperCase();
            
            if (station.favicon) {
                ui.logo.innerHTML = `<img src="${station.favicon}" onerror="this.outerHTML='<i class=\\'fas fa-music\\'></i>'">`;
            } else {
                ui.logo.innerHTML = '<i class="fas fa-music"></i>';
            }

            ui.audio.src = station.url_resolved || station.url;
            ui.audio.volume = ui.vol.value;
            ui.play.disabled = ui.prev.disabled = ui.next.disabled = false;
            
            checkFavState(station.stationuuid);
            
            if (isPlaying) {
                ui.audio.play().catch(()=>{ togglePlay(false); });
            }
            
            // Stop recording if station changes
            if (isRecording) toggleRecord();
        }

        function togglePlay(forcePlay) {
            const playTarget = typeof forcePlay === 'boolean' ? forcePlay : ui.audio.paused;
            if (playTarget) {
                ui.audio.play().then(() => {
                    isPlaying = true;
                    ui.playIcon.className = 'fas fa-pause';
                }).catch(()=>{});
            } else {
                ui.audio.pause();
                isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
            }
        }

        ui.play.onclick = () => togglePlay();
        ui.next.onclick = () => { currentIndex = (currentIndex + 1) % stations.length; loadStation(currentIndex); };
        ui.prev.onclick = () => { currentIndex = (currentIndex - 1 + stations.length) % stations.length; loadStation(currentIndex); };
        ui.vol.oninput = (e) => { ui.audio.volume = e.target.value; };

        // --- Favorites System ---
        function checkFavState(uuid) {
            const isFav = savedStations.some(s => s.id === uuid);
            ui.saveBtn.className = isFav ? 'action-btn active-fav' : 'action-btn';
            ui.saveBtn.innerHTML = isFav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
        }

        ui.saveBtn.onclick = () => {
            const station = stations[currentIndex];
            const idx = savedStations.findIndex(s => s.id === station.stationuuid);
            
            if (idx > -1) {
                savedStations.splice(idx, 1);
            } else {
                savedStations.push({ id: station.stationuuid, name: station.name, url: station.url_resolved || station.url, img: station.favicon });
            }
            localStorage.setItem('my_saved_stations', JSON.stringify(savedStations));
            checkFavState(station.stationuuid);
            renderFavorites();
        };

        function renderFavorites() {
            ui.favList.innerHTML = '';
            if(savedStations.length === 0) {
                ui.favList.innerHTML = '<li style="text-align:center; color:#94a3b8; margin-top:20px;">لا توجد محطات محفوظة</li>';
                return;
            }
            
            savedStations.forEach((fav, i) => {
                const li = document.createElement('li');
                li.className = 'fav-item';
                li.innerHTML = `
                    <div class="fav-info">${fav.name}</div>
                    <button class="fav-remove" title="إزالة"><i class="fas fa-trash"></i></button>
                `;
                
                // Play from favorites
                li.querySelector('.fav-info').onclick = () => {
                    // Temporarily add to current stations if not playing from current list
                    stations = [fav];
                    currentIndex = 0;
                    loadStation(0);
                    togglePlay(true);
                    ui.favModal.classList.remove('open');
                };
                
                // Remove from favorites
                li.querySelector('.fav-remove').onclick = () => {
                    savedStations.splice(i, 1);
                    localStorage.setItem('my_saved_stations', JSON.stringify(savedStations));
                    renderFavorites();
                    if(stations[currentIndex] && stations[currentIndex].stationuuid === fav.id) checkFavState(fav.id);
                };
                
                ui.favList.appendChild(li);
            });
        }

        ui.openFavs.onclick = () => { renderFavorites(); ui.favModal.classList.add('open'); };
        ui.closeFavs.onclick = () => { ui.favModal.classList.remove('open'); };

        // --- Recording System ---
        function toggleRecord() {
            if (isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                ui.recordBtn.classList.remove('recording');
            } else {
                if(ui.audio.paused) return alert("الرجاء تشغيل المحطة أولاً قبل التسجيل.");
                
                try {
                    const stream = ui.audio.captureStream ? ui.audio.captureStream() : ui.audio.mozCaptureStream();
                    if (!stream) throw new Error("Stream capture not supported");
                    
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = () => {
                        const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `Radio_Record_${Date.now()}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        URL.revokeObjectURL(url);
                        recordedChunks = [];
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    ui.recordBtn.classList.add('recording');
                } catch (e) {
                    alert("عذراً، لا يمكن تسجيل هذه المحطة بسبب حماية المصدر (CORS) المفروضة من سيرفر الراديو.");
                    isRecording = false;
                    ui.recordBtn.classList.remove('recording');
                }
            }
        }

        ui.recordBtn.onclick = toggleRecord;

        init();
    </script>
</body>
</html>
