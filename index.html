<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Global Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-base: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
            --font-family: 'Poppins', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg-base); background-image: radial-gradient(circle at top left, #1e293b, #0f172a); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 20px; overflow: hidden }

        .player-card { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); width: 100%; max-width: 420px; border-radius: 28px; padding: 14px 20px 10px; box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5); text-align: center; position: relative; border: 1px solid var(--border-glass); display: flex; flex-direction: column; gap: 8px; z-index: 10; margin-top: -40px; overflow: hidden; }

        .player-card > * { position: relative; z-index: 2; }

        #decorCanvas { position: absolute !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; z-index: 0 !important; pointer-events: none !important; }

        .header { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; }
        .header-left { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
        .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }
        
        .header-country { flex: 0 1 auto; font-size: 18px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center; letter-spacing: 1px; padding: 4px 14px; border: 1px solid var(--text-sub); border-radius: 0px; text-transform: capitalize; align-self: center; margin: -5px auto 0; }

        .icon-btn { background: var(--border-glass); border: none; color: var(--text-sub); width: 40px; height: 40px; border-radius: 50%; font-size: 15px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; }
        .icon-btn.has-text { width: auto; padding: 0 14px; border-radius: 20px; }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.15); color: #fff; transform: scale(1.05); }

        .donate-btn { width: 40px; height: 40px; background: #0070ba; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; text-decoration: none; box-shadow: 0 4px 15px rgba(0, 112, 186, 0.4); transition: 0.3s; flex-shrink: 0; }
        .donate-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(0, 112, 186, 0.6); }

        .header-timer-text { display: none; font-family: monospace; font-size: 13px; font-weight: 700; margin-left: 6px; color: var(--warning); }
        .icon-btn.has-text .header-timer-text { display: inline-block; }
        .icon-btn.active-timer { color: var(--warning); background: rgba(251, 191, 36, 0.15); border: 1px solid rgba(251, 191, 36, 0.3); }

        #removePhotoBtn { opacity: 0; pointer-events: none; transition: 0.3s; display: flex !important; color: var(--danger); background: rgba(239, 68, 68, 0.12); }
        #removePhotoBtn.visible { opacity: 1; pointer-events: auto; }
        #removePhotoBtn:hover { background: var(--danger); color: #fff; }

        .logo-container { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .logo-wrapper { width: 130px; height: 130px; position: relative; display: flex; justify-content: center; align-items: center; margin-top: 2px; margin-bottom: 2px; cursor: pointer; }
        .add-photo-svg { position: absolute; width: 170px; height: 170px; pointer-events: none; z-index: 5; top: -20px; }
        .add-photo-svg text { font-size: 10px; fill: var(--text-sub); font-family: monospace; letter-spacing: 0.5px; font-weight: bold; }

        .logo { width: 130px; height: 130px; border-radius: 50%; background: rgba(15, 23, 42, 0.6); display: flex; align-items: center; justify-content: center; overflow: hidden; border: 4px solid var(--border-glass); transition: border-color 0.4s ease, box-shadow 0.4s ease, transform 0.3s ease; position: absolute; }
        .logo:hover { border-color: rgba(255, 255, 255, 0.4); transform: scale(1.03); }
        .logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .logo.playing { border-color: var(--primary); box-shadow: 0 0 25px rgba(59, 130, 246, 0.5); }
        .logo.playing img { animation: spinDisc 15s linear infinite; }
        .logo i { font-size: 50px; }
        .logo.playing i.fa-music { animation: spinDisc 15s linear infinite; }
        @keyframes spinDisc { 100% { transform: rotate(360deg); } }

        .station-name { font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; margin-top: 5px; }
        .station-counter { font-size: 12px; color: var(--text-sub); font-weight: 500; letter-spacing: 1px; text-transform: uppercase; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 2px; }
        .ctrl-btn { border: none; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .nav-btn { width: 42px; height: 42px; background: rgba(255, 255, 255, 0.05); color: var(--text-main); font-size: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); transform: scale(1.1); }
        .play-btn { width: 60px; height: 60px; background: linear-gradient(135deg, var(--primary), var(--primary-hover)); border-radius: 50%; font-size: 20px; color: #fff; box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5); display: flex; align-items: center; justify-content: center; padding-left: 3px; }
        .play-btn:hover:not(:disabled) { transform: scale(1.08) translateY(-2px); }
        .play-btn .fa-pause { padding-left: 0; }

        .vis-container { display: flex; align-items: flex-end; justify-content: space-between; height: 30px; min-height: 30px; margin: 6px auto; width: 60%; }
        .vis-bar { flex: 1; margin: 0 2px; border-radius: 4px; height: 5px; transition: height 0.3s ease-out; }
        .vis-bar:nth-child(4n+1) { background: #ff0a54; box-shadow: 0 0 10px #ff0a54; }
        .vis-bar:nth-child(4n+2) { background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .vis-bar:nth-child(4n+3) { background: #10b981; box-shadow: 0 0 10px #10b981; }
        .vis-bar:nth-child(4n+4) { background: #fbbf24; box-shadow: 0 0 10px #fbbf24; }

        .actions-bar { display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.25); padding: 10px 16px; border-radius: 20px; margin-top: 2px; }
        .volume-container { display: flex; align-items: center; gap: 12px; flex-grow: 1; margin-right: 15px; }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255, 255, 255, 0.15); border-radius: 4px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(59,130,246,0.5); }
        .action-btn { background: none; border: none; font-size: 20px; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
        .action-btn:hover { color: #fff; transform: scale(1.1); }
        .action-btn.active-fav { color: var(--danger); animation: heartBeat 0.4s ease; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        .footer-note { font-size: 11px; color: var(--danger); margin-top: 0px; font-weight: 600; letter-spacing: 0.5px; }

        .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 140; opacity: 0; visibility: hidden; transition: 0.3s ease; }
        .sheet-overlay.open { opacity: 1; visibility: visible; }
        .bottom-sheet { position: fixed; bottom: 0; left: 0; width: 100%; background: #1e293b; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 15px 20px 20px; z-index: 150; box-shadow: 0 -15px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; gap: 12px; max-height: 85vh; transform-origin: bottom center; transform: perspective(1200px) translateY(100%) rotateX(-75deg); opacity: 0; visibility: hidden; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, visibility 0.6s; }
        .bottom-sheet.open { transform: perspective(1200px) translateY(0) rotateX(0deg); opacity: 1; visibility: visible; }
        .sheet-header { display: flex; justify-content: space-between; align-items: center; font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 2px; }
        .close-sheet { background: none; border: none; color: var(--text-sub); font-size: 20px; cursor: pointer; }
        
        .compact-timer-row { background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass); border-radius: 16px; padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }
        .timer-info { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 600; }
        .timer-info-left { display: flex; align-items: center; gap: 8px; }
        .digital-timer { font-family: monospace; font-size: 18px; font-weight: 700; color: var(--warning); background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 6px; display: none; }
        .digital-timer.visible { display: block; }
        .timer-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .timer-actions button { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #cbd5e1; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; transition: 0.2s; flex: 1; text-align: center; }
        .timer-actions button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        .cancel-timer-btn { background: rgba(239, 68, 68, 0.15); color: var(--danger); border: none; padding: 6px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 2px; visibility: hidden; opacity: 0; }
        .cancel-timer-btn.visible { visibility: visible; opacity: 1; }
        .cancel-timer-btn:hover { background: var(--danger); color: #fff; }

        .theme-colors { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .theme-color-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .theme-color-btn:hover { transform: scale(1.1); border-color: #fff; }
        #searchInput { background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass); color: #fff; padding: 10px 14px; border-radius: 12px; font-size: 14px; outline: none; }
        #searchResults { list-style: none; max-height: 220px; overflow-y: auto; }
        #searchResults li { padding: 10px 14px; margin-bottom: 6px; background: rgba(255,255,255,0.05); border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 14px; }
        #searchResults li:hover { background: rgba(59,130,246,0.2); }

        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200; display: flex; flex-direction: column; padding: 30px 20px; backdrop-filter: blur(12px); transform-origin: center; transform: perspective(1200px) scale(0.7) rotateX(45deg) rotateY(-15deg); opacity: 0; visibility: hidden; transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease, visibility 0.6s; }
        .modal.open { transform: perspective(1200px) scale(1) rotateX(0deg) rotateY(0deg); opacity: 1; visibility: visible; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border-glass); }
        .close-modal { background: none; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .close-modal:hover { color: var(--danger); transform: rotate(90deg); }
        .fav-list { flex: 1; overflow-y: auto; list-style: none; padding-right: 5px; }
        .fav-list::-webkit-scrollbar { width: 5px; }
        .fav-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .fav-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 14px; margin-bottom: 10px; border: 1px solid var(--border-glass); transition: 0.3s ease; }
        .fav-item:hover { border-color: var(--primary); background: rgba(59,130,246,0.1); transform: translateX(5px); }
        .fav-item-content { display: flex; align-items: center; flex: 1; cursor: pointer; gap: 15px; overflow: hidden; }
        .fav-play-icon { color: var(--primary); font-size: 22px; }
        .fav-info { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size:14px; }
        .fav-remove { color: var(--danger); background: rgba(239, 68, 68, 0.15); border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .fav-remove:hover { background: var(--danger); color: #fff; }

        #noteInput { background: rgba(255,255,255,0.05); color: #fff; padding: 12px; border-radius: 12px; border: 1px solid var(--border-glass); outline: none; resize: none; font-family: inherit; font-size: 13px; }
        #noteInput::placeholder { color: var(--text-sub); }
        #saveNoteBtn { background: var(--primary); color: #fff; border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        #saveNoteBtn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .note-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; border: 1px solid var(--border-glass); position: relative; margin-bottom: 8px; display: flex; flex-direction: column; gap: 4px; }
        .note-date { font-size: 10px; color: var(--warning); font-weight: 600; }
        .note-text { font-size: 13px; color: #fff; word-break: break-word; padding-right: 25px; line-height: 1.4; white-space: pre-wrap; text-align: left; }
        .note-del { position: absolute; top: 10px; right: 10px; background: none; border: none; color: var(--text-sub); cursor: pointer; transition: 0.2s; }
        .note-del:hover { color: var(--danger); }

        #loading { position: fixed; inset: 0; background: var(--bg-base); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; color: var(--primary); font-weight: 600; letter-spacing: 2px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(59, 130, 246, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        .loading-text::after { content: ''; animation: dots 1.5s infinite steps(1); }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }





/* --- تصميم اللعبة المدمجة --- */
        .game-container { position: absolute; top: 55px; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); z-index: 100; border-radius: 0 0 28px 28px; display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: 0.4s ease; overflow: hidden; }
        .game-container.active { opacity: 1; visibility: visible; }
        #gameCanvas { width: 100%; height: 100%; cursor: pointer; }
        .game-over-ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(0,0,0,0.8); padding: 25px; border-radius: 20px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--primary); width: 80%; }
        .game-over-ui h2 { color: #fff; margin-bottom: 5px; font-size: 22px; }
        .game-over-ui p { color: var(--warning); font-size: 18px; margin-bottom: 20px; font-weight: bold; }
        .game-over-ui button { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); color: #fff; border: none; padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; transition: 0.3s; }
        .game-over-ui button:hover { transform: scale(1.05); }




        
    </style>
</head>
<body>

    <div id="loading"><div class="spinner"></div><span class="loading-text">Please wait</span></div>

    <div class="player-card">
        <canvas id="decorCanvas"></canvas>

        <div class="header">
            <div class="header-left">
                <button class="icon-btn" id="toggleTimerBtn" title="Timers"><i class="fas fa-stopwatch"></i><span id="mainHeaderTimer" class="header-timer-text"></span></button>
                <button class="icon-btn" id="shareBtn" title="Share Bot"><i class="fas fa-share-alt"></i></button>
                <button class="icon-btn" id="themeBtn" title="Change Theme"><i class="fas fa-palette"></i></button>
                <button class="icon-btn" id="decorToggleBtn" title="Toggle Decorations"><i class="fas fa-magic"></i></button>
                <button class="icon-btn" id="removePhotoBtn" title="Remove Photo"><i class="fas fa-trash-alt"></i></button>
                <!-- زر اللعبة الذي أضفناه -->
                <button class="icon-btn" id="gameToggleBtn" title="Play Game" style="color: var(--warning);"><i class="fas fa-gamepad"></i></button>
            </div>
            
            <div class="header-country" id="headerCountry">Global Radio</div>
            
            <div class="header-right">
                <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn" title="Support Developer"><i class="fab fa-paypal"></i></a>
                <button class="icon-btn" id="openFavsBtn" title="Saved Stations"><i class="fas fa-list-ul"></i></button>
                <button class="icon-btn" id="notesBtn" title="My Notes"><i class="fas fa-edit"></i></button>
                <button class="icon-btn" id="searchBtn" title="Search Stations"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <div class="logo-container">
            <div class="logo-wrapper" id="logoWrapper">
                <svg class="add-photo-svg" id="addPhotoText" viewBox="0 0 150 150">
                    <path id="logoCurve" d="M 25 75 A 50 50 0 0 1 125 75" fill="transparent" />
                    <text><textPath href="#logoCurve" startOffset="50%" text-anchor="middle">add your own photo</textPath></text>
                </svg>
                <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
            </div>
            <input type="file" id="customPhotoInput" accept="image/*" style="display: none;" />
            <div class="station-name" id="stationTitle">Loading...</div>
            <div class="station-counter" id="stationSub">Initializing</div>
        </div>

        <div class="controls">
            <button class="ctrl-btn nav-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn nav-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>
        
        <div id="cool-visualizer" class="vis-container"></div>

        <div class="actions-bar">
            <div class="volume-container">
                <i class="fas fa-volume-down" style="color:var(--text-sub); font-size:14px;"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <i class="fas fa-volume-up" style="color:var(--text-sub); font-size:16px;"></i>
            </div>
            <button class="action-btn" id="saveFavBtn" title="Save Station"><i class="far fa-heart"></i></button>
        </div>



<div class="footer-note">Change country inside the bot chat.<br><span id="listenTimeDisplay" style="font-size: 9px; color: var(--warning); font-family: monospace; letter-spacing: 2px;">00 : 00 : 00 : 00 : 00 : 00</span></div>

        
        
        
        <audio id="audioPlayer" preload="metadata"></audio>

   <!-- واجهة اللعبة التي أضفناها -->
        <div class="game-container" id="gameContainer">
            <canvas id="gameCanvas"></canvas>
            <div class="game-over-ui" id="gameOverUI">
                <h2>Game Over!</h2>
                <p>Score: <span id="gameScore">0</span></p>
                <button id="retryBtn"><i class="fas fa-redo"></i> Play Again</button>
            </div>
        </div>
    </div>
    

    <!-- Modals -->
    <div class="sheet-overlay" id="timerOverlay"></div>
    <div class="bottom-sheet" id="timerSheet">
        <div class="sheet-header"><div><i class="fas fa-stopwatch" style="color:var(--primary); margin-right:5px;"></i> Auto Timers <span id="sheetHeaderTimer" class="sheet-header-timer"></span></div><button class="close-sheet" id="closeTimerBtn"><i class="fas fa-times"></i></button></div>
        <div class="compact-timer-row"><div class="timer-info"><div class="timer-info-left"><i class="fas fa-moon" style="color:#60a5fa"></i> Sleep</div><span class="digital-timer" id="sleepDigital">00:00</span></div><div class="timer-actions" id="sleepActions"><button data-min="1">1m</button><button data-min="5">5m</button><button data-min="15">15m</button><button data-min="30">30m</button><button data-min="60">1h</button></div><button class="cancel-timer-btn" id="sleepCancelBtn">Cancel Sleep Timer</button></div>
        <div class="compact-timer-row"><div class="timer-info"><div class="timer-info-left"><i class="fas fa-clock" style="color:#4ade80"></i> Start</div><span class="digital-timer" id="startDigital">00:00</span></div><div class="timer-actions" id="startActions"><button data-min="1">1m</button><button data-min="5">5m</button><button data-min="15">15m</button><button data-min="30">30m</button><button data-min="60">1h</button></div><button class="cancel-timer-btn" id="startCancelBtn">Cancel Start Timer</button></div>
    </div>
    
    <div class="sheet-overlay" id="themeOverlay"></div>
    <div class="bottom-sheet" id="themeSheet"><div class="sheet-header"><div><i class="fas fa-palette" style="color:var(--primary); margin-right:5px;"></i> Pick a Theme</div><button class="close-sheet" id="closeThemeBtn"><i class="fas fa-times"></i></button></div><div class="theme-colors" id="themeColors"></div></div>
    
    <div class="sheet-overlay" id="searchOverlay"></div>
    <div class="bottom-sheet" id="searchSheet"><div class="sheet-header"><div><i class="fas fa-search" style="color:var(--primary); margin-right:5px;"></i> Search Station</div><button class="close-sheet" id="closeSearchBtn"><i class="fas fa-times"></i></button></div><input type="text" id="searchInput" placeholder="Type station name..." autocomplete="off" /><ul id="searchResults"></ul></div>

ent.getElementById('searchInput'), searchResults: document.getElementById('searchResults'), logoWrapper: document.getElementById('logoWrapper'), customPhotoInput: document.getElementById('customPhotoInput'), removePhotoBtn: document.getElementById('removePhotoBtn'), addPhotoText: document.getElementById('addPhotoText'),

        let decorState = 0; // 0: Off, 1: Color Inside, 2: Color Back, 3: Snow Inside, 4: Snow Back
        let decorCanvas = document.getElementById('decorCanvas');

        let cw, ch;
        let particles = [];
        const neonColors = ['#ff0a54', '#3b82f6', '#10b981', '#fbbf24', '#8b5cf6', '#06b6d4'];

        function resizeCanvas() {
            if (decorState === 2 || decorState === 4) {
                cw = decorCanvas.width = window.innerWidth;
                ch = decorCanvas.height = window.innerHeight;
            } else {
                const card = document.querySelector('.player-card');
                cw = decorCanvas.width = card.offsetWidth;
                ch = decorCanvas.height = card.offsetHeight;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        function initParticles() {
            particles = [];
            for(let i=0; i<90; i++) {
                particles.push({
                    x: Math.random() * cw, y: Math.random() * ch,
                    r: (decorState === 1 || decorState === 2) ? Math.random()*2 + 1 : Math.random()*2.5 + 1.5,
                    s: (decorState === 1 || decorState === 2) ? Math.random()*0.5 + 0.2 : 0, 
                    d: Math.random()*0.8,
                    c: (decorState === 1 || decorState === 2) ? neonColors[Math.floor(Math.random()*neonColors.length)] : 'rgba(255,255,255,0.9)'
                });
            }
        }

        let angle = 0;
        function animateDecor() {
            if (decorState === 0) { ctx.clearRect(0, 0, cw, ch); return; }
            ctx.clearRect(0, 0, cw, ch);
            angle += 0.01;
            ctx.beginPath();
            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                ctx.fillStyle = p.c;
                ctx.moveTo(p.x, p.y);
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
            }
            ctx.fill();
            for(let i=0; i<particles.length; i++) {
                let p = particles[i];
                if (decorState === 1 || decorState === 2) {
                    p.y += p.s;
                    p.x += Math.sin(angle + p.d) * 0.5;
                } else if (decorState === 3 || decorState === 4) {
                    p.y += Math.pow(p.d, 2) * 0.5 + 0.3; 
                    p.x += Math.sin(angle + p.d) * 0.3;
                }
                if(p.y > ch) { particles[i] = { ...p, x: Math.random()*cw, y: -5 }; }
            }
        }
        setInterval(animateDecor, 30);

End + (mins * 60000) : now + (mins * 60000); DOM.startCancelBtn.classList.add('visible'); DOM.startDigital.classList.add('visible'); startEngine(); clearTimeout(timers.startTo); const remainingMs = timers.startEnd - Date.now(); timers.startTo = setTimeout(() => { audioController.forceStart(); clearStartUI(); }, remainingMs); } }); DOM.sleepCancelBtn.addEventListener('click', clearSleepUI); DOM.startCancelBtn.addEventListener('click', clearStartUI);

        DOM.shareBtn.addEventListener('click', () => { const shareUrl = 'https://t.me/Time_of_world_origins_bot/Radio'; if (navigator.share) { navigator.share({ title: 'Global Radio Player', text: 'Listen to radio stations from around the world!', url: shareUrl, }).catch(() => {}); } else { navigator.clipboard?.writeText(shareUrl).then(() => { alert('Link copied!'); }).catch(() => { prompt('Copy this link to share:', shareUrl); }); } });
        const toggleSearchSheet = () => { DOM.searchSheet.classList.toggle('open'); DOM.searchOverlay.classList.toggle('open'); DOM.searchInput.value = ''; DOM.searchResults.innerHTML = ''; DOM.searchInput.focus(); }; DOM.searchBtn.addEventListener('click', toggleSearchSheet); DOM.closeSearchBtn.addEventListener('click', toggleSearchSheet); DOM.searchOverlay.addEventListener('click', toggleSearchSheet); DOM.searchInput.addEventListener('input', () => { const term = DOM.searchInput.value.toLowerCase().trim(); if (!term) { DOM.searchResults.innerHTML = ''; return; } const filtered = stations.filter(s => s.name.toLowerCase().includes(term)); DOM.searchResults.innerHTML = filtered.map((s, idx) => { const realIndex = stations.indexOf(s); return `<li data-index="${realIndex}">${s.name}</li>`; }).join(''); }); DOM.searchResults.addEventListener('click', e => { const li = e.target.closest('li'); if (!li) return; UIController.loadIndex(parseInt(li.dataset.index)); toggleSearchSheet(); audioController.play(); });
        const checkFavState = id => { const fav = savedStations.some(s => s.id === id); DOM.saveBtn.className = fav ? 'action-btn active-fav' : 'action-btn'; DOM.saveBtn.innerHTML = fav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>'; }; DOM.saveBtn.addEventListener('click', () => { const current = isExternalFavPlaying ? savedStations.find(s => s.url === DOM.audio.src) : stations[currentIndex]; if(!current) return; const stId = current.stationuuid || current.id; const existIdx = savedStations.findIndex(s => s.id === stId); if (existIdx > -1) { savedStations.splice(existIdx, 1); } else { savedStations.push({ id: stId, name: current.name, url: current.url_resolved || current.url, country: current.country || TARGET_COUNTRY }); } localStorage.setItem('radio_saved_list', JSON.stringify(savedStations)); checkFavState(stId); renderFavorites(); }); const renderFavorites = () => { DOM.favList.innerHTML = savedStations.length ? '' : '<li style="text-align:center; color:var(--text-sub); margin-top:20px;">No saved stations.</li>'; savedStations.forEach((f, i) => { const li = document.createElement('li'); li.className = 'fav-item'; const countryText = f.country ? ` (${f.country})` : ''; li.innerHTML = `<div class="fav-item-content"><i class="fas fa-play-circle fav-play-icon"></i><div class="fav-info" title="${f.name}">${f.name || 'Unknown'}${countryText}</div></div><button class="fav-remove" title="Remove"><i class="fas fa-trash-alt"></i></button>`; li.querySelector('.fav-item-content').addEventListener('click', () => { DOM.favModal.classList.remove('open'); const idx = stations.findIndex(s => s.stationuuid === f.id); if(idx > -1) { UIController.loadIndex(idx); audioController.play(); } else { UIController.loadExternalFav(f); } }); li.querySelector('.fav-remove').addEventListener('click', e => { e.stopPropagation(); savedStations.splice(i, 1); localStorage.setItem('radio_saved_list', JSON.stringify(savedStations)); renderFavorites(); const activeId = isExternalFavPlaying ? f.id : (stations[currentIndex]?.stationuuid); if (activeId === f.id) checkFavState(f.id); }); DOM.favList.appendChild(li); }); }; DOM.openFavs.addEventListener('click', () => { renderFavorites(); DOM.favModal.classList.add('open'); }); DOM.closeFavs.addEventListener('click', () => DOM.favModal.classList.remove('open'));

        async function bootApp() {
            await fetchOTA(); // جلب التحديثات عند הפتح فقط
            
            if (customImageUrl) { applyCustomPhoto(customImageUrl); } else if (isTextHidden) { DOM.addPhotoText.style.display = 'none'; }
            
            DOM.headerCountry.textContent = TARGET_COUNTRY || 'Global Radio';
            if(!TARGET_COUNTRY || TARGET_COUNTRY.length < 2) { UIController.emptyState(); DOM.loading.style.display = 'none'; return; }
            stations = await radioService.fetchByStr(TARGET_COUNTRY);
stations = stations.filter(s => !s.name.toLowerCase().includes("abdulbasit abdulsamad"));
            if(stations.length) { UIController.loadIndex(0); } else { UIController.emptyState(); }
            DOM.loading.style.display = 'none';
        }





        
// --- ⏱️ نظام حساب وقت الاستماع التراكمي (أصفار فقط) ---
        let totalListenSeconds = parseInt(localStorage.getItem('radio_listen_time')) || 0;
        let listenTimerInterval = null;
        const listenTimeDisplay = document.getElementById('listenTimeDisplay');

        function formatListenTime(secs) {
            let y = Math.floor(secs / 31536000);
            let mo = Math.floor((secs % 31536000) / 2592000);
            let d = Math.floor((secs % 2592000) / 86400);
            let h = Math.floor((secs % 86400) / 3600);
            let m = Math.floor((secs % 3600) / 60);
            let s = Math.floor(secs % 60);
            
            const pad = num => num.toString().padStart(2, '0');
            // أصفار فقط مفصولة بنقطتين
            return `${pad(y)} : ${pad(mo)} : ${pad(d)} : ${pad(h)} : ${pad(m)} : ${pad(s)}`;
        }

        if(listenTimeDisplay) listenTimeDisplay.innerText = formatListenTime(totalListenSeconds);

        function startListeningTimer() {
            if (listenTimerInterval) return;
            listenTimerInterval = setInterval(() => {
                totalListenSeconds++;
                if(listenTimeDisplay) listenTimeDisplay.innerText = formatListenTime(totalListenSeconds);
                if (totalListenSeconds % 5 === 0) localStorage.setItem('radio_listen_time', totalListenSeconds);
            }, 1000);
        }

        function stopListeningTimer() {
            if (listenTimerInterval) {
                clearInterval(listenTimerInterval);
                listenTimerInterval = null;
                localStorage.setItem('radio_listen_time', totalListenSeconds);
            }
        }

        DOM.audio.addEventListener('playing', startListeningTimer);
        DOM.audio.addEventListener('pause', stopListeningTimer);
        DOM.audio.addEventListener('waiting', stopListeningTimer);



        

        
        bootApp();








// --- 🎮 محرك لعبة Flappy Note (مدمج، أوفلاين، مع حفظ محلي وقائمة استئناف) ---
        (function initGameModule() {
            try {
                const gameToggleBtn = document.getElementById('gameToggleBtn');
                const gameContainer = document.getElementById('gameContainer');
                const gameCanvas = document.getElementById('gameCanvas');
                const gameOverUI = document.getElementById('gameOverUI');
                const gameScoreEl = document.getElementById('gameScore');
                const retryBtn = document.getElementById('retryBtn');

                if (!gameToggleBtn || !gameContainer || !gameCanvas) return;

                const ctxGame = gameCanvas.getContext('2d');
                let gameLoop; 
                let frames = 0; 
                let score = 0;
                let isPlaying = false;
                let isPaused = false;
                let isGameOver = false;
                
                // جلب أفضل نتيجة محلية
                let bestScore = parseInt(localStorage.getItem('radio_flappy_best')) || 0;
                
                const player = { x: 50, y: 150, radius: 12, velocity: 0, gravity: 0.4, jump: -6.5 };
                let pipesObj = { array: [], width: 45, gap: 140, dx: 3 };

                // تحديث شكل أيقونة اللعبة في واجهة الراديو (إضافة الرقم تحتها)
                function updateGameIcon(isOpen) {
                    if (isOpen) {
                        gameToggleBtn.innerHTML = '<i class="fas fa-times"></i>';
                        gameToggleBtn.style.color = '#ef4444';
                    } else {
                        let scoreHtml = bestScore > 0 ? `<span style="font-size:10px; font-weight:700; font-family:monospace; margin-top:3px;">${bestScore}</span>` : '';
                        gameToggleBtn.innerHTML = `<div style="display:flex; flex-direction:column; align-items:center; line-height:1;"><i class="fas fa-gamepad"></i>${scoreHtml}</div>`;
                        gameToggleBtn.style.color = 'var(--warning)';
                    }
                }
                
                // تشغيل التحديث فوراً عند فتح التطبيق
                updateGameIcon(false);

                // 1. زر الخروج (❌) أعلى اليسار
                const closeGameBtn = document.createElement('button');
                closeGameBtn.innerHTML = '<i class="fas fa-times"></i>';
                closeGameBtn.style.cssText = 'position: absolute; top: 20px; left: 20px; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.5); width: 50px; height: 50px; border-radius: 50%; font-size: 24px; z-index: 101; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); transition: 0.2s;';
                gameContainer.appendChild(closeGameBtn);

                // 2. زر الإيقاف المؤقت (⏸️) أسفل اليمين
                const pauseBtn = document.createElement('button');
                pauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                pauseBtn.style.cssText = 'position: absolute; right: 20px; bottom: 20%; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2); width: 65px; height: 65px; border-radius: 50%; font-size: 26px; z-index: 101; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);';
                gameContainer.appendChild(pauseBtn);

                // 3. قائمة الاستئناف (تظهر عند الإيقاف أو الخروج والعودة)
                const pauseMenuUI = document.createElement('div');
                pauseMenuUI.style.cssText = 'position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(15,23,42,0.95); padding: 30px 25px; border-radius: 20px; display: none; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid #fbbf24; width: 80%; z-index: 105; flex-direction: column; align-items: center; backdrop-filter: blur(10px);';
                pauseMenuUI.innerHTML = `
                    <h2 style="color: #fbbf24; margin-bottom: 25px; font-size: 24px;"><i class="fas fa-pause-circle"></i> Paused</h2>
                    <button id="resumeGameBtn" style="background: linear-gradient(135deg, #3b82f6, #2563eb); color: #fff; border: none; padding: 12px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-bottom: 12px; transition: 0.2s;"><i class="fas fa-play"></i> Resume</button>
                    <button id="restartGameBtn" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 12px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.2s;"><i class="fas fa-redo"></i> Restart</button>
                `;
                gameContainer.appendChild(pauseMenuUI);

                const resumeGameBtn = pauseMenuUI.querySelector('#resumeGameBtn');
                const restartGameBtn = pauseMenuUI.querySelector('#restartGameBtn');

                // منع اللمس على الأزرار والقوائم من جعل اللاعب يقفز
                const stopProp = (e) => e.stopPropagation();
                [closeGameBtn, pauseBtn, pauseMenuUI, gameOverUI].forEach(el => {
                    el.addEventListener('mousedown', stopProp);
                    el.addEventListener('touchstart', stopProp, { passive: false });
                });

                // دوال الإيقاف والاستئناف
                function pauseGame() {
                    if (isGameOver || !isPlaying) return;
                    isPlaying = false;
                    isPaused = true;
                    cancelAnimationFrame(gameLoop);
                    pauseBtn.innerHTML = '<i class="fas fa-play" style="padding-left:4px;"></i>';
                    pauseMenuUI.style.display = 'flex';
                }

                function resumeGame() {
                    if (isGameOver) return;
                    isPlaying = true;
                    isPaused = false;
                    pauseMenuUI.style.display = 'none';
                    pauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    updateGame();
                }

                pauseBtn.addEventListener('click', () => {
                    if (isPaused) resumeGame();
                    else pauseGame();
                });

                resumeGameBtn.addEventListener('click', resumeGame);
                restartGameBtn.addEventListener('click', () => {
                    pauseMenuUI.style.display = 'none';
                    resetGame();
                });

                // زر الخروج ❌ يقوم بإيقاف اللعبة وإخفائها للعودة للراديو
                closeGameBtn.addEventListener('click', () => {
                    if (isPlaying) { pauseGame(); }
                    gameContainer.classList.remove('active');
                    updateGameIcon(false);
                });

                function resizeGame() {
                    gameCanvas.width = gameContainer.clientWidth;
                    gameCanvas.height = gameContainer.clientHeight;
                }

                function drawPlayer() {
                    ctxGame.beginPath();
                    ctxGame.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
                    ctxGame.fillStyle = '#fbbf24'; 
                    ctxGame.fill();
                    ctxGame.shadowBlur = 10;
                    ctxGame.shadowColor = '#fbbf24';
                    ctxGame.closePath();
                    
                    ctxGame.shadowBlur = 0;
                    ctxGame.fillStyle = '#000';
                    ctxGame.font = '14px Arial';
                    ctxGame.textAlign = 'left';
                    ctxGame.fillText('🎵', player.x - 7, player.y + 5);
                }

                function handlePipes() {
                    if (frames % 90 === 0) {
                        let pipeY = Math.random() * (gameCanvas.height - pipesObj.gap - 100) + 50;
                        pipesObj.array.push({ x: gameCanvas.width, y: pipeY, passed: false });
                    }
                    for (let i = 0; i < pipesObj.array.length; i++) {
                        let p = pipesObj.array[i];
                        p.x -= pipesObj.dx;
                        
                        ctxGame.fillStyle = '#3b82f6';
                        ctxGame.fillRect(p.x, 0, pipesObj.width, p.y); 
                        ctxGame.fillRect(p.x, p.y + pipesObj.gap, pipesObj.width, gameCanvas.height - p.y - pipesObj.gap); 

                        if (player.x + player.radius > p.x && player.x - player.radius < p.x + pipesObj.width) {
                            if (player.y - player.radius < p.y || player.y + player.radius > p.y + pipesObj.gap) {
                                endGame();
                            }
                        }
                        
                        if (!p.passed && player.x > p.x + pipesObj.width) {
                            p.passed = true;
                            score++; 
                            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                                window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
                            }
                        }
                        if (p.x + pipesObj.width < 0) { pipesObj.array.shift(); i--; }
                    }
                }

                // رسم النتيجة الحالية وأفضل نتيجة في اللعبة
                function drawScores() {
                    ctxGame.fillStyle = '#fff';
                    ctxGame.font = 'bold 45px Poppins';
                    ctxGame.textAlign = 'center';
                    ctxGame.fillText(score, gameCanvas.width / 2, 70);
                    
                    ctxGame.fillStyle = '#fbbf24';
                    ctxGame.font = 'bold 16px Poppins';
                    ctxGame.fillText('BEST: ' + bestScore, gameCanvas.width / 2, 95);
                }

                function updateGame() {
                    if (!isPlaying || isPaused || isGameOver) return;
                    ctxGame.clearRect(0, 0, gameCanvas.width, gameCanvas.height);
                    
                    player.velocity += player.gravity;
                    player.y += player.velocity;
                    
                    if (player.y + player.radius >= gameCanvas.height || player.y - player.radius <= 0) {
                        endGame();
                    }
                    
                    drawPlayer();
                    handlePipes();
                    drawScores();
                    
                    frames++;
                    gameLoop = requestAnimationFrame(updateGame);
                }

                function jump(e) {
                    if(e) e.preventDefault();
                    if (!isPlaying || isPaused || isGameOver) return;
                    player.velocity = player.jump;
                    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.impactOccurred('soft');
                    }
                }

                function endGame() {
                    if (isGameOver) return;
                    isPlaying = false;
                    isGameOver = true;
                    cancelAnimationFrame(gameLoop);

                    // تحديث أعلى رقم قياسي محلياً
                    if (score > bestScore) {
                        bestScore = score;
                        localStorage.setItem('radio_flappy_best', bestScore);
                    }

                    if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                        window.Telegram.WebApp.HapticFeedback.notificationOccurred('error');
                    }

                    pauseMenuUI.style.display = 'none'; // إخفاء قائمة الإيقاف إن وجدت
                    gameOverUI.style.display = 'block';
                    gameScoreEl.textContent = score;
                }

                function resetGame() {
                    player.y = gameCanvas.height / 2;
                    player.velocity = 0;
                    pipesObj.array = [];
                    score = 0;
                    frames = 0;
                    isPlaying = true;
                    isPaused = false;
                    isGameOver = false;
                    pauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    gameOverUI.style.display = 'none';
                    pauseMenuUI.style.display = 'none';
                    updateGame();
                }

                // فتح اللعبة (استئناف أو جديد)
                gameToggleBtn.addEventListener('click', () => {
                    const isGameOpen = gameContainer.classList.contains('active');
                    if (isGameOpen) {
                        closeGameBtn.click(); // إذا كانت مفتوحة وضغطت على الزر الأصلي، تغلق.
                    } else {
                        gameContainer.classList.add('active');
                        resizeGame();
                        updateGameIcon(true);
                        
                        if (isGameOver || (!isPlaying && !isPaused && frames === 0)) {
                            resetGame(); // بدء لعبة جديدة
                        } else if (isPaused) {
                            // اللعبة كانت متوقفة، نظهر واجهة الاستئناف
                            pauseMenuUI.style.display = 'flex';
                        }
                    }
                });

                gameCanvas.addEventListener('mousedown', jump);
                gameCanvas.addEventListener('touchstart', jump, { passive: false });
                retryBtn.addEventListener('click', resetGame);
                
            } catch (error) { console.error("Game Error: ", error); }
        })();
        

        

        

        

// تفعيل الاهتزاز الحسي بقوة أعلى
        document.body.addEventListener('click', (e) => {
            if (!tg || !tg.HapticFeedback) return;
            
            const btn = e.target.closest('button');
            const favItem = e.target.closest('.fav-item-content');
            
            if (btn) {
                if (btn.classList.contains('play-btn')) {
                    // اهتزاز قوي وحاد لزر التشغيل والإيقاف
                    tg.HapticFeedback.impactOccurred('rigid'); 
                } else if (btn.classList.contains('nav-btn')) {
                    // اهتزاز النبضة المزدوجة (القوية) عند تغيير المحطة!
                    tg.HapticFeedback.notificationOccurred('success'); 
                } else {
                    // اهتزاز متوسط (بدل الخفيف) لباقي الأزرار والقوائم
                    tg.HapticFeedback.impactOccurred('heavy'); 
                }
            } else if (favItem) {
                // اهتزاز مزدوج قوي عند اختيار محطة من القائمة
                tg.HapticFeedback.notificationOccurred('success'); 
            }
        });

        DOM.vol.addEventListener('input', () => {
            // تقليل الرقم العشوائي من 0.7 إلى 0.4 يجعل الاهتزاز يحدث بشكل متكرر وكثيف أثناء سحب الصوت
            if (tg && tg.HapticFeedback && Math.random() > 0.4) {
                tg.HapticFeedback.impactOccurred('medium'); 
            }
        });
    </script>
