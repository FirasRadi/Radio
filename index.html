<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio & TV Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-start: #070b14;
            --bg-end: #0f1829;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.25);
            --blue-accent: #00b4d8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(212, 175, 55, 0.15);
            --text-primary: #f0f4fa;
            --text-secondary: #a0b3cc;
            --radius: 32px;
            --shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: var(--text-primary);
        }

        .app-card {
            width: 100%;
            max-width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: var(--radius);
            padding: 28px 22px 32px;
            box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            position: relative;
            transition: 0.3s;
        }

        .app-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: var(--radius);
            padding: 1.5px;
            background: linear-gradient(135deg, var(--gold), transparent 40%, transparent 60%, var(--gold));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 60px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .tab-btn {
            flex: 1;
            padding: 12px 0;
            border: none;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 600;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.3px;
            font-family: inherit;
        }

        .tab-btn i {
            font-size: 16px;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #0b1a2e, #142b44);
            color: var(--gold);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(212, 175, 55, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .tab-btn:not(.active):hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }

        .logo-frame {
            width: 120px;
            height: 120px;
            margin: 6px auto 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a2639, #0a0f1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--gold);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(212, 175, 55, 0.2);
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-frame i {
            filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.2));
        }

        .station-name {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            letter-spacing: -0.2px;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-meta {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 22px;
            direction: ltr;
            letter-spacing: 0.2px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2px;
            margin-bottom: 20px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 22px;
            cursor: pointer;
            transition: 0.2s;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .ctrl-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.05);
        }

        .ctrl-btn.play-btn {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #0f263b, #1a3a57);
            color: var(--gold);
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(212, 175, 55, 0.25);
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .ctrl-btn.play-btn:hover {
            transform: scale(1.04);
            background: linear-gradient(135deg, #142f47, #1f4468);
            border-color: var(--gold);
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        audio {
            width: 100%;
            height: 44px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.3);
            outline: none;
            margin-top: 2px;
        }
        audio::-webkit-media-controls-panel {
            background: rgba(0, 0, 0, 0.3);
        }

        .footer-note {
            margin-top: 22px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 12px;
            font-weight: 400;
            color: #6a7f9e;
            text-align: center;
            letter-spacing: 0.2px;
            transition: 0.3s;
            min-height: 38px;
        }

        .footer-note i {
            margin-left: 8px;
            color: var(--gold-dim);
            font-size: 11px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0 10px;
            text-align: center;
        }
        .empty-state i {
            font-size: 42px;
            color: var(--gold-dim);
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-weight: 500;
            font-size: 18px;
            color: #c8d6e5;
        }
        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
            max-width: 260px;
            margin-top: 6px;
        }

        #loading {
            position: fixed;
            inset: 0;
            background: rgba(7, 11, 20, 0.92);
            backdrop-filter: blur(8px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            z-index: 999;
            color: var(--text-secondary);
            font-size: 14px;
        }
        #loading i {
            font-size: 34px;
            color: var(--gold);
        }

        @media (max-width: 460px) {
            .app-card {
                padding: 20px 16px 24px;
            }
            .logo-frame {
                width: 96px;
                height: 96px;
                font-size: 36px;
            }
            .station-name {
                font-size: 18px;
            }
            .ctrl-btn.play-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div id="loading">
        <i class="fas fa-spinner fa-spin"></i>
        <span>Loading stations...</span>
    </div>

    <div class="app-card">

        <div class="tabs">
            <button class="tab-btn active" data-mode="radio" id="tabRadio">
                <i class="fas fa-radio"></i> Radio
            </button>
            <button class="tab-btn" data-mode="tv" id="tabTv">
                <i class="fas fa-tv"></i> TV
            </button>
        </div>

        <div class="logo-frame" id="stationLogo">
            <i class="fas fa-radio"></i>
        </div>

        <div class="station-name" id="stationTitle">Select a country</div>
        <div class="station-meta" id="stationSub">Use the bot to set your country</div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-step-forward"></i></button>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>

        <!-- ملاحظة ثابتة تتغير حسب الوضع -->
        <div class="footer-note" id="footerNote">
            <i class="fas fa-info-circle"></i>
            To change TV channels, please type a new country name in the bot chat.
        </div>

    </div>

    <script>
        // ============================================================
        //  تهيئة Telegram WebApp
        // ============================================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ============================================================
        //  عناصر DOM
        // ============================================================
        const loading = document.getElementById('loading');
        const tabRadio = document.getElementById('tabRadio');
        const tabTv = document.getElementById('tabTv');
        const logo = document.getElementById('stationLogo');
        const title = document.getElementById('stationTitle');
        const sub = document.getElementById('stationSub');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('audioPlayer');
        const footerNote = document.getElementById('footerNote');

        // ============================================================
        //  قراءة المعاملات من الرابط (كما يرسلها البوت)
        //  - السيناريو 1: /radio2 France  →  ?name=France
        //  - السيناريو 2: /setcountry France → ?code=FR&name=France
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const countryCode = params.get('code') || '';   // مثال: "FR"
        const countryName = params.get('name') || '';   // مثال: "France"

        // ============================================================
        //  حالة التطبيق
        // ============================================================
        let currentMode = 'radio';
        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let hasValidCountry = false;

        // ============================================================
        //  دوال جلب البيانات (بدون أي قيم افتراضية)
        // ============================================================

        // --- راديو: يعتمد على الاسم (name) ---
        async function fetchRadioStations(name) {
            if (!name) throw new Error('No country name provided.');
            const url =
                `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Failed to fetch radio data.');
            const data = await resp.json();
            // تصفية للتأكد من تطابق الدولة (لزيادة الدقة)
            const filtered = data.filter(s =>
                s.country && s.country.toLowerCase().includes(name.toLowerCase())
            );
            return filtered.length ? filtered : data;
        }

        // --- تلفاز: يعتمد على الرمز (code) ---
        async function fetchTvChannels(code) {
            if (!code) throw new Error('No country code provided.');
            const chResp = await fetch('https://iptv-org.github.io/api/channels.json');
            if (!chResp.ok) throw new Error('Failed to fetch TV channels.');
            const allChannels = await chResp.json();
            const filtered = allChannels.filter(c =>
                c.country && c.country.toUpperCase() === code.toUpperCase()
            );
            const stResp = await fetch('https://iptv-org.github.io/api/streams.json');
            if (!stResp.ok) throw new Error('Failed to fetch streams.');
            const allStreams = await stResp.json();
            const streamMap = {};
            for (const s of allStreams) {
                if (!streamMap[s.channel]) streamMap[s.channel] = s.url;
            }
            const result = filtered
                .map(ch => ({
                    id: ch.id,
                    name: ch.name,
                    logo: ch.logo || null,
                    url: streamMap[ch.id] || null,
                }))
                .filter(ch => ch.url !== null);
            return result;
        }

        // ============================================================
        //  دوال العرض
        // ============================================================

        function setEmptyState() {
            title.textContent = 'Select a country';
            sub.textContent = 'Use the bot to set your country';
            logo.innerHTML = `<i class="fas fa-${currentMode === 'radio' ? 'radio' : 'tv'}"></i>`;
            audio.src = '';
            playBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            hasValidCountry = false;
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function loadStation(index) {
            if (!stations.length || !hasValidCountry) {
                setEmptyState();
                return;
            }
            const item = stations[index];
            title.textContent = item.name || 'Untitled';
            sub.textContent = `${index + 1} of ${stations.length}`;

            if (item.logo) {
                logo.innerHTML = `<img src="${item.logo}" alt="logo" />`;
            } else {
                logo.innerHTML = `<i class="fas fa-${currentMode === 'radio' ? 'radio' : 'tv'}"></i>`;
            }

            if (item.url) {
                audio.src = item.url;
                audio.load();
            } else {
                audio.src = '';
            }

            playBtn.disabled = false;
            prevBtn.disabled = false;
            nextBtn.disabled = false;

            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function togglePlay() {
            if (!hasValidCountry || !audio.src) return;
            if (audio.paused) {
                audio.play().catch(() => {});
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
            } else {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function nextStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        }

        function prevStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        }

        // ============================================================
        //  تبديل الوضع (راديو / تلفاز) مع منطق Bots.Business
        // ============================================================

        async function switchMode(mode) {
            currentMode = mode;

            // تحديث التبويبات
            tabRadio.classList.toggle('active', mode === 'radio');
            tabTv.classList.toggle('active', mode === 'tv');

            // تحديث الملاحظة السفلية
            if (mode === 'tv') {
                footerNote.innerHTML = `
                    <i class="fas fa-info-circle"></i>
                    To change TV channels, please type a new country name in the bot chat.
                `;
            } else {
                footerNote.innerHTML = `
                    <i class="fas fa-radio"></i>
                    To change Radio stations, type a new country in the bot chat.
                `;
            }

            // إعادة ضبط القائمة
            setEmptyState();
            stations = [];
            currentIndex = 0;

            // --- التحقق من وجود البيانات المطلوبة حسب الوضع ---
            const name = countryName.trim();
            const code = countryCode.trim();

            // إذا كان الوضع راديو ولا يوجد اسم دولة
            if (mode === 'radio' && !name) {
                title.textContent = 'No country selected';
                sub.textContent = 'Use /radio2 [country] or /setcountry [country]';
                return;
            }
            // إذا كان الوضع تلفاز ولا يوجد رمز دولة
            if (mode === 'tv' && !code) {
                title.textContent = 'No country code provided';
                sub.textContent = 'Use /setcountry [country] to get TV channels';
                return;
            }

            // --- جلب البيانات ---
            loading.style.display = 'flex';
            try {
                let data = [];
                if (mode === 'radio') {
                    data = await fetchRadioStations(name);
                } else {
                    data = await fetchTvChannels(code);
                }

                if (data && data.length > 0) {
                    stations = data;
                    hasValidCountry = true;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    title.textContent = `No ${mode === 'radio' ? 'radio stations' : 'TV channels'} found`;
                    sub.textContent = `Try a different country`;
                    hasValidCountry = false;
                    playBtn.disabled = true;
                    prevBtn.disabled = true;
                    nextBtn.disabled = true;
                }
            } catch (err) {
                console.error(err);
                title.textContent = 'Loading error';
                sub.textContent = 'Please try again later';
                hasValidCountry = false;
                playBtn.disabled = true;
                prevBtn.disabled = true;
                nextBtn.disabled = true;
            } finally {
                loading.style.display = 'none';
            }
        }

        // ============================================================
        //  ربط الأحداث
        // ============================================================

        tabRadio.addEventListener('click', () => {
            if (currentMode !== 'radio') switchMode('radio');
        });
        tabTv.addEventListener('click', () => {
            if (currentMode !== 'tv') switchMode('tv');
        });

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextStation);
        prevBtn.addEventListener('click', prevStation);

        audio.addEventListener('pause', () => {
            isPlaying = false;
            playIcon.className = 'fas fa-play';
        });
        audio.addEventListener('play', () => {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
        });

        // ============================================================
        //  بدء التشغيل حسب البيانات المستلمة من البوت
        // ============================================================

        // 1. إذا كان هناك اسم دولة → نفتح الراديو (لأن /radio2 يمرر name فقط)
        // 2. إذا كان هناك رمز دولة فقط → نفتح التلفاز (حالة نادرة)
        // 3. إذا لم يوجد شيء → نعرض شاشة الترحيب

        if (countryName.trim()) {
            // يوجد اسم → نبدأ بالراديو (يدعمه /radio2 و /setcountry معاً)
            switchMode('radio');
        } else if (countryCode.trim()) {
            // يوجد كود فقط → نبدأ بالتلفاز
            switchMode('tv');
        } else {
            // لا توجد دولة → شاشة فارغة مع رسالة توضيحية
            setEmptyState();
            tabRadio.classList.add('active');
            tabTv.classList.remove('active');
            footerNote.innerHTML = `
                <i class="fas fa-info-circle"></i>
                Please use the bot commands: /radio2 [country] or /setcountry [country]
            `;
            loading.style.display = 'none';
        }
    </script>
</body>
</html>
