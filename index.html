<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Radio - Premium Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-color: #050505;
            --primary: #4ade80;
            --primary-glow: rgba(74, 222, 128, 0.5);
            --secondary: #3b82f6;
            --glass-bg: rgba(25, 25, 35, 0.45);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--text-main);
            perspective: 1000px;
        }

        /* --- Dynamic Animated Background --- */
        .bg-orbs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }

        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 300px; height: 300px; background: var(--secondary); bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 250px; height: 250px; background: #8b5cf6; top: 40%; left: 60%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 50px) scale(1.2); }
            100% { transform: translate(-50px, 100px) scale(0.8); }
        }

        /* --- Premium Glass Card --- */
        .app-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 40px 30px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            text-align: center;
            transform-style: preserve-3d;
            transition: transform 0.1s ease;
        }

        /* --- Audio Visualizer --- */
        .visualizer {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 4px;
            height: 30px;
            margin-bottom: 25px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visualizer.active { opacity: 1; }

        .bar {
            width: 4px;
            background: var(--primary);
            border-radius: 4px;
            height: 5px;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .visualizer.active .bar { animation: dance 0.5s ease-in-out infinite alternate; }
        .visualizer.active .bar:nth-child(2) { animation-delay: 0.1s; height: 15px;}
        .visualizer.active .bar:nth-child(3) { animation-delay: 0.2s; height: 25px;}
        .visualizer.active .bar:nth-child(4) { animation-delay: 0.3s; height: 10px;}
        .visualizer.active .bar:nth-child(5) { animation-delay: 0.4s; height: 20px;}

        @keyframes dance {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(3); }
        }

        /* --- Vinyl Record Logo --- */
        .logo-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            transform: translateZ(30px); /* 3D Effect */
        }

        .logo-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary);
            box-shadow: 0 0 0 10px rgba(25, 25, 25, 0.8), 0 20px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            border: 2px solid #333;
            transition: all 0.5s ease;
        }

        .logo-frame::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 25px; height: 25px;
            background: var(--bg-color);
            border-radius: 50%;
            border: 2px solid #333;
            z-index: 5;
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .logo-frame.playing {
            animation: spinVinyl 4s linear infinite;
            box-shadow: 0 0 30px var(--primary-glow), 0 0 0 10px rgba(25, 25, 25, 0.8);
        }

        @keyframes spinVinyl {
            100% { transform: rotate(360deg); }
        }

        /* --- Typography --- */
        .station-name {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transform: translateZ(20px);
        }

        .station-meta {
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 30px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transform: translateZ(15px);
        }

        /* --- Controls --- */
        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            transform: translateZ(25px);
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .ctrl-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .ctrl-btn.play-btn {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, var(--primary), #22c55e);
            color: #000;
            font-size: 28px;
            border: none;
            box-shadow: 0 10px 25px var(--primary-glow);
        }

        .ctrl-btn.play-btn:hover:not(:disabled) {
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 15px 35px var(--primary-glow);
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        /* --- Volume Control --- */
        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 0 20px;
            color: var(--text-sub);
            transform: translateZ(10px);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        /* --- Loading Screen --- */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            color: var(--primary);
            transition: opacity 0.5s ease;
        }

        .sound-wave {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
        }

        .sound-wave span {
            width: 6px;
            height: 40px;
            background: var(--primary);
            border-radius: 3px;
            animation: wave 1s ease-in-out infinite;
        }

        .sound-wave span:nth-child(2) { animation-delay: 0.1s; }
        .sound-wave span:nth-child(3) { animation-delay: 0.2s; }
        .sound-wave span:nth-child(4) { animation-delay: 0.3s; }
        .sound-wave span:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { transform: scaleY(0.2); opacity: 0.5; }
            50% { transform: scaleY(1); opacity: 1; box-shadow: 0 0 15px var(--primary-glow); }
        }

        .loading-text {
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--text-sub);
            animation: pulseText 1.5s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* --- Donate FAB --- */
        .donate-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #0070ba, #005ea6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            text-decoration: none;
            z-index: 100;
            box-shadow: 0 10px 25px rgba(0, 112, 186, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .donate-btn:hover {
            transform: translateY(-5px) scale(1.1) rotate(10deg);
            box-shadow: 0 15px 35px rgba(0, 112, 186, 0.7);
        }
    </style>
</head>
<body>

    <!-- Dynamic Background -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn" title="Support Us">
        <i class="fab fa-paypal"></i>
    </a>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="sound-wave">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="loading-text">TUNING FREQUENCY...</div>
    </div>

    <!-- Main Player Card -->
    <div class="app-card" id="appCard">
        
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="logo-wrapper">
            <div class="logo-frame" id="stationLogo">
                <i class="fas fa-satellite-dish"></i>
            </div>
        </div>

        <div class="station-name" id="stationTitle">Select Country</div>
        <div class="station-meta" id="stationSub">Awaiting Command</div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-step-forward"></i></button>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-down" style="font-size: 12px;"></i>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
            <i class="fas fa-volume-up" style="font-size: 14px;"></i>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <script>
        // --- Telegram Initialization ---
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // --- DOM Elements ---
        const ui = {
            loading: document.getElementById('loading'),
            card: document.getElementById('appCard'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            visualizer: document.getElementById('visualizer'),
            volumeSlider: document.getElementById('volumeSlider')
        };

        // --- State Variables ---
        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let hasValid = false;
        let errorCount = 0;
        let autoPlayRequested = localStorage.getItem('radio_is_playing') === 'true';

        // --- Fetch Country Logic ---
        const params = new URLSearchParams(window.location.search);
        const urlName = params.get('name') || '';
        const startParam = tg.initDataUnsafe.start_param || '';
        const tgName = startParam.replace(/_/g, ' '); 
        const countryName = tgName || urlName;

        // --- 3D Hover Tilt Effect ---
        ui.card.addEventListener('mousemove', (e) => {
            const rect = ui.card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -10;
            const rotateY = ((x - centerX) / centerX) * 10;
            
            ui.card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        ui.card.addEventListener('mouseleave', () => {
            ui.card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            ui.card.style.transition = `transform 0.5s ease`;
        });
        ui.card.addEventListener('mouseenter', () => {
            ui.card.style.transition = `none`;
        });

        // --- Core Functions ---
        async function fetchRadio(name) {
            if (!name) throw new Error('No country');
            const url = `https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(name)}?order=votes&reverse=true`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Fetch failed');
            const data = await resp.json();
            return data.filter(s => { 
                const u = s.url_resolved || s.url;
                return u && u.startsWith('https://'); 
            });
        }

        function setIcon(iconClass) {
            ui.logo.innerHTML = `<i class="fas ${iconClass}"></i>`;
        }

        function setEmpty(msg = 'Select Country', subMsg = 'Via Bot Command') {
            ui.title.textContent = msg;
            ui.sub.textContent = subMsg;
            setIcon('fa-satellite-dish');
            ui.audio.src = '';
            ui.playBtn.disabled = true;
            ui.prevBtn.disabled = true;
            ui.nextBtn.disabled = true;
            hasValid = false;
            updatePlayState(false);
        }

        function loadStation(index) {
            if (!stations.length || !hasValid) return setEmpty();
            const item = stations[index];
            
            ui.title.textContent = item.name || 'Unknown Station';
            ui.sub.textContent = `FREQUENCY ${index + 1} / ${stations.length}`;
            
            if (item.favicon) {
                const img = new Image();
                img.src = item.favicon;
                img.onload = () => { ui.logo.innerHTML = ''; ui.logo.appendChild(img); };
                img.onerror = () => setIcon('fa-compact-disc');
            } else {
                setIcon('fa-compact-disc');
            }
            
            ui.audio.src = item.url_resolved || item.url || '';
            ui.audio.load();
            ui.audio.volume = ui.volumeSlider.value;
            
            ui.playBtn.disabled = false;
            ui.prevBtn.disabled = false;
            ui.nextBtn.disabled = false;
            
            if (isPlaying || autoPlayRequested) playAudio();
        }

        function updatePlayState(playing) {
            isPlaying = playing;
            if (playing) {
                ui.playIcon.className = 'fas fa-pause';
                ui.logo.classList.add('playing');
                ui.visualizer.classList.add('active');
                localStorage.setItem('radio_is_playing', 'true');
            } else {
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('playing');
                ui.visualizer.classList.remove('active');
                localStorage.setItem('radio_is_playing', 'false');
            }
        }

        async function playAudio() {
            try {
                await ui.audio.play();
                errorCount = 0;
                autoPlayRequested = false;
                updatePlayState(true);
            } catch (error) {
                if (error.name !== 'AbortError') {
                    if (error.name === 'NotAllowedError') {
                        autoPlayRequested = false;
                        updatePlayState(false);
                    } else {
                        handlePlayError();
                    }
                }
            }
        }

        function handlePlayError() {
            errorCount++;
            if (stations.length > errorCount && errorCount < 10) {
                setTimeout(nextStation, 500);
            } else {
                updatePlayState(false);
                ui.title.textContent = 'Signal Lost';
                ui.sub.textContent = 'Station offline. Try another.';
            }
        }

        function togglePlay() {
            if (!hasValid || !ui.audio.src) return;
            ui.audio.paused ? playAudio() : (ui.audio.pause(), updatePlayState(false));
        }

        function nextStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        }
        
        function prevStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        }

        // --- Event Listeners ---
        ui.playBtn.addEventListener('click', togglePlay);
        ui.nextBtn.addEventListener('click', nextStation);
        ui.prevBtn.addEventListener('click', prevStation);
        ui.audio.addEventListener('pause', () => updatePlayState(false));
        ui.audio.addEventListener('play', () => updatePlayState(true));
        ui.audio.addEventListener('error', () => { if(isPlaying || autoPlayRequested) handlePlayError(); });
        
        ui.volumeSlider.addEventListener('input', (e) => {
            ui.audio.volume = e.target.value;
        });

        // --- Initialization ---
        async function init() {
            const name = countryName.trim();
            if (!name) {
                setEmpty('NO SIGNAL', 'Select a country first');
                hideLoading();
                return;
            }
            
            try {
                let data = await fetchRadio(name);
                if (!data.length) {
                    const fallbackUrl = `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}?order=votes&reverse=true`;
                    const fallbackResp = await fetch(fallbackUrl);
                    const fallbackData = await fallbackResp.json();
                    data = fallbackData.filter(s => (s.url_resolved || s.url)?.startsWith('https://'));
                }

                if(data.length) {
                    stations = data;
                    hasValid = true;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    setEmpty('NO STATIONS', 'Try a different country');
                }
            } catch (e) {
                setEmpty('CONNECTION ERROR', 'Check your network');
            }
            hideLoading();
        }

        function hideLoading() {
            ui.loading.style.opacity = '0';
            setTimeout(() => ui.loading.style.display = 'none', 500);
        }

        // Start App
        setTimeout(init, 800); // Slight delay to show off the cool loading screen
    </script>
</body>
</html>
