<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio & TV Pro Fixed</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            background:#0f1014;
            color:white;
            font-family: Arial;
            margin:0;
            text-align:center;
        }

        .player-container{
            width:90%;
            margin:auto;
            margin-top:20px;
        }

        button{
            padding:10px;
            margin:5px;
        }

        video{
            width:100%;
            background:black;
        }

        img{
            width:100px;
        }
    </style>
</head>

<body>

<div class="player-container">

    <h2 id="title">Loading...</h2>
    <p id="sub-title"></p>

    <div>
        <button onclick="setMode('tv')">TV</button>
        <button onclick="setMode('radio')">Radio</button>
    </div>

    <img id="channel-logo" style="display:none">

    <video id="video-player" controls></video>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let filteredChannels = [];
let allStreams = [];
let currentMode = "tv";

const urlParams = new URLSearchParams(window.location.search);
const countryCode = (urlParams.get("code") || "").toLowerCase();
const countryName = urlParams.get("name") || "";

const videoPlayer = document.getElementById("video-player");
const channelLogo = document.getElementById("channel-logo");

let hls = null;

async function init(){

    try {

        const [chRes, stRes] = await Promise.all([
            fetch("https://iptv-org.github.io/api/channels.json").then(r=>r.json()),
            fetch("https://iptv-org.github.io/api/streams.json").then(r=>r.json())
        ]);

        allStreams = stRes;

        const countryChannels = chRes.filter(c =>
            c.country && c.country.toLowerCase() === countryCode
        );

        window.tvList = countryChannels.filter(c =>
            !c.categories || !c.categories.includes("radio")
        );

        window.radioList = countryChannels.filter(c =>
            c.categories && (c.categories.includes("radio") || c.categories.includes("music"))
        );

        setMode("tv");

    } catch(e){
        document.body.innerHTML = "Error loading data";
        console.log(e);
    }
}

function setMode(mode){

    currentMode = mode;

    filteredChannels = (mode === "tv") ? window.tvList : window.radioList;

    if(!filteredChannels || filteredChannels.length === 0){
        document.getElementById("title").innerText = "No channels";
        return;
    }

    loadChannel(0);
}

function loadChannel(index){

    const channel = filteredChannels[index];

    if(!channel){
        document.getElementById("title").innerText = "No channel";
        return;
    }

    document.getElementById("title").innerText = channel.name;
    document.getElementById("sub-title").innerText = countryName;

    if(channel.logo){
        channelLogo.src = channel.logo;
        channelLogo.style.display = "block";
    } else {
        channelLogo.style.display = "none";
    }

    const stream = allStreams.find(s => s.channel === channel.id);

    if(stream && stream.url){
        playStream(stream.url);
    } else {
        document.getElementById("sub-title").innerText = "No stream available";
    }
}

function playStream(url){

    if(hls){
        hls.destroy();
        hls = null;
    }

    if(url.includes(".m3u8")){
        if(Hls.isSupported()){
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(videoPlayer);
            hls.on(Hls.Events.MANIFEST_PARSED, ()=>videoPlayer.play());
        } else {
            videoPlayer.src = url;
        }
    } else {
        videoPlayer.src = url;
        videoPlayer.play();
    }
}

init();

</script>

</body>
</html>
