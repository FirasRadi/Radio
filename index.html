<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RADIO INFERNO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --blood: #8a0303;
            --fire: #ff1a1a;
            --glow: #ff4d4d;
            --dark: #0b0505;
            --card-bg: rgba(20, 4, 4, 0.65);
            --border-neon: #ff2a2a;
            --text-light: #ffe6e6;
            --text-dim: #b38888;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #2a0505, #080101);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            position: relative;
            overflow: hidden;
        }

        /* خلفية نارية متحركة */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-radial-gradient(circle at 20% 30%, #ff1a1a15, #55000015 120px);
            animation: fireBreath 8s infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes fireBreath {
            0% { opacity: 0.3; transform: scale(1) rotate(0deg); }
            100% { opacity: 0.8; transform: scale(1.4) rotate(5deg); }
        }

        /* جزيئات نارية */
        .particle {
            position: fixed;
            width: 6px;
            height: 6px;
            background: #ff3333;
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 20px #ff0000;
            animation: rise 9s infinite linear;
            z-index: 0;
            pointer-events: none;
        }
        .particle:nth-child(1) { left: 10%; animation-duration: 11s; }
        .particle:nth-child(2) { left: 30%; animation-duration: 8s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 50%; animation-duration: 13s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 70%; animation-duration: 9s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 90%; animation-duration: 12s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 20%; animation-duration: 10s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 60%; animation-duration: 14s; animation-delay: 2s; }

        @keyframes rise {
            0% { bottom: -10%; opacity: 0; transform: scale(0.5); }
            20% { opacity: 1; transform: scale(1.2); }
            80% { opacity: 1; }
            100% { bottom: 110%; opacity: 0; transform: scale(0.2); }
        }

        /* البطاقة الرئيسية – درع ناري */
        .app-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px 48px 32px 32px;
            padding: 30px 24px 34px;
            border: 2px solid rgba(255, 50, 50, 0.5);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.25), inset 0 0 80px rgba(180, 0, 0, 0.15);
            transition: 0.4s;
        }

        .app-card::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff1a1a, #aa0000, #ff3333, #550000);
            background-size: 300% 300%;
            z-index: -1;
            animation: borderGlow 4s ease-in-out infinite;
            filter: blur(6px);
            opacity: 0.7;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* الشعار – نجم ناري */
        .logo-frame {
            width: 130px;
            height: 130px;
            margin: 6px auto 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #b30000, #1a0000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 54px;
            color: #ff4d4d;
            box-shadow: 0 0 70px #ff1a1a80, inset 0 0 40px #ff333380;
            overflow: hidden;
            transition: 0.4s;
            border: 3px solid #ff333388;
            animation: pulseLogo 3s infinite alternate;
        }

        @keyframes pulseLogo {
            0% { box-shadow: 0 0 40px #ff1a1a60, inset 0 0 30px #ff333360; }
            100% { box-shadow: 0 0 100px #ff0000cc, inset 0 0 70px #ff4d4d; }
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .station-name {
            font-size: 24px;
            font-weight: 900;
            text-align: center;
            color: #fff0f0;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #aa0000;
            letter-spacing: 2px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .station-meta {
            font-size: 13px;
            font-weight: 400;
            color: #cc9999;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 3px;
            text-transform: uppercase;
            direction: ltr;
        }

        /* أزرار التحكم – نارية */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4px;
            margin-bottom: 22px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: #cc8888;
            font-size: 26px;
            cursor: pointer;
            transition: 0.25s;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(80, 0, 0, 0.3);
            border: 1px solid rgba(255, 50, 50, 0.15);
            backdrop-filter: blur(4px);
        }

        .ctrl-btn:hover {
            color: #ff8888;
            background: rgba(180, 0, 0, 0.4);
            border-color: #ff444488;
            box-shadow: 0 0 30px #ff000055;
            transform: scale(1.08);
        }

        .ctrl-btn.play-btn {
            width: 76px;
            height: 76px;
            background: radial-gradient(circle at 30% 30%, #cc1111, #550000);
            color: #ffdddd;
            font-size: 34px;
            border: 2px solid #ff333399;
            box-shadow: 0 0 60px #ff1a1a80, inset 0 0 30px #ff666655;
        }

        .ctrl-btn.play-btn:hover {
            transform: scale(1.12);
            background: radial-gradient(circle at 30% 30%, #ff2222, #880000);
            box-shadow: 0 0 80px #ff3333cc;
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
            filter: grayscale(0.8);
        }

        /* مشغل الصوت – مخصص */
        audio {
            width: 100%;
            height: 48px;
            border-radius: 60px;
            background: rgba(40, 0, 0, 0.5);
            outline: none;
            margin-top: 4px;
            border: 1px solid #ff333355;
            box-shadow: inset 0 0 20px #440000;
        }
        audio::-webkit-media-controls-panel {
            background: rgba(30, 0, 0, 0.7);
        }
        audio::-webkit-media-controls-play-button {
            background-color: #cc2222;
            border-radius: 50%;
        }

        /* تذييل ناري */
        .footer-note {
            margin-top: 24px;
            padding-top: 18px;
            border-top: 2px solid rgba(255, 50, 50, 0.2);
            font-size: 12px;
            font-weight: 400;
            color: #aa7777;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .footer-note i {
            margin-left: 10px;
            color: #ff5555;
            font-size: 14px;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* شاشة التحميل – نارية */
        #loading {
            position: fixed;
            inset: 0;
            background: rgba(8, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            z-index: 999;
            color: #cc8888;
            font-size: 16px;
            letter-spacing: 4px;
        }
        #loading i {
            font-size: 48px;
            color: #ff3333;
            animation: spinFire 1.2s linear infinite;
        }
        @keyframes spinFire {
            0% { transform: rotate(0deg); filter: drop-shadow(0 0 10px red); }
            50% { transform: rotate(180deg); filter: drop-shadow(0 0 40px #ff6666); }
            100% { transform: rotate(360deg); filter: drop-shadow(0 0 10px red); }
        }

        @media (max-width: 460px) {
            .app-card { padding: 22px 16px 26px; }
            .logo-frame { width: 100px; height: 100px; font-size: 40px; }
            .station-name { font-size: 18px; }
            .ctrl-btn.play-btn { width: 64px; height: 64px; font-size: 28px; }
        }
    </style>
</head>
<body>

    <!-- جزيئات نارية -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div id="loading">
        <i class="fas fa-fire"></i>
        <span>IGNITING STATIONS...</span>
    </div>

    <div class="app-card">
        <div class="logo-frame" id="stationLogo">
            <i class="fas fa-bolt"></i>
        </div>

        <div class="station-name" id="stationTitle">CHOOSE COUNTRY</div>
        <div class="station-meta" id="stationSub">USE BOT COMMAND</div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-step-forward"></i></button>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>

        <div class="footer-note">
            <i class="fas fa-skull"></i> CHANGE COUNTRY IN BOT CHAT
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const loading = document.getElementById('loading');
        const logo = document.getElementById('stationLogo');
        const title = document.getElementById('stationTitle');
        const sub = document.getElementById('stationSub');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const audio = document.getElementById('audioPlayer');

        const params = new URLSearchParams(window.location.search);
        const countryName = params.get('name') || '';

        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let hasValid = false;

        async function fetchRadio(name) {
            if (!name) throw new Error('No country');
            const url = `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Fetch failed');
            const data = await resp.json();
            return data.filter(s => s.country && s.country.toLowerCase().includes(name.toLowerCase()));
        }

        function setEmpty(msg) {
            title.textContent = msg || 'SELECT COUNTRY';
            sub.textContent = 'USE BOT';
            logo.innerHTML = `<i class="fas fa-bolt"></i>`;
            audio.src = '';
            playBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            hasValid = false;
            if (isPlaying) { audio.pause(); isPlaying = false; playIcon.className = 'fas fa-play'; }
        }

        function loadStation(index) {
            if (!stations.length || !hasValid) { setEmpty(); return; }
            const item = stations[index];
            title.textContent = item.name || 'Untitled';
            sub.textContent = `${index + 1} of ${stations.length}`;
            if (item.favicon) {
                logo.innerHTML = `<img src="${item.favicon}" alt="logo" />`;
            } else {
                logo.innerHTML = `<i class="fas fa-bolt"></i>`;
            }
            audio.src = item.url_resolved || item.url || '';
            audio.load();
            playBtn.disabled = false;
            prevBtn.disabled = false;
            nextBtn.disabled = false;
            if (isPlaying) { audio.pause(); isPlaying = false; playIcon.className = 'fas fa-play'; }
        }

        function togglePlay() {
            if (!hasValid || !audio.src) return;
            if (audio.paused) {
                audio.play().catch(() => {});
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
            } else {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function nextStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        }
        function prevStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        }

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextStation);
        prevBtn.addEventListener('click', prevStation);
        audio.addEventListener('pause', () => { isPlaying = false; playIcon.className = 'fas fa-play'; });
        audio.addEventListener('play', () => { isPlaying = true; playIcon.className = 'fas fa-pause'; });

        async function init() {
            const name = countryName.trim();
            if (!name) {
                setEmpty('NO COUNTRY');
                loading.style.display = 'none';
                return;
            }
            loading.style.display = 'flex';
            try {
                const data = await fetchRadio(name);
                if (data.length) {
                    stations = data;
                    hasValid = true;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    setEmpty('NO STATIONS');
                    sub.textContent = 'TRY ANOTHER';
                }
            } catch (e) {
                setEmpty('ERROR');
                sub.textContent = 'RETRY LATER';
            }
            loading.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
