<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-card {
            background: #1e293b;
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #94a3b8;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Timer Button Active State */
        .timer-btn.active-timer {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 2px solid rgba(59, 130, 246, 0.5);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: -0.2px;
            animation: timerPulse 3s ease-in-out infinite;
        }
        @keyframes timerPulse {
            0%,
            100% {
                box-shadow: 0 0 0px rgba(59, 130, 246, 0);
            }
            50% {
                box-shadow: 0 0 14px rgba(59, 130, 246, 0.45);
            }
        }

        /* Timer Popover */
        .timer-popover {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 18px;
            padding: 20px 18px 16px;
            z-index: 15;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
            box-shadow: 0 14px 36px rgba(0, 0, 0, 0.55);
            min-width: 250px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .timer-popover.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .timer-popover-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-weight: 700;
            font-size: 15px;
            color: #f8fafc;
            letter-spacing: 0.3px;
        }
        .timer-close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 6px;
            border-radius: 6px;
        }
        .timer-close-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        .timer-remaining {
            text-align: center;
            font-size: 13px;
            color: #60a5fa;
            font-weight: 600;
            margin-bottom: 12px;
            display: none;
            letter-spacing: 0.4px;
        }
        .timer-remaining.visible {
            display: block;
        }
        .timer-presets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 9px;
            margin-bottom: 12px;
        }
        .timer-preset {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            padding: 11px 8px;
            border-radius: 11px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.22s;
            letter-spacing: 0.2px;
            text-align: center;
        }
        .timer-preset:hover {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
        }
        .timer-preset:active {
            transform: scale(0.94);
            transition: 0.08s;
        }
        .timer-cancel-btn {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.22s;
            letter-spacing: 0.3px;
            display: none;
        }
        .timer-cancel-btn.visible {
            display: block;
        }
        .timer-cancel-btn:hover {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #3b82f6;
            overflow: hidden;
            border: 3px solid #1e293b;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #ffffff;
            border-radius: 50%;
            padding: 8px;
        }

        .logo.playing {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            animation: spinDisc 8s linear infinite;
        }
        @keyframes spinDisc {
            100% {
                transform: rotate(360deg);
            }
        }

        .station-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .station-counter {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .ctrl-btn {
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            font-size: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover:not(:disabled) {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        .play-btn {
            width: 70px;
            height: 70px;
            background: #3b82f6;
            border-radius: 50%;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-btn:hover:not(:disabled) {
            background: #2563eb;
            transform: scale(1.05);
        }

        .actions-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 75%;
        }
        .volume-container input {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        .volume-container input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            transition: 0.2s;
        }
        .volume-container input::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .action-btns {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20%;
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:hover {
            color: #fff;
        }
        .action-btn.active-fav {
            color: #ef4444;
        }

        .footer-note {
            font-size: 11px;
            color: #ef4444;
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* Modal – smooth fade, no flicker */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            z-index: 200;
            display: flex;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, visibility 0.28s ease;
            will-change: opacity;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }
        .modal.open {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }
        .close-modal {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-modal:hover {
            color: #ef4444;
        }
        .fav-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding-bottom: 20px;
        }
        .fav-list::-webkit-scrollbar {
            width: 5px;
        }
        .fav-list::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 5px;
        }

        .fav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.9);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .fav-item:hover {
            border-color: #3b82f6;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .fav-item-content {
            display: flex;
            align-items: center;
            flex: 1;
            cursor: pointer;
            overflow: hidden;
        }
        .fav-play-icon {
            color: #3b82f6;
            font-size: 22px;
            margin-right: 15px;
        }
        .fav-info {
            flex: 1;
            text-align: left;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-weight: 600;
            color: #f8fafc;
        }
        .fav-remove {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-left: 15px;
        }
        .fav-remove:hover {
            background: #ef4444;
            color: #fff;
        }

        /* PayPal */
        .paypal-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .paypal-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .paypal-svg text {
            font-size: 9.5px;
            fill: #94a3b8;
            font-family: monospace;
            letter-spacing: 0.5px;
            font-weight: bold;
        }
        .donate-btn {
            width: 50px;
            height: 50px;
            background: #0070ba;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4);
            position: relative;
            z-index: 2;
            transition: 0.3s;
        }
        .donate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 112, 186, 0.6);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        FETCHING STATIONS...
    </div>

    <!-- PayPal -->
    <div class="paypal-wrapper">
        <svg class="paypal-svg" viewBox="0 0 100 100">
            <path id="curve" d="M 20 50 A 30 30 0 0 1 80 50" fill="transparent" />
            <text>
                <textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵘᵖᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath>
            </text>
        </svg>
        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn">
            <i class="fab fa-paypal"></i>
        </a>
    </div>

    <!-- Main Player -->
    <div class="player-card">
        <div class="header">
            <!-- Sleep Timer Button -->
            <button class="icon-btn timer-btn" id="timerBtn" title="Sleep Timer">
                <i class="fas fa-clock"></i>
            </button>
            <button class="icon-btn" id="openFavsBtn" title="Saved Stations"><i class="fas fa-list-ul"></i></button>
        </div>

        <!-- Timer Popover -->
        <div class="timer-popover" id="timerPopover">
            <div class="timer-popover-header">
                <span id="timerPopoverTitle">Sleep Timer</span>
                <button class="timer-close-btn" id="timerCloseBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="timer-remaining" id="timerRemainingDisplay"></div>
            <div class="timer-presets" id="timerPresets">
                <button class="timer-preset" data-min="15">15 min</button>
                <button class="timer-preset" data-min="30">30 min</button>
                <button class="timer-preset" data-min="45">45 min</button>
                <button class="timer-preset" data-min="60">60 min</button>
                <button class="timer-preset" data-min="90">90 min</button>
                <button class="timer-preset" data-min="120">120 min</button>
            </div>
            <button class="timer-cancel-btn" id="timerCancelBtn">Cancel Timer</button>
        </div>

        <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
        <div class="station-name" id="stationTitle">...</div>
        <div class="station-counter" id="stationSub">...</div>

        <div class="controls">
            <button class="ctrl-btn nav-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn nav-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <div class="actions-bar">
            <div class="volume-container">
                <i class="fas fa-volume-down" style="color:#94a3b8;font-size:14px;"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <i class="fas fa-volume-up" style="color:#94a3b8;font-size:16px;"></i>
            </div>
            <div class="action-btns">
                <button class="action-btn" id="saveFavBtn" title="Save Station"><i class="fas fa-heart"></i></button>
            </div>
        </div>

        <div class="footer-note">Change the country in the bot chat.</div>
        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <!-- Favorites Modal -->
    <div class="modal" id="favModal">
        <div class="modal-header">
            <span>Saved Stations</span>
            <button class="close-modal" id="closeFavsBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        var ui = {
            loading: document.getElementById('loading'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            vol: document.getElementById('volumeSlider'),
            saveBtn: document.getElementById('saveFavBtn'),
            openFavs: document.getElementById('openFavsBtn'),
            closeFavs: document.getElementById('closeFavsBtn'),
            favModal: document.getElementById('favModal'),
            favList: document.getElementById('favList'),
            // Timer elements
            timerBtn: document.getElementById('timerBtn'),
            timerPopover: document.getElementById('timerPopover'),
            timerCloseBtn: document.getElementById('timerCloseBtn'),
            timerPopoverTitle: document.getElementById('timerPopoverTitle'),
            timerRemainingDisplay: document.getElementById('timerRemainingDisplay'),
            timerPresets: document.getElementById('timerPresets'),
            timerCancelBtn: document.getElementById('timerCancelBtn')
        };

        var params = new URLSearchParams(window.location.search);
        var urlName = params.get('name') || '';
        var startParam = tg.initDataUnsafe.start_param || '';
        var tgName = startParam.replace(/_/g, ' ');
        var countryName = tgName || urlName;

        var stations = [];
        var currentIndex = 0;
        var isPlaying = false;
        var savedStations = JSON.parse(localStorage.getItem('radio_saved_list')) || [];
        var errorCount = 0;
        var isExternalFavPlaying = false;
        var autoSkipInProgress = false;
        var skipTimeout = null;

        // --- Timer State ---
        var timerEndTime = null;
        var timerDisplayInterval = null;
        var timerExpireTimeout = null;

        // --- Fetching ---
        async function fetchRadio(name) {
            if (!name) throw new Error('No country');
            var url = "https://de1.api.radio-browser.info/json/stations/bycountry/" + encodeURIComponent(name) +
                "?order=votes&reverse=true";
            var resp = await fetch(url);
            if (!resp.ok) throw new Error('Fetch failed');
            var data = await resp.json();
            return data.filter(function(s) {
                var u = s.url_resolved || s.url;
                return u && u.indexOf('https://') === 0;
            });
        }

        async function init() {
            var name = countryName.trim();
            if (!name) {
                setEmptyState();
                return;
            }
            try {
                var data = await fetchRadio(name);
                if (data.length) {
                    stations = data;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    var fallbackUrl = "https://de1.api.radio-browser.info/json/stations/byname/" + encodeURIComponent(
                        name) + "?order=votes&reverse=true";
                    var fallbackResp = await fetch(fallbackUrl);
                    var fallbackData = await fallbackResp.json();
                    var validFallback = fallbackData.filter(function(s) {
                        var u = s.url_resolved || s.url;
                        return u && u.indexOf('https://') === 0;
                    });
                    if (validFallback.length) {
                        stations = validFallback;
                        currentIndex = 0;
                        loadStation(0);
                    } else {
                        setEmptyState();
                    }
                }
            } catch (e) {
                setEmptyState();
            }
            ui.loading.style.display = 'none';
        }

        function setEmptyState() {
            ui.title.textContent = 'No Stations Found';
            ui.sub.textContent = 'Please enter a valid country';
            ui.logo.innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i>';
            ui.loading.style.display = 'none';
        }

        // --- Load & Play ---
        function loadStation(index) {
            if (!stations.length) return;
            var item = stations[index];
            isExternalFavPlaying = false;
            ui.title.textContent = item.name || 'Unknown Station';
            ui.sub.textContent = "Station " + (index + 1) + " / " + stations.length;
            if (item.favicon) {
                var img = new Image();
                img.src = item.favicon;
                img.onload = function() { ui.logo.innerHTML = '';
                    ui.logo.appendChild(img); };
                img.onerror = function() { ui.logo.innerHTML = '<i class="fas fa-music"></i>'; };
            } else {
                ui.logo.innerHTML = '<i class="fas fa-music"></i>';
            }
            ui.audio.src = item.url_resolved || item.url || '';
            ui.audio.load();
            ui.audio.volume = ui.vol.value;
            ui.playBtn.disabled = false;
            ui.prevBtn.disabled = false;
            ui.nextBtn.disabled = false;
            checkFavState(item.stationuuid);
            if (isPlaying) {
                playAudio();
            }
        }

        function playAudio() {
            var playPromise = ui.audio.play();
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    isPlaying = true;
                    errorCount = 0;
                    ui.playIcon.className = 'fas fa-pause';
                    ui.logo.classList.add('playing');
                }).catch(function(err) {
                    if (err.name !== 'AbortError') {
                        handleStreamError();
                    }
                });
            }
        }

        function togglePlay() {
            if (!ui.audio.src) return;
            if (ui.audio.paused) {
                isPlaying = true;
                playAudio();
            } else {
                ui.audio.pause();
                isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('playing');
            }
        }

        // --- Auto-Skip Error Handling (Fixed: resumes playback automatically) ---
        function handleStreamError() {
            if (isPlaying && stations.length > 1 && errorCount < 10 && !isExternalFavPlaying) {
                errorCount++;
                ui.sub.textContent = "Offline. Skipping...";
                ui.logo.classList.remove('playing');
                ui.playIcon.className = 'fas fa-spinner fa-spin';
                // Clear any previous pending skip
                if (skipTimeout) clearTimeout(skipTimeout);
                autoSkipInProgress = true;
                skipTimeout = setTimeout(function() {
                    currentIndex = (currentIndex + 1) % stations.length;
                    loadStation(currentIndex);
                    autoSkipInProgress = false;
                    skipTimeout = null;
                }, 1500);
            } else {
                isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('playing');
                ui.sub.textContent = "Stream Unavailable";
                autoSkipInProgress = false;
            }
        }

        ui.audio.addEventListener('error', handleStreamError);

        // Pause event – ignore if auto-skip is in progress so playback resumes after skip
        ui.audio.addEventListener('pause', function() {
            if (autoSkipInProgress) return;
            isPlaying = false;
            ui.playIcon.className = 'fas fa-play';
            ui.logo.classList.remove('playing');
        });

        ui.audio.addEventListener('play', function() {
            isPlaying = true;
            errorCount = 0;
            ui.playIcon.className = 'fas fa-pause';
            ui.logo.classList.add('playing');
        });

        ui.playBtn.addEventListener('click', togglePlay);
        ui.nextBtn.addEventListener('click', function() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        });
        ui.prevBtn.addEventListener('click', function() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        });
        ui.vol.addEventListener('input', function(e) {
            ui.audio.volume = e.target.value;
        });

        // --- Favorites ---
        function checkFavState(uuid) {
            var isFav = savedStations.some(function(s) { return s.id === uuid; });
            ui.saveBtn.className = isFav ? 'action-btn active-fav' : 'action-btn';
            ui.saveBtn.innerHTML = isFav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
        }

        ui.saveBtn.addEventListener('click', function() {
            if (!stations.length && !isExternalFavPlaying) return;
            var station;
            if (isExternalFavPlaying) {
                var currentSrc = ui.audio.src;
                station = savedStations.find(function(s) { return s.url === currentSrc; });
                if (!station) return;
            } else {
                station = stations[currentIndex];
            }
            var stationId = station.stationuuid || station.id;
            var idx = savedStations.findIndex(function(s) { return s.id === stationId; });
            if (idx > -1) {
                savedStations.splice(idx, 1);
            } else {
                savedStations.push({
                    id: stationId,
                    name: station.name,
                    url: station.url_resolved || station.url,
                    img: station.favicon || station.img
                });
            }
            localStorage.setItem('radio_saved_list', JSON.stringify(savedStations));
            checkFavState(stationId);
            renderFavorites();
        });

        function renderFavorites() {
            ui.favList.innerHTML = '';
            if (savedStations.length === 0) {
                ui.favList.innerHTML =
                    '<li style="text-align:center;color:#94a3b8;margin-top:20px;">No saved stations</li>';
                return;
            }
            savedStations.forEach(function(fav, i) {
                var li = document.createElement('li');
                li.className = 'fav-item';
                li.innerHTML = `
                    <div class="fav-item-content">
                        <i class="fas fa-play-circle fav-play-icon"></i>
                        <div class="fav-info">${fav.name || 'Unknown Station'}</div>
                    </div>
                    <button class="fav-remove" title="Remove"><i class="fas fa-trash"></i></button>
                `;
                li.querySelector('.fav-item-content').addEventListener('click', function() {
                    var foundIndex = stations.findIndex(function(s) { return s.stationuuid === fav
                            .id; });
                    if (foundIndex !== -1) {
                        currentIndex = foundIndex;
                        loadStation(currentIndex);
                        playAudio();
                    } else {
                        isExternalFavPlaying = true;
                        ui.title.textContent = fav.name || 'Unknown Station';
                        ui.sub.textContent = "Saved Station";
                        if (fav.img) {
                            var img = new Image();
                            img.src = fav.img;
                            img.onload = function() { ui.logo.innerHTML = '';
                                ui.logo.appendChild(img); };
                            img.onerror = function() { ui.logo.innerHTML =
                                '<i class="fas fa-music"></i>'; };
                        } else {
                            ui.logo.innerHTML = '<i class="fas fa-music"></i>';
                        }
                        ui.audio.src = fav.url;
                        ui.audio.load();
                        checkFavState(fav.id);
                        playAudio();
                    }
                    ui.favModal.classList.remove('open');
                });
                li.querySelector('.fav-remove').addEventListener('click', function() {
                    savedStations.splice(i, 1);
                    localStorage.setItem('radio_saved_list', JSON.stringify(savedStations));
                    renderFavorites();
                    var currentId = isExternalFavPlaying ? fav.id : (stations[currentIndex] ? stations[
                        currentIndex].stationuuid : null);
                    if (currentId === fav.id) checkFavState(fav.id);
                });
                ui.favList.appendChild(li);
            });
        }

        ui.openFavs.addEventListener('click', function() { renderFavorites();
            ui.favModal.classList.add('open'); });
        ui.closeFavs.addEventListener('click', function() { ui.favModal.classList.remove('open'); });

        // --- Sleep Timer Logic ---
        function openTimerPopover() {
            updateTimerPopoverContent();
            ui.timerPopover.classList.add('active');
        }

        function closeTimerPopover() {
            ui.timerPopover.classList.remove('active');
        }

        function updateTimerPopoverContent() {
            if (timerEndTime && Date.now() < timerEndTime) {
                // Timer is active
                var remainingMs = timerEndTime - Date.now();
                var remainingMin = Math.max(1, Math.round(remainingMs / 60000));
                ui.timerPopoverTitle.textContent = 'Sleep Timer';
                ui.timerRemainingDisplay.textContent = 'Time remaining: ' + remainingMin + ' min';
                ui.timerRemainingDisplay.classList.add('visible');
                ui.timerCancelBtn.classList.add('visible');
                // Change preset labels to "Add X min"
                var presetBtns = ui.timerPresets.querySelectorAll('.timer-preset');
                presetBtns.forEach(function(btn) {
                    var mins = btn.getAttribute('data-min');
                    btn.textContent = '+ ' + mins + ' min';
                });
            } else {
                // Timer inactive
                ui.timerPopoverTitle.textContent = 'Sleep Timer';
                ui.timerRemainingDisplay.textContent = '';
                ui.timerRemainingDisplay.classList.remove('visible');
                ui.timerCancelBtn.classList.remove('visible');
                var presetBtns = ui.timerPresets.querySelectorAll('.timer-preset');
                presetBtns.forEach(function(btn) {
                    var mins = btn.getAttribute('data-min');
                    btn.textContent = mins + ' min';
                });
            }
        }

        function setTimer(minutes) {
            // Clear any existing timer
            clearTimer(false);
            // Set new timer
            timerEndTime = Date.now() + minutes * 60000;
            updateTimerButtonDisplay();
            ui.timerBtn.classList.add('active-timer');
            // Set expiry timeout
            timerExpireTimeout = setTimeout(function() {
                fadeOutAndPause();
                clearTimer(true);
            }, minutes * 60000);
            // Update display every 20 seconds
            timerDisplayInterval = setInterval(function() {
                updateTimerButtonDisplay();
                if (timerEndTime && Date.now() >= timerEndTime) {
                    // Failsafe: if timeout didn't fire precisely
                    fadeOutAndPause();
                    clearTimer(true);
                }
            }, 20000);
            closeTimerPopover();
        }

        function addTimerMinutes(minutes) {
            if (!timerEndTime || Date.now() >= timerEndTime) {
                // No active timer – just set a new one
                setTimer(minutes);
                return;
            }
            // Extend existing timer
            var remainingMs = timerEndTime - Date.now();
            var newRemainingMs = remainingMs + minutes * 60000;
            timerEndTime = Date.now() + newRemainingMs;
            // Clear and re-set the expiry timeout
            if (timerExpireTimeout) clearTimeout(timerExpireTimeout);
            timerExpireTimeout = setTimeout(function() {
                fadeOutAndPause();
                clearTimer(true);
            }, newRemainingMs);
            updateTimerButtonDisplay();
            updateTimerPopoverContent();
            closeTimerPopover();
        }

        function clearTimer(expired) {
            if (timerExpireTimeout) clearTimeout(timerExpireTimeout);
            if (timerDisplayInterval) clearInterval(timerDisplayInterval);
            timerExpireTimeout = null;
            timerDisplayInterval = null;
            timerEndTime = null;
            ui.timerBtn.classList.remove('active-timer');
            ui.timerBtn.innerHTML = '<i class="fas fa-clock"></i>';
            if (!expired) {
                updateTimerPopoverContent();
            }
        }

        function updateTimerButtonDisplay() {
            if (!timerEndTime || Date.now() >= timerEndTime) {
                ui.timerBtn.innerHTML = '<i class="fas fa-clock"></i>';
                ui.timerBtn.classList.remove('active-timer');
                return;
            }
            var remainingMs = timerEndTime - Date.now();
            var remainingMin = Math.max(1, Math.round(remainingMs / 60000));
            var displayText = '';
            if (remainingMin >= 60) {
                var h = Math.floor(remainingMin / 60);
                var m = remainingMin % 60;
                displayText = h + 'h' + (m > 0 ? ' ' + m + 'm' : '');
            } else {
                displayText = remainingMin + 'm';
            }
            ui.timerBtn.innerHTML = displayText;
            ui.timerBtn.classList.add('active-timer');
        }

        function fadeOutAndPause() {
            var startVol = ui.audio.volume;
            if (startVol <= 0 || ui.audio.paused) {
                // Already silent or paused – just ensure paused
                if (!ui.audio.paused) ui.audio.pause();
                return;
            }
            var steps = 20;
            var stepTime = 100;
            var volStep = startVol / steps;
            var currentStep = 0;
            var fadeInterval = setInterval(function() {
                currentStep++;
                var newVol = Math.max(0, startVol - (volStep * currentStep));
                ui.audio.volume = newVol;
                if (currentStep >= steps) {
                    clearInterval(fadeInterval);
                    ui.audio.pause();
                    ui.audio.volume = startVol;
                    ui.vol.value = startVol;
                }
            }, stepTime);
        }

        // Timer button – toggle popover
        ui.timerBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (ui.timerPopover.classList.contains('active')) {
                closeTimerPopover();
            } else {
                openTimerPopover();
            }
        });

        // Close popover button
        ui.timerCloseBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            closeTimerPopover();
        });

        // Preset buttons
        ui.timerPresets.addEventListener('click', function(e) {
            var btn = e.target.closest('.timer-preset');
            if (!btn) return;
            var mins = parseInt(btn.getAttribute('data-min'));
            if (!mins) return;
            if (timerEndTime && Date.now() < timerEndTime) {
                // Timer active – add minutes
                addTimerMinutes(mins);
            } else {
                // No active timer – set new
                setTimer(mins);
            }
        });

        // Cancel button
        ui.timerCancelBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            clearTimer(false);
            closeTimerPopover();
        });

        // Close popover when clicking outside
        document.addEventListener('click', function(e) {
            if (ui.timerPopover.classList.contains('active') &&
                !ui.timerPopover.contains(e.target) &&
                e.target !== ui.timerBtn &&
                !ui.timerBtn.contains(e.target)) {
                closeTimerPopover();
            }
        });

        // Start
        init();
    </script>
</body>
</html>
