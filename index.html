<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Global Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js">
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .player-card {
            background: #1e293b;
            width: 100%;
            max-width: 400px;
            border-radius: 25px;
            padding: 30px 20px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: #94a3b8;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* Timer Button Active State – shows countdown like "14:32" */
        .timer-btn.active-timer {
            background: rgba(59, 130, 246, 0.18);
            color: #60a5fa;
            border: 2px solid rgba(59, 130, 246, 0.45);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: -0.1px;
            animation: timerPulse 3s ease-in-out infinite;
        }
        @keyframes timerPulse {
            0%,
            100% {
                box-shadow: 0 0 0px rgba(59, 130, 246, 0);
            }
            50% {
                box-shadow: 0 0 14px rgba(59, 130, 246, 0.45);
            }
        }

        /* Timer Popover – redesigned with two slider sections */
        .timer-popover {
            position: absolute;
            top: 82px;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            padding: 20px 18px 16px;
            z-index: 15;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.28s ease, visibility 0.28s ease, transform 0.28s ease;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            min-width: 285px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .timer-popover.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }
        .timer-popover-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            font-weight: 700;
            font-size: 15px;
            color: #f8fafc;
            letter-spacing: 0.3px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 12px;
        }
        .timer-close-btn {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            padding: 4px 7px;
            border-radius: 6px;
        }
        .timer-close-btn:hover {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        /* Each timer section */
        .timer-section {
            margin-bottom: 18px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .timer-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .timer-section-label {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
            margin-bottom: 10px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .timer-section-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot-sleep {
            background: #3b82f6;
            box-shadow: 0 0 6px rgba(59, 130, 246, 0.5);
        }
        .dot-wake {
            background: #f59e0b;
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
        }

        /* Slider row */
        .timer-slider-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .timer-slider-row input[type="range"] {
            -webkit-appearance: none;
            flex: 1;
            height: 5px;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.08);
        }
        .timer-slider-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid #fff;
        }
        .timer-slider-row input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }
        /* Sleep slider thumb */
        #sleepSlider::-webkit-slider-thumb {
            background: #3b82f6;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
        }
        /* Wake slider thumb */
        #wakeSlider::-webkit-slider-thumb {
            background: #f59e0b;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }
        .timer-value {
            font-weight: 700;
            font-size: 13px;
            color: #e2e8f0;
            min-width: 42px;
            text-align: right;
            letter-spacing: 0.3px;
        }

        /* Action row */
        .timer-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .timer-activate-btn {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 0.3px;
            transition: 0.25s;
            color: #fff;
        }
        .timer-activate-btn.sleep-btn {
            background: #3b82f6;
        }
        .timer-activate-btn.sleep-btn:hover {
            background: #2563eb;
            box-shadow: 0 4px 14px rgba(59, 130, 246, 0.35);
            transform: translateY(-1px);
        }
        .timer-activate-btn.wake-btn {
            background: #d97706;
        }
        .timer-activate-btn.wake-btn:hover {
            background: #b45309;
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.35);
            transform: translateY(-1px);
        }
        .timer-activate-btn:active {
            transform: scale(0.95);
            transition: 0.08s;
        }
        .timer-cancel-sm {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.3px;
            transition: 0.25s;
            white-space: nowrap;
        }
        .timer-cancel-sm:hover {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }

        /* Countdown inside popover */
        .timer-countdown-inline {
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.6px;
            text-align: center;
            padding: 6px 0 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .timer-countdown-inline.sleep-countdown {
            color: #60a5fa;
        }
        .timer-countdown-inline.wake-countdown {
            color: #fbbf24;
        }

        /* Live countdown on the main player card */
        .timer-live-display {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            min-height: 22px;
            margin-bottom: 6px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .timer-live-display .live-sleep {
            color: #60a5fa;
        }
        .timer-live-display .live-wake {
            color: #fbbf24;
        }
        .timer-live-display .live-sep {
            color: #475569;
            font-weight: 400;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #3b82f6;
            overflow: hidden;
            border: 3px solid #1e293b;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #ffffff;
            border-radius: 50%;
            padding: 8px;
        }
        .logo.playing {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            animation: spinDisc 8s linear infinite;
        }
        @keyframes spinDisc {
            100% {
                transform: rotate(360deg);
            }
        }

        .station-name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .station-counter {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        .ctrl-btn {
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }
        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .nav-btn {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f8fafc;
            font-size: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:hover:not(:disabled) {
            background: #3b82f6;
            border-color: #3b82f6;
            color: #fff;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }
        .play-btn {
            width: 70px;
            height: 70px;
            background: #3b82f6;
            border-radius: 50%;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-btn:hover:not(:disabled) {
            background: #2563eb;
            transform: scale(1.05);
        }

        .actions-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 75%;
        }
        .volume-container input {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }
        .volume-container input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            transition: 0.2s;
        }
        .volume-container input::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        .action-btns {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20%;
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #94a3b8;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:hover {
            color: #fff;
        }
        .action-btn.active-fav {
            color: #ef4444;
        }

        .footer-note {
            font-size: 11px;
            color: #ef4444;
            font-weight: 600;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        /* Modal – smooth fade */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.85);
            z-index: 200;
            display: flex;
            flex-direction: column;
            padding: 20px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease, visibility 0.28s ease;
            will-change: opacity;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
        }
        .modal.open {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 20px;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }
        .close-modal {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-modal:hover {
            color: #ef4444;
        }
        .fav-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding-bottom: 20px;
        }
        .fav-list::-webkit-scrollbar {
            width: 5px;
        }
        .fav-list::-webkit-scrollbar-thumb {
            background: #3b82f6;
            border-radius: 5px;
        }
        .fav-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(30, 41, 59, 0.9);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;
        }
        .fav-item:hover {
            border-color: #3b82f6;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        .fav-item-content {
            display: flex;
            align-items: center;
            flex: 1;
            cursor: pointer;
            overflow: hidden;
        }
        .fav-play-icon {
            color: #3b82f6;
            font-size: 22px;
            margin-right: 15px;
        }
        .fav-info {
            flex: 1;
            text-align: left;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-weight: 600;
            color: #f8fafc;
        }
        .fav-remove {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-left: 15px;
        }
        .fav-remove:hover {
            background: #ef4444;
            color: #fff;
        }

        /* PayPal */
        .paypal-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .paypal-svg {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .paypal-svg text {
            font-size: 9.5px;
            fill: #94a3b8;
            font-family: monospace;
            letter-spacing: 0.5px;
            font-weight: bold;
        }
        .donate-btn {
            width: 50px;
            height: 50px;
            background: #0070ba;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4);
            position: relative;
            z-index: 2;
            transition: 0.3s;
        }
        .donate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 112, 186, 0.6);
        }

        #loading {
            position: fixed;
            inset: 0;
            background: #0f172a;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        FETCHING STATIONS...
    </div>

    <!-- PayPal -->
    <div class="paypal-wrapper">
        <svg class="paypal-svg" viewBox="0 0 100 100">
            <path id="curve" d="M 20 50 A 30 30 0 0 1 80 50" fill="transparent" />
            <text>
                <textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵘᵖᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath>
            </text>
        </svg>
        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn">
            <i class="fab fa-paypal"></i>
        </a>
    </div>

    <!-- Main Player -->
    <div class="player-card">
        <div class="header">
            <!-- Sleep/Wake Timer Button -->
            <button class="icon-btn timer-btn" id="timerBtn" title="Timers">
                <i class="fas fa-clock"></i>
            </button>
            <button class="icon-btn" id="openFavsBtn" title="Saved Stations"><i class="fas fa-list-ul"></i></button>
        </div>

        <!-- Timer Popover – redesigned with two sliders -->
        <div class="timer-popover" id="timerPopover">
            <div class="timer-popover-header">
                <span>⏱️ Timers</span>
                <button class="timer-close-btn" id="timerCloseBtn"><i class="fas fa-times"></i></button>
            </div>

            <!-- Sleep Timer Section -->
            <div class="timer-section">
                <div class="timer-section-label">
                    <span class="dot dot-sleep"></span> Sleep Timer (Auto-Off)
                </div>
                <div class="timer-slider-row">
                    <input type="range" id="sleepSlider" min="1" max="120" value="15" />
                    <span class="timer-value" id="sleepValue">15 min</span>
                </div>
                <div class="timer-actions" id="sleepActions">
                    <button class="timer-activate-btn sleep-btn" id="sleepActivateBtn">Start Sleep Timer</button>
                </div>
                <div class="timer-countdown-inline sleep-countdown" id="sleepCountdownInline" style="display:none;"></div>
            </div>

            <!-- Wake Timer Section -->
            <div class="timer-section">
                <div class="timer-section-label">
                    <span class="dot dot-wake"></span> Wake Timer (Auto-On)
                </div>
                <div class="timer-slider-row">
                    <input type="range" id="wakeSlider" min="1" max="120" value="30" />
                    <span class="timer-value" id="wakeValue">30 min</span>
                </div>
                <div class="timer-actions" id="wakeActions">
                    <button class="timer-activate-btn wake-btn" id="wakeActivateBtn">Start Wake Timer</button>
                </div>
                <div class="timer-countdown-inline wake-countdown" id="wakeCountdownInline" style="display:none;"></div>
            </div>
        </div>

        <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
        <div class="station-name" id="stationTitle">...</div>
        <div class="station-counter" id="stationSub">...</div>

        <!-- Live Timer Countdown on the main display -->
        <div class="timer-live-display" id="timerLiveDisplay"></div>

        <div class="controls">
            <button class="ctrl-btn nav-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn nav-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <div class="actions-bar">
            <div class="volume-container">
                <i class="fas fa-volume-down" style="color:#94a3b8;font-size:14px;"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <i class="fas fa-volume-up" style="color:#94a3b8;font-size:16px;"></i>
            </div>
            <div class="action-btns">
                <button class="action-btn" id="saveFavBtn" title="Save Station"><i class="fas fa-heart"></i></button>
            </div>
        </div>

        <div class="footer-note">Change the country in the bot chat.</div>
        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <!-- Favorites Modal -->
    <div class="modal" id="favModal">
        <div class="modal-header">
            <span>Saved Stations</span>
            <button class="close-modal" id="closeFavsBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <script>
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        var ui = {
            loading: document.getElementById('loading'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            vol: document.getElementById('volumeSlider'),
            saveBtn: document.getElementById('saveFavBtn'),
            openFavs: document.getElementById('openFavsBtn'),
            closeFavs: document.getElementById('closeFavsBtn'),
            favModal: document.getElementById('favModal'),
            favList: document.getElementById('favList'),
            // Timer elements
            timerBtn: document.getElementById('timerBtn'),
            timerPopover: document.getElementById('timerPopover'),
            timerCloseBtn: document.getElementById('timerCloseBtn'),
            timerLiveDisplay: document.getElementById('timerLiveDisplay'),
            // Sleep timer
            sleepSlider: document.getElementById('sleepSlider'),
            sleepValue: document.getElementById('sleepValue'),
            sleepActivateBtn: document.getElementById('sleepActivateBtn'),
            sleepActions: document.getElementById('sleepActions'),
            sleepCountdownInline: document.getElementById('sleepCountdownInline'),
            // Wake timer
            wakeSlider: document.getElementById('wakeSlider'),
            wakeValue: document.getElementById('wakeValue'),
            wakeActivateBtn: document.getElementById('wakeActivateBtn'),
            wakeActions: document.getElementById('wakeActions'),
            wakeCountdownInline: document.getElementById('wakeCountdownInline')
        };

        var params = new URLSearchParams(window.location.search);
        var urlName = params.get('name') || '';
        var startParam = tg.initDataUnsafe.start_param || '';
        var tgName = startParam.replace(/_/g, ' ');
        var countryName = tgName || urlName;

        var stations = [];
        var currentIndex = 0;
        var isPlaying = false;
        var savedStations = JSON.parse(localStorage.getItem('radio_saved_list')) || [];
        var errorCount = 0;
        var isExternalFavPlaying = false;
        var autoSkipInProgress = false;
        var skipTimeout = null;

        // --- Timer State ---
        var sleepEndTime = null; // timestamp in ms when sleep timer expires
        var wakeEndTime = null; // timestamp in ms when wake timer expires
        var timerTickInterval = null; // 1-second interval for live countdown updates

        // --- Format seconds to MM:SS ---
        function formatMMSS(totalSeconds) {
            if (totalSeconds <= 0) return '0:00';
            var mins = Math.floor(totalSeconds / 60);
            var secs = Math.floor(totalSeconds % 60);
            return mins + ':' + (secs < 10 ? '0' : '') + secs;
        }

        // --- Update slider value labels ---
        function updateSliderLabels() {
            ui.sleepValue.textContent = ui.sleepSlider.value + ' min';
            ui.wakeValue.textContent = ui.wakeSlider.value + ' min';
        }

        ui.sleepSlider.addEventListener('input', function() {
            ui.sleepValue.textContent = this.value + ' min';
        });
        ui.wakeSlider.addEventListener('input', function() {
            ui.wakeValue.textContent = this.value + ' min';
        });

        // --- Get remaining seconds for a timer ---
        function getRemainingSeconds(endTime) {
            if (!endTime) return 0;
            var remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
            return remaining;
        }

        // --- Render sleep timer UI (popover + live display + button) ---
        function renderSleepTimerUI() {
            var active = sleepEndTime && Date.now() < sleepEndTime;
            var remaining = getRemainingSeconds(sleepEndTime);

            if (active && remaining > 0) {
                // Hide activate button, show countdown + cancel
                ui.sleepActivateBtn.style.display = 'none';
                // Ensure cancel button exists
                if (!document.getElementById('sleepCancelBtn')) {
                    var cancelBtn = document.createElement('button');
                    cancelBtn.id = 'sleepCancelBtn';
                    cancelBtn.className = 'timer-cancel-sm';
                    cancelBtn.textContent = 'Cancel';
                    cancelBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        clearSleepTimer();
                    });
                    ui.sleepActions.appendChild(cancelBtn);
                }
                document.getElementById('sleepCancelBtn').style.display = 'inline-block';
                ui.sleepCountdownInline.style.display = 'block';
                ui.sleepCountdownInline.textContent = '⏳ ' + formatMMSS(remaining);
            } else {
                // Show activate button, hide countdown + cancel
                ui.sleepActivateBtn.style.display = 'inline-block';
                var cancelBtn = document.getElementById('sleepCancelBtn');
                if (cancelBtn) cancelBtn.style.display = 'none';
                ui.sleepCountdownInline.style.display = 'none';
                ui.sleepCountdownInline.textContent = '';
                // If timer expired naturally, clear it
                if (sleepEndTime && Date.now() >= sleepEndTime) {
                    sleepEndTime = null;
                }
            }
        }

        // --- Render wake timer UI ---
        function renderWakeTimerUI() {
            var active = wakeEndTime && Date.now() < wakeEndTime;
            var remaining = getRemainingSeconds(wakeEndTime);

            if (active && remaining > 0) {
                ui.wakeActivateBtn.style.display = 'none';
                if (!document.getElementById('wakeCancelBtn')) {
                    var cancelBtn = document.createElement('button');
                    cancelBtn.id = 'wakeCancelBtn';
                    cancelBtn.className = 'timer-cancel-sm';
                    cancelBtn.textContent = 'Cancel';
                    cancelBtn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        clearWakeTimer();
                    });
                    ui.wakeActions.appendChild(cancelBtn);
                }
                document.getElementById('wakeCancelBtn').style.display = 'inline-block';
                ui.wakeCountdownInline.style.display = 'block';
                ui.wakeCountdownInline.textContent = '⏳ ' + formatMMSS(remaining);
            } else {
                ui.wakeActivateBtn.style.display = 'inline-block';
                var cancelBtn = document.getElementById('wakeCancelBtn');
                if (cancelBtn) cancelBtn.style.display = 'none';
                ui.wakeCountdownInline.style.display = 'none';
                ui.wakeCountdownInline.textContent = '';
                if (wakeEndTime && Date.now() >= wakeEndTime) {
                    wakeEndTime = null;
                }
            }
        }

        // --- Update the live countdown display on the main player card ---
        function updateLiveDisplay() {
            var sleepActive = sleepEndTime && Date.now() < sleepEndTime;
            var wakeActive = wakeEndTime && Date.now() < wakeEndTime;
            var sleepRemaining = getRemainingSeconds(sleepEndTime);
            var wakeRemaining = getRemainingSeconds(wakeEndTime);

            var parts = [];
            if (sleepActive && sleepRemaining > 0) {
                parts.push('<span class="live-sleep">🌙 Sleep in ' + formatMMSS(sleepRemaining) + '</span>');
            }
            if (wakeActive && wakeRemaining > 0) {
                parts.push('<span class="live-wake">☀️ Wake in ' + formatMMSS(wakeRemaining) + '</span>');
            }
            if (parts.length === 0) {
                ui.timerLiveDisplay.innerHTML = '';
            } else if (parts.length === 2) {
                ui.timerLiveDisplay.innerHTML = parts[0] + '<span class="live-sep">|</span>' + parts[1];
            } else {
                ui.timerLiveDisplay.innerHTML = parts[0];
            }
        }

        // --- Update the timer button in the header ---
        function updateTimerButton() {
            var sleepActive = sleepEndTime && Date.now() < sleepEndTime;
            var wakeActive = wakeEndTime && Date.now() < wakeEndTime;
            var sleepRemaining = getRemainingSeconds(sleepEndTime);
            var wakeRemaining = getRemainingSeconds(wakeEndTime);

            var anyActive = sleepActive || wakeActive;
            var displayText = '';

            if (anyActive) {
                // Show the soonest-expiring timer
                if (sleepActive && wakeActive) {
                    displayText = (sleepRemaining <= wakeRemaining) ? formatMMSS(sleepRemaining) : formatMMSS(
                        wakeRemaining);
                } else if (sleepActive) {
                    displayText = formatMMSS(sleepRemaining);
                } else if (wakeActive) {
                    displayText = formatMMSS(wakeRemaining);
                }
                ui.timerBtn.innerHTML = displayText;
                ui.timerBtn.classList.add('active-timer');
            } else {
                ui.timerBtn.innerHTML = '<i class="fas fa-clock"></i>';
                ui.timerBtn.classList.remove('active-timer');
            }
        }

        // --- Full UI refresh for all timer displays ---
        function refreshAllTimerUI() {
            renderSleepTimerUI();
            renderWakeTimerUI();
            updateLiveDisplay();
            updateTimerButton();

            // Manage the tick interval
            var anyActive = (sleepEndTime && Date.now() < sleepEndTime) || (wakeEndTime && Date.now() < wakeEndTime);
            if (anyActive && !timerTickInterval) {
                timerTickInterval = setInterval(timerTick, 1000);
            } else if (!anyActive && timerTickInterval) {
                clearInterval(timerTickInterval);
                timerTickInterval = null;
            }
        }

        // --- Called every second ---
        function timerTick() {
            var now = Date.now();

            // Check sleep timer expiry
            if (sleepEndTime && now >= sleepEndTime) {
                var expiredSleep = sleepEndTime;
                sleepEndTime = null;
                fadeOutAndPause();
                refreshAllTimerUI();
                return;
            }

            // Check wake timer expiry
            if (wakeEndTime && now >= wakeEndTime) {
                wakeEndTime = null;
                // If radio is paused or stopped, start playing
                if (ui.audio.paused && ui.audio.src) {
                    isPlaying = true;
                    playAudio();
                }
                refreshAllTimerUI();
                return;
            }

            // Update displays
            renderSleepTimerUI();
            renderWakeTimerUI();
            updateLiveDisplay();
            updateTimerButton();

            // If no timers remain active, clear interval
            var anyActive = (sleepEndTime && Date.now() < sleepEndTime) || (wakeEndTime && Date.now() < wakeEndTime);
            if (!anyActive && timerTickInterval) {
                clearInterval(timerTickInterval);
                timerTickInterval = null;
                refreshAllTimerUI();
            }
        }

        // --- Activate sleep timer ---
        function activateSleepTimer() {
            var minutes = parseInt(ui.sleepSlider.value);
            if (!minutes || minutes < 1) minutes = 1;
            sleepEndTime = Date.now() + minutes * 60000;
            refreshAllTimerUI();
        }

        // --- Activate wake timer ---
        function activateWakeTimer() {
            var minutes = parseInt(ui.wakeSlider.value);
            if (!minutes || minutes < 1) minutes = 1;
            wakeEndTime = Date.now() + minutes * 60000;
            refreshAllTimerUI();
        }

        // --- Clear sleep timer ---
        function clearSleepTimer() {
            sleepEndTime = null;
            refreshAllTimerUI();
        }

        // --- Clear wake timer ---
        function clearWakeTimer() {
            wakeEndTime = null;
            refreshAllTimerUI();
        }

        // --- Fade out and pause (used by sleep timer) ---
        function fadeOutAndPause() {
            var startVol = ui.audio.volume;
            if (startVol <= 0 || ui.audio.paused) {
                if (!ui.audio.paused) ui.audio.pause();
                return;
            }
            var steps = 20;
            var stepTime = 100;
            var volStep = startVol / steps;
            var currentStep = 0;
            var fadeInterval = setInterval(function() {
                currentStep++;
                var newVol = Math.max(0, startVol - (volStep * currentStep));
                ui.audio.volume = newVol;
                if (currentStep >= steps) {
                    clearInterval(fadeInterval);
                    ui.audio.pause();
                    ui.audio.volume = startVol;
                    ui.vol.value = startVol;
                }
            }, stepTime);
        }

        // --- Timer button click – toggle popover ---
        ui.timerBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (ui.timerPopover.classList.contains('active')) {
                closeTimerPopover();
            } else {
                openTimerPopover();
            }
        });

        function openTimerPopover() {
            updateSliderLabels();
            refreshAllTimerUI();
            ui.timerPopover.classList.add('active');
        }

        function closeTimerPopover() {
            ui.timerPopover.classList.remove('active');
        }

        // --- Close popover button ---
        ui.timerCloseBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            closeTimerPopover();
        });

        // --- Activate buttons ---
        ui.sleepActivateBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            activateSleepTimer();
        });
        ui.wakeActivateBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            activateWakeTimer();
        });

        // --- Close popover when clicking outside ---
        document.addEventListener('click', function(e) {
            if (ui.timerPopover.classList.contains('active') &&
                !ui.timerPopover.contains(e.target) &&
                e.target !== ui.timerBtn &&
                !ui.timerBtn.contains(e.target)) {
                closeTimerPopover();
            }
        });

        // --- Fetching ---
        async function fetchRadio(name) {
            if (!name) throw new Error('No country');
            var url = "https://de1.api.radio-browser.info/json/stations/bycountry/" + encodeURIComponent(name) +
                "?order=votes&reverse=true";
            var resp = await fetch(url);
            if (!resp.ok) throw new Error('Fetch failed');
            var data = await resp.json();
            return data.filter(function(s) {
                var u = s.url_resolved || s.url;
                return u && u.indexOf('https://') === 0;
            });
        }

        async function init() {
            var name = countryName.trim();
            if (!name) {
                setEmptyState();
                return;
            }
            try {
                var data = await fetchRadio(name);
                if (data.length) {
                    stations = data;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    var fallbackUrl = "https://de1.api.radio-browser.info/json/stations/byname/" + encodeURIComponent(
                        name) + "?order=votes&reverse=true";
                    var fallbackResp = await fetch(fallbackUrl);
                    var fallbackData = await fallbackResp.json();
                    var validFallback = fallbackData.filter(function(s) {
                        var u = s.url_resolved || s.url;
                        return u && u.indexOf('https://') === 0;
                    });
                    if (validFallback.length) {
                        stations = validFallback;
                        currentIndex = 0;
                        loadStation(0);
                    } else {
                        setEmptyState();
                    }
                }
            } catch (e) {
                setEmptyState();
            }
            ui.loading.style.display = 'none';
        }

        function setEmptyState() {
            ui.title.textContent = 'No Stations Found';
            ui.sub.textContent = 'Please enter a valid country';
            ui.logo.innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i>';
            ui.loading.style.display = 'none';
        }

        // --- Load & Play ---
        function loadStation(index) {
            if (!stations.length) return;
            var item = stations[index];
            isExternalFavPlaying = false;
            ui.title.textContent = item.name || 'Unknown Station';
            ui.sub.textContent = "Station " + (index + 1) + " / " + stations.length;
            if (item.favicon) {
                var img = new Image();
                img.src = item.favicon;
                img.onload = function() { ui.logo.innerHTML = '';
                    ui.logo.appendChild(img); };
                img.onerror = function() { ui.logo.innerHTML = '<i class="fas fa-music"></i>'; };
            } else {
                ui.logo.innerHTML = '<i class="fas fa-music"></i>';
            }
            ui.audio.src = item.url_resolved || item.url || '';
            ui.audio.load();
            ui.audio.volume = ui.vol.value;
            ui.playBtn.disabled = false;
            ui.prevBtn.disabled = false;
            ui.nextBtn.disabled = false;
            checkFavState(item.stationuuid);
            if (isPlaying) {
                playAudio();
            }
        }

        function playAudio() {
            var playPromise = ui.audio.play();
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    isPlaying = true;
                    errorCount = 0;
                    ui.playIcon.className = 'fas fa-pause';
                    ui.logo.classList.add('playing');
                }).catch(function(err) {
                    if (err.name !== 'AbortError') {
                        handleStreamError();
                    }
                });
            }
        }

        function togglePlay() {
            if (!ui.audio.src) return;
            if (ui.audio.paused) {
                isPlaying = true;
                playAudio();
            } else {
                ui.audio.pause();
                isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('playing');
            }
        }

        // --- Auto-Skip Error Handling (keeps playing) ---
        function handleStreamError() {
            if (isPlaying && stations.length > 1 && errorCount < 10 && !isExternalFavPlaying) {
                errorCount++;
                ui.sub.textContent = "Offline. Skipping...";
                ui.logo.classList.remove('playing');
                ui.playIcon.className = 'fas fa-spinner fa-spin';
                if (skipTimeout) clearTimeout(skipTimeout);
                autoSkipInProgress = true;
                skipTimeout = setTimeout(function() {
                    currentIndex = (currentIndex + 1) % stations.length;
                    loadStation(currentIndex);
                    autoSkipInProgress = false;
                    skipTimeout = null;
                }, 1500);
            } else {
                isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
                ui.logo.classList.remove('playing');
                ui.sub.textContent = "Stream Unavailable";
                autoSkipInProgress = false;
            }
        }

        ui.audio.addEventListener('error', handleStreamError);

        ui.audio.addEventListener('pause', function() {
            if (autoSkipInProgress) return;
            isPlaying = false;
            ui.playIcon.className = 'fas fa-play';
            ui.logo.classList.remove('playing');
        });

        ui.audio.addEventListener('play', function() {
            isPlaying = true;
            errorCount = 0;
            ui.playIcon.className = 'fas fa-pause';
            ui.logo.classList.add('playing');
        });

        ui.playBtn.addEventListener('click', togglePlay);
        ui.nextBtn.addEventListener('click', function() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        });
        ui.prevBtn.addEventListener('click', function() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        });
        ui.vol.addEventListener('input', function(e) {
            ui.audio.volume = e.target.value;
        });

        // --- Favorites ---
        function checkFavState(uuid) {
            var isFav = savedStations.some(function(s) { return s.id === uuid; });
            ui.saveBtn.className = isFav ? 'action-btn active-fav' : 'action-btn';
            ui.saveBtn.innerHTML = isFav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
        }

        ui.saveBtn.addEventListener('click', function() {
            if (!stations.length && !isExternalFavPlaying) return;
            var station;
            if (isExternalFavPlaying) {
                var currentSrc = ui.audio.src;
                station = savedStations.find(function(s) { return s.url === currentSrc; });
                if (!station) return;
            } else {
                station = stations[currentIndex];
            }
            var stationId = station.stationuuid || station.id;
            var idx = savedStations.findIndex(function(s) { return s.id === stationId; });
            if (idx > -1) {
                savedStations.splice(idx, 1);
            } else {
                savedStations.push({
                    id: stationId,
                    name: station.name,
                    url: station.url_resolved || station.url,
                    img: station.favicon || station.img
                });
            }
            localStorage.setItem('radio_saved_list', JSON.stringify(savedStations));
            checkFavState(stationId);
            renderFavorites();
        });

        function renderFavorites() {
            ui.favList.innerHTML = '';
            if (savedStations.length === 0) {
                ui.favList.innerHTML =
                    '<li style="text-align:center;color:#94a3b8;margin-top:20px;">No saved stations</li>';
                return;
            }
            savedStations.forEach(function(fav, i) {
                var li = document.createElement('li');
                li.className = 'fav-item';
                li.innerHTML = `
                    <div class="fav-item-content">
                        <i class="fas fa-play-circle fav-play-icon"></i>
                        <div class="fav-info">${fav.name || 'Unknown Station'}</div>
                    </div>
                    <button class="fav-remove" title="Remove"><i class="fas fa-trash"></i></button>
                `;
                li.querySelector('.fav-item-content').addEventListener('click', function() {
                    var foundIndex = stations.findIndex(function(s) { return s.stationuuid === fav
                            .id; });
                    if (foundIndex !== -1) {
                        currentIndex = foundIndex;
                        loadStation(currentIndex);
                        playAudio();
                    } else {
                        isExternalFavPlaying = true;
                        ui.title.textContent = fav.name || 'Unknown Station';
                        ui.sub.textContent = "Saved Station";
                        if (fav.img) {
                            var img = new Image();
                            img.src = fav.img;
                            img.onload = function() { ui.logo.innerHTML = '';
                                ui.logo.appendChild(img); };
                            img.onerror = function() { ui.logo.innerHTML =
                                '<i class="fas fa-music"></i>'; };
                        } else {
                            ui.logo.innerHTML = '<i class="fas fa-music"></i>';
                        }
                        ui.audio.src = fav.url;
                        ui.audio.load();
                        checkFavState(fav.id);
                        playAudio();
                    }
                    ui.favModal.classList.remove('open');
                });
                li.querySelector('.fav-remove').addEventListener('click', function() {
                    savedStations.splice(i, 1);
                    localStorage.setItem('radio_saved_list', JSON.stringify(savedStations));
                    renderFavorites();
                    var currentId = isExternalFavPlaying ? fav.id : (stations[currentIndex] ? stations[
                        currentIndex].stationuuid : null);
                    if (currentId === fav.id) checkFavState(fav.id);
                });
                ui.favList.appendChild(li);
            });
        }

        ui.openFavs.addEventListener('click', function() { renderFavorites();
            ui.favModal.classList.add('open'); });
        ui.closeFavs.addEventListener('click', function() { ui.favModal.classList.remove('open'); });

        // Start
        init();
    </script>
</body>
</html>
