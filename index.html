<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Global Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --bg-base: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #fbbf24;
            --font-family: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-base);
            background-image: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            width: 100%;
            max-width: 420px;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            border: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            gap: 16px;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .header-country {
            flex: 1;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .icon-btn {
            background: var(--border-glass);
            border: none;
            color: var(--text-sub);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .icon-btn.has-text {
            width: auto;
            padding: 0 14px;
            border-radius: 22px;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: scale(1.05);
        }

        .header-timer-text {
            display: none;
            font-family: monospace;
            font-size: 13px;
            font-weight: 700;
            margin-left: 6px;
            color: var(--warning);
        }
        .icon-btn.has-text .header-timer-text {
            display: inline-block;
        }

        .icon-btn.active-timer {
            color: var(--warning);
            background: rgba(251, 191, 36, 0.15);
            border: 1px solid rgba(251, 191, 36, 0.3);
            animation: pulseWarning 2s infinite;
        }
        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(15, 23, 42, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--primary);
            overflow: hidden;
            border: 4px solid var(--border-glass);
            transition: border-color 0.4s ease, box-shadow 0.4s ease;
            position: relative;
        }
        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #fff;
            border-radius: 50%;
            padding: 4px;
        }
        .logo.playing {
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            animation: spinDisc 10s linear infinite;
        }
        @keyframes spinDisc {
            100% { transform: rotate(360deg); }
        }

        .dancing-boy-svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        .station-name {
            font-size: 20px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .station-counter {
            font-size: 13px;
            color: var(--text-sub);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .controls {
            display: flex; justify-content: center; align-items: center; gap: 25px; margin-top: 10px;
        }
        .ctrl-btn { border: none; cursor: pointer; transition: 0.3s; }
        .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .nav-btn {
            width: 46px; height: 46px; background: rgba(255, 255, 255, 0.05);
            color: var(--text-main); font-size: 16px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.15); transform: scale(1.1); }

        .play-btn {
            width: 70px; height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            border-radius: 50%; font-size: 24px; color: #fff; box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
            display: flex; align-items: center; justify-content: center; padding-left: 3px; 
        }
        .play-btn:hover:not(:disabled) { transform: scale(1.08) translateY(-2px); }
        .play-btn .fa-pause { padding-left: 0; }

        .actions-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.25); padding: 16px 20px; border-radius: 20px;
        }
        .volume-container { display: flex; align-items: center; gap: 12px; flex-grow: 1; margin-right: 15px; }

        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: rgba(255, 255, 255, 0.15); border-radius: 4px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            border-radius: 50%; background: var(--primary); cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(59,130,246,0.5);
        }

        .action-btn { background: none; border: none; font-size: 22px; color: var(--text-sub); cursor: pointer; transition: 0.3s; }
        .action-btn:hover { color: #fff; transform: scale(1.1); }
        .action-btn.active-fav { color: var(--danger); animation: heartBeat 0.4s ease; }
        @keyframes heartBeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .footer-note { 
            font-size: 11px; 
            color: var(--danger); 
            margin-top: -5px; 
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        /* PayPal Button - fixed positioning improved */
        .paypal-wrapper {
            position: fixed; 
            bottom: 80px; /* رفع الزر للأعلى قليلاً لعدم تغطية المحتوى */
            right: 20px; 
            width: 100px; 
            height: 100px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 50; /* أعلى من البطاقة لكن أقل من الأوفرلي */
        }
        .paypal-svg { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .paypal-svg text { 
            font-size: 11.5px; 
            fill: var(--text-sub); font-family: monospace; letter-spacing: 0.5px; font-weight: bold; 
        }
        .donate-btn {
            width: 50px; height: 50px; background: #0070ba; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 22px; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4); position: relative; z-index: 2; transition: 0.3s;
        }
        .donate-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 112, 186, 0.6); }

        /* Share button */
        .share-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-glass);
            color: var(--text-sub);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .share-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Bottom Sheet */
        .sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            z-index: 140; opacity: 0; visibility: hidden; transition: 0.3s ease;
        }
        .sheet-overlay.open { opacity: 1; visibility: visible; }

        .bottom-sheet {
            position: fixed; bottom: -100%; left: 0; width: 100%;
            background: #1e293b; border-top-left-radius: 24px; border-top-right-radius: 24px;
            padding: 20px 24px 30px; z-index: 150; box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            transition: bottom 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; flex-direction: column; gap: 15px;
        }
        .bottom-sheet.open { bottom: 0; }

        .sheet-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 16px; font-weight: 600; color: #fff; margin-bottom: 5px;
        }
        .sheet-header-timer {
            color: var(--warning); font-family: monospace; font-size: 15px; margin-left: 8px; font-weight: 700;
        }
        .close-sheet { background: none; border: none; color: var(--text-sub); font-size: 20px; cursor: pointer; }
        
        .compact-timer-row {
            background: rgba(0,0,0,0.2); border: 1px solid var(--border-glass);
            border-radius: 16px; padding: 12px 16px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .timer-info {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 14px; font-weight: 600;
        }
        .timer-info-left { display: flex; align-items: center; gap: 8px; }
        
        .digital-timer {
            font-family: monospace; font-size: 18px; font-weight: 700; color: var(--warning);
            background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 6px; display: none;
        }
        .digital-timer.visible { display: block; }

        .timer-actions { display: flex; gap: 6px; flex-wrap: wrap; }
        .timer-actions button {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: #cbd5e1; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
            cursor: pointer; transition: 0.2s; flex: 1; text-align: center;
        }
        .timer-actions button:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
        
        .cancel-timer-btn {
            background: rgba(239, 68, 68, 0.15); color: var(--danger); border: none;
            padding: 8px; border-radius: 12px; font-size: 13px; font-weight: 600;
            cursor: pointer; width: 100%; display: none; transition: 0.2s; margin-top: 5px;
        }
        .cancel-timer-btn.visible { display: block; }
        .cancel-timer-btn:hover { background: var(--danger); color: #fff; }

        /* Modal */
        .modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); z-index: 200;
            display: flex; flex-direction: column; padding: 30px 20px; backdrop-filter: blur(12px); opacity: 0; visibility: hidden; transition: 0.3s ease;
        }
        .modal.open { opacity: 1; visibility: visible; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 700; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid var(--border-glass); }
        .close-modal { background: none; border: none; color: var(--text-sub); font-size: 24px; cursor: pointer; transition: 0.2s; }
        .close-modal:hover { color: var(--danger); transform: rotate(90deg); }
        
        .fav-list { flex: 1; overflow-y: auto; list-style: none; padding-right: 5px; }
        .fav-list::-webkit-scrollbar { width: 5px; }
        .fav-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        .fav-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 14px 18px; border-radius: 14px; margin-bottom: 10px; border: 1px solid var(--border-glass); transition: 0.3s ease; }
        .fav-item:hover { border-color: var(--primary); background: rgba(59,130,246,0.1); transform: translateX(5px); }
        .fav-item-content { display: flex; align-items: center; flex: 1; cursor: pointer; gap: 15px; overflow: hidden; }
        .fav-play-icon { color: var(--primary); font-size: 22px; }
        .fav-info { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size:14px; }
        
        .fav-remove { color: var(--danger); background: rgba(239, 68, 68, 0.15); border: none; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .fav-remove:hover { background: var(--danger); color: #fff; }

        #loading { position: fixed; inset: 0; background: var(--bg-base); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; color: var(--primary); font-weight: 600; letter-spacing: 2px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(59, 130, 246, 0.2); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <!-- PayPal Component -->
    <div class="paypal-wrapper">
        <svg class="paypal-svg" viewBox="0 0 100 100">
            <path id="curve" d="M 18 50 A 32 32 0 0 1 82 50" fill="transparent" />
            <text>
                <textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵘᵖᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath>
            </text>
        </svg>
        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn">
            <i class="fab fa-paypal"></i>
        </a>
    </div>

    <div id="loading">
        <div class="spinner"></div>
        <span>FETCHING STATIONS...</span>
    </div>

    <div class="player-card">
        <div class="header">
            <button class="icon-btn" id="toggleTimerBtn" title="Timers">
                <i class="fas fa-stopwatch"></i>
                <span id="mainHeaderTimer" class="header-timer-text"></span>
            </button>
            
            <div class="header-country" id="headerCountry">Global Radio</div>
            
            <button class="icon-btn" id="openFavsBtn" title="Saved Stations"><i class="fas fa-list-ul"></i></button>
        </div>

        <div class="logo-container">
            <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
            <div class="station-name" id="stationTitle">Loading...</div>
            <div class="station-counter" id="stationSub">Initializing</div>
        </div>

        <!-- زر مشاركة المحطة -->
        <button class="share-btn" id="shareStationBtn">
            <i class="fas fa-share-alt"></i> Share Station
        </button>

        <div class="controls">
            <button class="ctrl-btn nav-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn nav-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <div class="actions-bar">
            <div class="volume-container">
                <i class="fas fa-volume-down" style="color:var(--text-sub); font-size:14px;"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <i class="fas fa-volume-up" style="color:var(--text-sub); font-size:16px;"></i>
            </div>
            <button class="action-btn" id="saveFavBtn" title="Save Station"><i class="far fa-heart"></i></button>
        </div>

        <div class="footer-note">Change country inside the bot chat.</div>
        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <!-- Bottom Sheet Timer -->
    <div class="sheet-overlay" id="timerOverlay"></div>
    <div class="bottom-sheet" id="timerSheet">
        <div class="sheet-header">
            <div>
                <i class="fas fa-stopwatch" style="color:var(--primary); margin-right:5px;"></i> Auto Timers
                <span id="sheetHeaderTimer" class="sheet-header-timer"></span>
            </div>
            <button class="close-sheet" id="closeTimerBtn"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="compact-timer-row">
            <div class="timer-info">
                <div class="timer-info-left"><i class="fas fa-moon" style="color:#60a5fa"></i> Sleep</div>
                <span class="digital-timer" id="sleepDigital">00:00</span>
            </div>
            <div class="timer-actions" id="sleepActions">
                <button data-min="1">1m</button>
                <button data-min="5">5m</button>
                <button data-min="15">15m</button>
                <button data-min="30">30m</button>
                <button data-min="60">1h</button>
            </div>
            <button class="cancel-timer-btn" id="sleepCancelBtn">Cancel Sleep Timer</button>
        </div>

        <div class="compact-timer-row">
            <div class="timer-info">
                <div class="timer-info-left"><i class="fas fa-clock" style="color:#4ade80"></i> Start</div>
                <span class="digital-timer" id="startDigital">00:00</span>
            </div>
            <div class="timer-actions" id="startActions">
                <button data-min="1">1m</button>
                <button data-min="5">5m</button>
                <button data-min="15">15m</button>
                <button data-min="30">30m</button>
                <button data-min="60">1h</button>
            </div>
            <button class="cancel-timer-btn" id="startCancelBtn">Cancel Start Timer</button>
        </div>
    </div>

    <!-- Favorites Modal -->
    <div class="modal" id="favModal">
        <div class="modal-header">
            <span>Your Favorites</span>
            <button class="close-modal" id="closeFavsBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }

        const DOM = {
            loading: document.getElementById('loading'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            vol: document.getElementById('volumeSlider'),
            saveBtn: document.getElementById('saveFavBtn'),
            openFavs: document.getElementById('openFavsBtn'),
            closeFavs: document.getElementById('closeFavsBtn'),
            favModal: document.getElementById('favModal'),
            favList: document.getElementById('favList'),
            
            headerCountry: document.getElementById('headerCountry'),
            mainHeaderTimer: document.getElementById('mainHeaderTimer'),
            
            timersToggleBtn: document.getElementById('toggleTimerBtn'),
            timerOverlay: document.getElementById('timerOverlay'),
            timerSheet: document.getElementById('timerSheet'),
            closeTimerBtn: document.getElementById('closeTimerBtn'),
            sheetHeaderTimer: document.getElementById('sheetHeaderTimer'),
            
            sleepDigital: document.getElementById('sleepDigital'),
            sleepActions: document.getElementById('sleepActions'),
            sleepCancelBtn: document.getElementById('sleepCancelBtn'),
            
            startDigital: document.getElementById('startDigital'),
            startActions: document.getElementById('startActions'),
            startCancelBtn: document.getElementById('startCancelBtn'),
            
            shareStationBtn: document.getElementById('shareStationBtn')
        };

        let stations = []; 
        let currentIndex = 0; 
        let isPlaying = false; 
        
        let savedStations = [];
        try {
            savedStations = JSON.parse(localStorage.getItem('radio_saved_list')) || [];
        } catch (e) {
            savedStations = [];
        }

        let errorCount = 0; 
        let isExternalFavPlaying = false; 
        let autoSkipInProgress = false; 
        let skipTimeout = null;

        const PARAMS = new URLSearchParams(window.location.search);
        const TG_PARAM = tg?.initDataUnsafe?.start_param || '';
        let targetRaw = TG_PARAM.replace(/_/g, ' ') || PARAMS.get('name') || PARAMS.get('country') || '';
        const TARGET_COUNTRY = targetRaw.trim();

        // Timer Logic
        let timers = { sleepEnd: null, startEnd: null, tickInt: null, sleepTo: null, startTo: null };

        const toggleTimerSheet = () => {
            const isOpen = DOM.timerSheet.classList.contains('open');
            if (isOpen) {
                DOM.timerSheet.classList.remove('open');
                DOM.timerOverlay.classList.remove('open');
            } else {
                DOM.timerSheet.classList.add('open');
                DOM.timerOverlay.classList.add('open');
            }
        };

        DOM.timersToggleBtn.addEventListener('click', toggleTimerSheet);
        DOM.closeTimerBtn.addEventListener('click', toggleTimerSheet);
        DOM.timerOverlay.addEventListener('click', toggleTimerSheet);

        const formatTime = (totalSeconds) => {
            const h = Math.floor(totalSeconds / 3600);
            const m = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const s = (totalSeconds % 60).toString().padStart(2, '0');
            return h > 0 ? `${h}:${m}:${s}` : `${m}:${s}`;
        };

        const getRemaining = (endMs) => {
            if (!endMs) return { total: 0 };
            return { total: Math.max(0, Math.round((endMs - Date.now()) / 1000)) };
        };

        const updateHeaderTimerUI = () => {
            const sleepActive = timers.sleepEnd && Date.now() < timers.sleepEnd;
            const startActive = timers.startEnd && Date.now() < timers.startEnd;

            if (sleepActive) {
                const rem = getRemaining(timers.sleepEnd);
                const timeStr = formatTime(rem.total);
                DOM.mainHeaderTimer.textContent = timeStr;
                DOM.sheetHeaderTimer.textContent = `(Sleep: ${timeStr})`;
                DOM.timersToggleBtn.classList.add('has-text', 'active-timer');
                DOM.sleepDigital.textContent = timeStr;
            } else if (startActive) {
                const rem = getRemaining(timers.startEnd);
                const timeStr = formatTime(rem.total);
                DOM.mainHeaderTimer.textContent = timeStr;
                DOM.sheetHeaderTimer.textContent = `(Start: ${timeStr})`;
                DOM.timersToggleBtn.classList.add('has-text', 'active-timer');
                DOM.startDigital.textContent = timeStr;
            } else {
                DOM.mainHeaderTimer.textContent = '';
                DOM.sheetHeaderTimer.textContent = '';
                DOM.timersToggleBtn.classList.remove('has-text', 'active-timer');
            }
        };

        const stopEngine = () => { 
            if(timers.tickInt) { 
                clearInterval(timers.tickInt); 
                timers.tickInt = null; 
            } 
        };

        const startEngine = () => { 
            if (!timers.tickInt) timers.tickInt = setInterval(timerTick, 1000); 
            timerTick(); 
        };

        const clearSleepUI = () => {
            clearTimeout(timers.sleepTo); 
            timers.sleepTo = null; 
            timers.sleepEnd = null;
            DOM.sleepDigital.classList.remove('visible');
            DOM.sleepCancelBtn.classList.remove('visible');
            updateHeaderTimerUI();
        };

        const clearStartUI = () => {
            clearTimeout(timers.startTo); 
            timers.startTo = null; 
            timers.startEnd = null;
            DOM.startDigital.classList.remove('visible');
            DOM.startCancelBtn.classList.remove('visible');
            updateHeaderTimerUI();
        };

        const timerTick = () => {
            const sleepActive = timers.sleepEnd && Date.now() < timers.sleepEnd;
            const startActive = timers.startEnd && Date.now() < timers.startEnd;
            
            if (!sleepActive && !startActive) {
                stopEngine();
                updateHeaderTimerUI();
                return;
            }

            if (sleepActive) {
                const rem = getRemaining(timers.sleepEnd);
                if (rem.total <= 0) { 
                    audioController.fadeOut(); 
                    clearSleepUI(); 
                }
            } else if (timers.sleepEnd) {
                clearSleepUI();
            }

            if (startActive) {
                const rem = getRemaining(timers.startEnd);
                if (rem.total <= 0) { 
                    audioController.forceStart(); 
                    clearStartUI(); 
                }
            } else if (timers.startEnd) {
                clearStartUI();
            }

            updateHeaderTimerUI();
        };

        DOM.sleepActions.addEventListener('click', e => {
            if(e.target.tagName !== 'BUTTON') return;
            const mins = parseInt(e.target.dataset.min);
            if (mins) {
                if(timers.startEnd) clearStartUI(); 
                audioController.forceStart(); 
                
                const now = Date.now();
                timers.sleepEnd = (timers.sleepEnd && timers.sleepEnd > now) ? timers.sleepEnd + (mins * 60000) : now + (mins * 60000);
                
                DOM.sleepCancelBtn.classList.add('visible');
                DOM.sleepDigital.classList.add('visible');
                
                startEngine();
                
                clearTimeout(timers.sleepTo);
                const remainingMs = timers.sleepEnd - Date.now();
                timers.sleepTo = setTimeout(() => { audioController.fadeOut(); clearSleepUI(); }, remainingMs); 
            }
        });

        DOM.startActions.addEventListener('click', e => {
            if(e.target.tagName !== 'BUTTON') return;
            const mins = parseInt(e.target.dataset.min);
            if (mins) {
                if(timers.sleepEnd) clearSleepUI(); 
                
                const now = Date.now();
                timers.startEnd = (timers.startEnd && timers.startEnd > now) ? timers.startEnd + (mins * 60000) : now + (mins * 60000);
                
                DOM.startCancelBtn.classList.add('visible');
                DOM.startDigital.classList.add('visible');
                
                startEngine();
                
                clearTimeout(timers.startTo);
                const remainingMs = timers.startEnd - Date.now();
                timers.startTo = setTimeout(() => { audioController.forceStart(); clearStartUI(); }, remainingMs); 
            }
        });

        DOM.sleepCancelBtn.addEventListener('click', clearSleepUI); 
        DOM.startCancelBtn.addEventListener('click', clearStartUI);

        // Radio Controller
        const radioService = {
            async fetchByStr(country) {
                try {
                    const endpoints = [ 
                        `https://de1.api.radio-browser.info/json/stations/bycountry/${encodeURIComponent(country)}?order=votes&reverse=true`,
                        `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(country)}?order=votes&reverse=true`
                    ];
                    for (const url of endpoints) {
                        const res = await fetch(url);
                        if (res.ok) {
                            const data = await res.json();
                            const valids = data.filter(s => (s.url_resolved || s.url).startsWith('https://'));
                            if(valids.length > 0) return valids;
                        }
                    }
                    return [];
                } catch(e) { return []; }
            }
        };

        // Dancing Boy Algorithm (مرعب)
        // سننشئ SVG ديناميكي لشخصية بعصا (stick figure) مع رسوم متحركة مرعبة
        // seed: stationuuid أو اسم المحطة لتوليد حركات مختلفة
        function createDancingBoySVG(seed) {
            // توليد بذرة رقمية من النص
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                const char = seed.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0; // Convert to 32bit integer
            }
            // استخدام أجزاء من hash لتحديد معلمات الرقصة
            const rng = (min, max) => {
                // دالة عشوائية تعتمد على hash والموقع
                // للحصول على قيم مختلفة لكل حركة
                return min + (Math.abs(hash) % (max - min));
            };
            
            // حركات الرأس: دوران متقطع 360 درجة أو اهتزاز
            const headRotate = rng(0, 2) === 0 ? '360deg' : `${rng(10, 80)}deg`;
            const headDuration = rng(0.3, 1.5);
            
            // الذراعين: زوايا غير طبيعية
            const armAngle = rng(-90, 90);
            const armDuration = rng(0.2, 0.8);
            
            // الأرجل: حركات متقطعة
            const legAngle = rng(-60, 60);
            const legDuration = rng(0.3, 1.2);
            
            const svgNS = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(svgNS, "svg");
            svg.setAttribute("viewBox", "0 0 100 100");
            svg.classList.add("dancing-boy-svg");
            
            // الأسلوب: خطوط نيون مضيئة
            const style = document.createElement("style");
            style.textContent = `
                .line { stroke: #3b82f6; stroke-width: 3; stroke-linecap: round; filter: drop-shadow(0 0 3px #3b82f6); }
                @keyframes rotateHead { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(${headRotate}); } }
                @keyframes moveArmL { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(${armAngle}deg); } }
                @keyframes moveArmR { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(${-armAngle}deg); } }
                @keyframes moveLegL { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(${legAngle}deg); } }
                @keyframes moveLegR { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(${-legAngle}deg); } }
                .head { animation: rotateHead ${headDuration}s infinite ease-in-out; transform-origin: 50px 25px; }
                .arm-left { animation: moveArmL ${armDuration}s infinite ease-in-out; transform-origin: 50px 45px; }
                .arm-right { animation: moveArmR ${armDuration}s infinite ease-in-out; transform-origin: 50px 45px; }
                .leg-left { animation: moveLegL ${legDuration}s infinite ease-in-out; transform-origin: 50px 65px; }
                .leg-right { animation: moveLegR ${legDuration}s infinite ease-in-out; transform-origin: 50px 65px; }
            `;
            svg.appendChild(style);
            
            // الجسم
            const body = document.createElementNS(svgNS, "line");
            body.setAttribute("x1", "50"); body.setAttribute("y1", "25");
            body.setAttribute("x2", "50"); body.setAttribute("y2", "65");
            body.classList.add("line");
            svg.appendChild(body);
            
            // الرأس
            const head = document.createElementNS(svgNS, "circle");
            head.setAttribute("cx", "50"); head.setAttribute("cy", "20");
            head.setAttribute("r", "8");
            head.classList.add("line", "head");
            svg.appendChild(head);
            
            // الذراع الأيسر
            const armLeft = document.createElementNS(svgNS, "line");
            armLeft.setAttribute("x1", "50"); armLeft.setAttribute("y1", "45");
            armLeft.setAttribute("x2", "35"); armLeft.setAttribute("y2", "55");
            armLeft.classList.add("line", "arm-left");
            svg.appendChild(armLeft);
            
            // الذراع الأيمن
            const armRight = document.createElementNS(svgNS, "line");
            armRight.setAttribute("x1", "50"); armRight.setAttribute("y1", "45");
            armRight.setAttribute("x2", "65"); armRight.setAttribute("y2", "55");
            armRight.classList.add("line", "arm-right");
            svg.appendChild(armRight);
            
            // الساق اليسرى
            const legLeft = document.createElementNS(svgNS, "line");
            legLeft.setAttribute("x1", "50"); legLeft.setAttribute("y1", "65");
            legLeft.setAttribute("x2", "40"); legLeft.setAttribute("y2", "85");
            legLeft.classList.add("line", "leg-left");
            svg.appendChild(legLeft);
            
            // الساق اليمنى
            const legRight = document.createElementNS(svgNS, "line");
            legRight.setAttribute("x1", "50"); legRight.setAttribute("y1", "65");
            legRight.setAttribute("x2", "60"); legRight.setAttribute("y2", "85");
            legRight.classList.add("line", "leg-right");
            svg.appendChild(legRight);
            
            return svg;
        }

        const audioController = {
            play() {
                const prom = DOM.audio.play();
                if (prom) {
                    prom.then(() => { 
                        isPlaying = true; 
                        errorCount = 0; 
                        DOM.playIcon.className = 'fas fa-pause'; 
                        DOM.playIcon.style.paddingLeft = '0'; 
                        DOM.logo.classList.add('playing'); 
                    }).catch(err => { 
                        if (err.name === 'NotAllowedError') {
                            isPlaying = false;
                            DOM.playIcon.className = 'fas fa-play';
                            DOM.playIcon.style.paddingLeft = '3px';
                            DOM.logo.classList.remove('playing');
                        } else if (err.name !== 'AbortError') {
                            this.handleError(); 
                        }
                    });
                }
            },
            pause() { 
                DOM.audio.pause(); 
                isPlaying = false; 
                DOM.playIcon.className = 'fas fa-play'; 
                DOM.playIcon.style.paddingLeft = '3px'; 
                DOM.logo.classList.remove('playing'); 
            },
            toggle() { 
                isPlaying ? this.pause() : this.play(); 
            },
            forceStart() { 
                if(DOM.audio.src || stations.length) { 
                    if(!DOM.audio.src) UIController.loadIndex(0); 
                    this.play(); 
                } 
            },
            fadeOut() {
                const initVol = DOM.audio.volume; 
                if(initVol <= 0 || !isPlaying) return this.pause();
                
                const step = initVol / 20; 
                let c = 0;
                
                const i = setInterval(() => { 
                    c++; 
                    DOM.audio.volume = Math.max(0, initVol - (step * c));
                    if(c >= 20) { 
                        clearInterval(i); 
                        this.pause(); 
                        DOM.audio.volume = initVol; 
                        DOM.vol.value = initVol; 
                    } 
                }, 100);
            },
            handleError() {
                if (stations.length > 1 && errorCount < 10 && !isExternalFavPlaying) {
                    errorCount++; 
                    DOM.sub.textContent = "Offline. Skipping..."; 
                    DOM.logo.classList.remove('playing'); 
                    DOM.playIcon.className = 'fas fa-spinner fa-spin';
                    
                    clearTimeout(skipTimeout); 
                    autoSkipInProgress = true;
                    
                    skipTimeout = setTimeout(() => { 
                        UIController.loadIndex((currentIndex + 1) % stations.length); 
                        autoSkipInProgress = false; 
                    }, 1500);
                } else { 
                    this.pause(); 
                    DOM.sub.textContent = "Stream Unavailable"; 
                }
            }
        };

        const UIController = {
            loadIndex(index) {
                if (!stations.length) return; 
                currentIndex = index;
                const s = stations[currentIndex]; 
                isExternalFavPlaying = false;
                
                this.updateUI(s.name, `Station ${currentIndex + 1} / ${stations.length}`, s.favicon, s.stationuuid || s.name);
                DOM.audio.src = s.url_resolved || s.url || '';
                this.enableControls(); 
                checkFavState(s.stationuuid); 
                
                if (isPlaying) audioController.play();
            },
            loadExternalFav(fav) {
                isExternalFavPlaying = true; 
                this.updateUI(fav.name, "Saved Station", fav.img, fav.id || fav.name);
                DOM.audio.src = fav.url; 
                this.enableControls(); 
                checkFavState(fav.id); 
                audioController.play();
            },
            updateUI(title, subtitle, imgSrc, seed) {
                DOM.title.textContent = title || 'Unknown'; 
                DOM.sub.textContent = subtitle;
                
                // إدارة الشعار: إما صورة أو الرجل الراقص
                DOM.logo.innerHTML = ''; // مسح المحتوى السابق
                if (imgSrc) {
                    const img = new Image();
                    img.src = imgSrc;
                    img.onload = () => {
                        DOM.logo.innerHTML = ''; // إعادة تعيين
                        DOM.logo.appendChild(img);
                    };
                    img.onerror = () => {
                        // إذا فشل تحميل الصورة، اعرض الرجل الراقص
                        DOM.logo.innerHTML = '';
                        DOM.logo.appendChild(createDancingBoySVG(seed || 'default'));
                    };
                    // أثناء التحميل، يمكن عرض موسيقى مؤقتة لكننا نفضل الراقص مباشرة كحالة افتراضية
                    DOM.logo.appendChild(createDancingBoySVG(seed || 'default')); 
                } else {
                    // لا صورة: استخدم الرجل الراقص
                    DOM.logo.appendChild(createDancingBoySVG(seed || 'default'));
                }
                
                DOM.audio.volume = DOM.vol.value;
            },
            enableControls() { 
                [DOM.playBtn, DOM.nextBtn, DOM.prevBtn].forEach(b => b.disabled = false); 
            },
            emptyState() { 
                DOM.title.textContent = 'No Stations Found'; 
                DOM.sub.textContent = 'Please enter a valid country in bot'; 
                DOM.logo.innerHTML = '<i class="fas fa-times-circle" style="color:var(--danger)"></i>'; 
            }
        };

        // زر المشاركة
        DOM.shareStationBtn.addEventListener('click', () => {
            const station = stations[currentIndex];
            if (!station) return;
            
            const shareData = {
                title: station.name,
                text: `استمع إلى ${station.name} من خلال هذا الراديو الرائع!`,
                url: window.location.href
            };
            
            if (navigator.share) {
                navigator.share(shareData).catch(() => {});
            } else {
                // fallback: نسخ الرابط
                navigator.clipboard.writeText(window.location.href).then(() => {
                    alert('تم نسخ رابط المحطة!');
                });
            }
        });

        DOM.playBtn.addEventListener('click', () => audioController.toggle());
        DOM.nextBtn.addEventListener('click', () => UIController.loadIndex((currentIndex + 1) % stations.length));
        DOM.prevBtn.addEventListener('click', () => UIController.loadIndex((currentIndex - 1 + stations.length) % stations.length));
        DOM.vol.addEventListener('input', e => DOM.audio.volume = e.target.value); 
        DOM.audio.addEventListener('error', () => audioController.handleError());

        const checkFavState = id => {
            const fav = savedStations.some(s => s.id === id);
            DOM.saveBtn.className = fav ? 'action-btn active-fav' : 'action-btn'; 
            DOM.saveBtn.innerHTML = fav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
        };

        DOM.saveBtn.addEventListener('click', () => {
            const current = isExternalFavPlaying ? savedStations.find(s => s.url === DOM.audio.src) : stations[currentIndex];
            if(!current) return;
            
            const stId = current.stationuuid || current.id;
            const existIdx = savedStations.findIndex(s => s.id === stId);
            
            if (existIdx > -1) {
                savedStations.splice(existIdx, 1); 
            } else {
                savedStations.push({ 
                    id: stId, 
                    name: current.name, 
                    url: current.url_resolved || current.url, 
                    img: current.favicon || current.img 
                });
            }
            localStorage.setItem('radio_saved_list', JSON.stringify(savedStations)); 
            checkFavState(stId); 
            renderFavorites();
        });

        const renderFavorites = () => {
            DOM.favList.innerHTML = savedStations.length ? '' : '<li style="text-align:center; color:var(--text-sub); margin-top:20px;">No saved stations.</li>';
            savedStations.forEach((f, i) => {
                const li = document.createElement('li'); 
                li.className = 'fav-item';
                li.innerHTML = `<div class="fav-item-content"><i class="fas fa-play-circle fav-play-icon"></i><div class="fav-info" title="${f.name}">${f.name || 'Unknown'}</div></div><button class="fav-remove" title="Remove"><i class="fas fa-trash-alt"></i></button>`;
                
                li.querySelector('.fav-item-content').addEventListener('click', () => {
                    DOM.favModal.classList.remove('open'); 
                    const idx = stations.findIndex(s => s.stationuuid === f.id);
                    if(idx > -1) { 
                        UIController.loadIndex(idx); 
                        audioController.play(); 
                    } else { 
                        UIController.loadExternalFav(f); 
                    }
                });
                
                li.querySelector('.fav-remove').addEventListener('click', e => {
                    e.stopPropagation(); 
                    savedStations.splice(i, 1); 
                    localStorage.setItem('radio_saved_list', JSON.stringify(savedStations));
                    renderFavorites(); 
                    
                    const activeId = isExternalFavPlaying ? f.id : (stations[currentIndex]?.stationuuid);
                    if (activeId === f.id) checkFavState(f.id);
                }); 
                
                DOM.favList.appendChild(li);
            });
        };

        DOM.openFavs.addEventListener('click', () => { 
            renderFavorites(); 
            DOM.favModal.classList.add('open'); 
        }); 
        
        DOM.closeFavs.addEventListener('click', () => DOM.favModal.classList.remove('open'));

        async function bootApp() {
            DOM.headerCountry.textContent = TARGET_COUNTRY || 'Global Radio';
            
            if(!TARGET_COUNTRY || TARGET_COUNTRY.length < 2) { 
                UIController.emptyState(); 
                DOM.loading.style.display = 'none'; 
                return; 
            }
            
            stations = await radioService.fetchByStr(TARGET_COUNTRY);
            
            if(stations.length) { 
                UIController.loadIndex(0); 
            } else { 
                UIController.emptyState(); 
            }
            DOM.loading.style.display = 'none';
        }
        
        bootApp();
    </script>
</body>
</html>
