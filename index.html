<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Radio</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red: #d32f2f;
            --red-dark: #b71c1c;
            --red-light: #ef5350;
            --red-glow: rgba(211, 47, 47, 0.25);
            --black: #0d0d0d;
            --black-light: #1a1a1a;
            --gray: #888;
            --gray-light: #aaa;
            --white: #f5f5f5;
            --paypal-blue: #0070ba;
            --paypal-hover: #005ea6;
            --radius: 32px;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--black);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: var(--white);
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 20%, rgba(211, 47, 47, 0.06), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .app-card {
            width: 100%;
            max-width: 420px;
            background: var(--black-light);
            border-radius: var(--radius);
            padding: 32px 24px 28px;
            box-shadow: var(--shadow), 0 0 0 1px rgba(211, 47, 47, 0.15);
            position: relative;
            z-index: 1;
            border: 1px solid rgba(211, 47, 47, 0.15);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .app-card:hover {
            border-color: rgba(211, 47, 47, 0.3);
            box-shadow: var(--shadow), 0 0 30px rgba(211, 47, 47, 0.05);
        }

        /* الشعار */
        .logo-frame {
            width: 110px;
            height: 110px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1a0a0a, #0a0202);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            color: var(--red);
            box-shadow: 0 0 30px rgba(211, 47, 47, 0.1), inset 0 0 20px rgba(211, 47, 47, 0.03);
            overflow: hidden;
            border: 2px solid rgba(211, 47, 47, 0.2);
            transition: 0.3s;
        }

        .logo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .logo-frame i {
            filter: drop-shadow(0 0 12px rgba(211, 47, 47, 0.2));
        }

        /* العناوين */
        .station-name {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: -0.2px;
        }

        .station-meta {
            font-size: 13px;
            font-weight: 400;
            color: var(--gray);
            text-align: center;
            margin-bottom: 24px;
        }

        /* أزرار التحكم الرئيسية (السابقة/تشغيل/التالية) */
        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2px;
            margin-bottom: 18px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--gray);
            font-size: 22px;
            cursor: pointer;
            transition: 0.25s;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
        }

        .ctrl-btn:hover {
            color: #fff;
            background: rgba(211, 47, 47, 0.08);
            border-color: rgba(211, 47, 47, 0.15);
        }

        .ctrl-btn.play-btn {
            width: 70px;
            height: 70px;
            background: var(--red);
            color: #fff;
            font-size: 28px;
            box-shadow: 0 8px 24px rgba(211, 47, 47, 0.25);
            border: none;
        }

        .ctrl-btn.play-btn:hover {
            background: var(--red-light);
            transform: scale(1.04);
            box-shadow: 0 8px 30px rgba(211, 47, 47, 0.4);
        }

        .ctrl-btn:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* أزرار الصوت (رفع/خفض) */
        .volume-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .vol-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--gray-light);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s;
        }

        .vol-btn:hover {
            background: rgba(211, 47, 47, 0.1);
            border-color: rgba(211, 47, 47, 0.2);
            color: #fff;
        }

        .vol-btn:active {
            transform: scale(0.94);
        }

        .volume-indicator {
            font-size: 14px;
            font-weight: 600;
            color: var(--gray);
            min-width: 44px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .volume-indicator i {
            margin-left: 4px;
            font-size: 13px;
            color: var(--red);
        }

        /* مشغل الصوت */
        audio {
            width: 100%;
            height: 42px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.4);
            outline: none;
            margin-top: 2px;
            border: 1px solid rgba(211, 47, 47, 0.08);
        }
        audio::-webkit-media-controls-panel {
            background: rgba(0, 0, 0, 0.5);
        }
        audio::-webkit-media-controls-play-button {
            background: var(--red);
            border-radius: 50%;
        }

        /* زر PayPal */
        .paypal-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--paypal-blue);
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            transition: 0.25s;
            border: none;
            box-shadow: 0 4px 12px rgba(0, 112, 186, 0.25);
            margin-top: 18px;
            letter-spacing: 0.3px;
        }

        .paypal-btn:hover {
            background: var(--paypal-hover);
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 112, 186, 0.35);
        }

        .paypal-btn i {
            font-size: 20px;
        }

        .footer-row {
            display: flex;
            justify-content: center;
            margin-top: 4px;
        }

        .footer-note {
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 12px;
            font-weight: 400;
            color: #555;
            text-align: center;
            letter-spacing: 0.3px;
        }

        .footer-note i {
            margin-left: 6px;
            color: var(--red);
            font-size: 11px;
        }

        /* تحميل */
        #loading {
            position: fixed;
            inset: 0;
            background: var(--black);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            z-index: 999;
            color: var(--gray);
            font-size: 14px;
        }
        #loading i {
            font-size: 34px;
            color: var(--red);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 460px) {
            .app-card {
                padding: 22px 16px 24px;
            }
            .logo-frame {
                width: 90px;
                height: 90px;
                font-size: 34px;
            }
            .station-name {
                font-size: 18px;
            }
            .ctrl-btn.play-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
            .vol-btn {
                width: 38px;
                height: 38px;
                font-size: 15px;
            }
            .paypal-btn {
                padding: 10px 22px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div id="loading">
        <i class="fas fa-spinner"></i>
        <span>Loading stations...</span>
    </div>

    <div class="app-card">

        <div class="logo-frame" id="stationLogo">
            <i class="fas fa-radio"></i>
        </div>

        <div class="station-name" id="stationTitle">Select a country</div>
        <div class="station-meta" id="stationSub">Use the bot to set your country</div>

        <!-- أزرار التحكم الرئيسية -->
        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-step-forward"></i></button>
        </div>

        <!-- أزرار الصوت (رفع/خفض) مع مؤشر -->
        <div class="volume-controls">
            <button class="vol-btn" id="volDown"><i class="fas fa-volume-down"></i></button>
            <span class="volume-indicator" id="volDisplay"><span id="volValue">50</span><i class="fas fa-percent"></i></span>
            <button class="vol-btn" id="volUp"><i class="fas fa-volume-up"></i></button>
        </div>

        <audio id="audioPlayer" preload="metadata"></audio>

        <!-- زر PayPal -->
        <div class="footer-row">
            <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="paypal-btn">
                <i class="fab fa-paypal"></i> Support Developer
            </a>
        </div>

        <div class="footer-note">
            <i class="fas fa-chevron-right"></i> Change country via bot <i class="fas fa-chevron-left"></i>
        </div>

    </div>

    <script>
        // ============================================================
        // Telegram WebApp
        // ============================================================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ============================================================
        // DOM refs
        // ============================================================
        const loading = document.getElementById('loading');
        const logo = document.getElementById('stationLogo');
        const title = document.getElementById('stationTitle');
        const sub = document.getElementById('stationSub');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const volUp = document.getElementById('volUp');
        const volDown = document.getElementById('volDown');
        const volValue = document.getElementById('volValue');
        const audio = document.getElementById('audioPlayer');

        // ============================================================
        // Get country name
        // ============================================================
        const params = new URLSearchParams(window.location.search);
        const countryName = params.get('name') || '';

        // ============================================================
        // State
        // ============================================================
        let stations = [];
        let currentIndex = 0;
        let isPlaying = false;
        let hasValidCountry = false;

        // ============================================================
        // Volume control
        // ============================================================
        let currentVolume = 50; // 0-100

        function updateVolume(value) {
            currentVolume = Math.min(100, Math.max(0, value));
            audio.volume = currentVolume / 100;
            volValue.textContent = currentVolume;
        }

        // ============================================================
        // Fetch stations
        // ============================================================
        async function fetchRadioStations(name) {
            if (!name) throw new Error('No country name.');
            const url =
                `https://de1.api.radio-browser.info/json/stations/byname/${encodeURIComponent(name)}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error('Network error.');
            const data = await resp.json();
            const filtered = data.filter(s =>
                s.country && s.country.toLowerCase().includes(name.toLowerCase())
            );
            return filtered.length ? filtered : data;
        }

        // ============================================================
        // UI Functions
        // ============================================================

        function setEmptyState(msg) {
            title.textContent = msg || 'Select a country';
            sub.textContent = 'Use the bot to set your country';
            logo.innerHTML = `<i class="fas fa-radio"></i>`;
            audio.src = '';
            playBtn.disabled = true;
            prevBtn.disabled = true;
            nextBtn.disabled = true;
            hasValidCountry = false;
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function loadStation(index, autoPlay = false) {
            if (!stations.length || !hasValidCountry) {
                setEmptyState();
                return;
            }
            const item = stations[index];
            title.textContent = item.name || 'Untitled';
            sub.textContent = `${index + 1} of ${stations.length}`;

            if (item.favicon) {
                logo.innerHTML = `<img src="${item.favicon}" alt="logo" />`;
            } else {
                logo.innerHTML = `<i class="fas fa-radio"></i>`;
            }

            audio.src = item.url_resolved || item.url || '';
            audio.load();

            playBtn.disabled = false;
            prevBtn.disabled = false;
            nextBtn.disabled = false;

            // إذا كانت المحطة السابقة مشغلة أو طلبنا التشغيل التلقائي
            if (autoPlay || isPlaying) {
                audio.play().catch(() => {});
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
            } else {
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    playIcon.className = 'fas fa-play';
                }
            }
        }

        function togglePlay() {
            if (!hasValidCountry || !audio.src) return;
            if (audio.paused) {
                audio.play().catch(() => {});
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
            } else {
                audio.pause();
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            }
        }

        function nextStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            // نمرر true لتشغيل تلقائي إذا كانت هناك محطة مشغلة
            loadStation(currentIndex, true);
        }

        function prevStation() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex, true);
        }

        // ============================================================
        // Init
        // ============================================================

        async function initRadio() {
            const name = countryName.trim();
            if (!name) {
                setEmptyState('No country selected');
                loading.style.display = 'none';
                return;
            }

            loading.style.display = 'flex';
            try {
                const data = await fetchRadioStations(name);
                if (data && data.length > 0) {
                    stations = data;
                    hasValidCountry = true;
                    currentIndex = 0;
                    loadStation(0, false);
                } else {
                    setEmptyState('No stations found');
                    sub.textContent = 'Try a different country';
                }
            } catch (err) {
                console.error(err);
                setEmptyState('Loading error');
                sub.textContent = 'Please try again later';
            } finally {
                loading.style.display = 'none';
            }
        }

        // ============================================================
        // Event listeners
        // ============================================================

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextStation);
        prevBtn.addEventListener('click', prevStation);

        // أحداث الصوت
        volUp.addEventListener('click', () => updateVolume(currentVolume + 10));
        volDown.addEventListener('click', () => updateVolume(currentVolume - 10));

        // ضبط مستوى الصوت عند تحميل الصفحة
        updateVolume(currentVolume);

        // تحديث أيقونة التشغيل/الإيقاف عند تغير حالة الصوت
        audio.addEventListener('pause', () => {
            isPlaying = false;
            playIcon.className = 'fas fa-play';
        });
        audio.addEventListener('play', () => {
            isPlaying = true;
            playIcon.className = 'fas fa-pause';
        });

        // عند انتهاء المحطة، ننتقل للتالية تلقائياً (ميزة إضافية)
        audio.addEventListener('ended', () => {
            if (stations.length > 0) {
                nextStation();
            }
        });

        // Start
        initRadio();
    </script>
</body>
</html>
