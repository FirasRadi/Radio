<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Radio Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px;
        }

        /* --- Main Card --- */
        .player-card {
            background: #1e293b;
            width: 100%; max-width: 400px;
            border-radius: 25px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* --- Header / Fav List Button --- */
        .header { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .icon-btn {
            background: rgba(255, 255, 255, 0.05); border: none; color: #94a3b8;
            width: 45px; height: 45px; border-radius: 50%;
            font-size: 18px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); color: #fff; }

        /* --- Station Info --- */
        .logo {
            width: 110px; height: 110px; margin: 0 auto 15px; border-radius: 50%;
            background: #0f172a; display: flex; align-items: center; justify-content: center;
            font-size: 40px; color: #3b82f6; overflow: hidden;
            border: 3px solid #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .station-name { font-size: 20px; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; direction: ltr; }
        .station-country { font-size: 14px; color: #94a3b8; margin-bottom: 25px; }

        /* --- Main Controls --- */
        .controls { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 25px; direction: ltr; }
        .ctrl-btn { background: none; border: none; color: #f8fafc; font-size: 22px; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover:not(:disabled) { color: #3b82f6; }
        .play-btn { width: 65px; height: 65px; background: #3b82f6; border-radius: 50%; font-size: 24px; color: #fff; box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4); }
        .play-btn:hover:not(:disabled) { background: #2563eb; color: #fff; transform: scale(1.05); }
        .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* --- Actions (Volume, Record, Save) --- */
        .actions-bar {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); padding: 15px 20px; border-radius: 15px; margin-bottom: 20px;
        }
        
        .volume-container { display: flex; align-items: center; gap: 12px; width: 55%; direction: ltr; }
        .volume-container input { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
        .volume-container input::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #3b82f6; cursor: pointer; }

        .action-btns { display: flex; gap: 15px; }
        .action-btn { background: none; border: none; font-size: 20px; color: #94a3b8; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { color: #fff; }
        .action-btn.active-fav { color: #ef4444; } 
        .action-btn.recording { color: #ef4444; animation: pulse 1s infinite alternate; } 

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 100% { opacity: 0.5; transform: scale(1.1); } }

        /* --- Footer Note --- */
        .footer-note { font-size: 13px; color: #64748b; margin-top: 10px; }

        /* --- Favorites Modal --- */
        .modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 200;
            display: none; flex-direction: column; padding: 20px; backdrop-filter: blur(5px);
        }
        .modal.open { display: flex; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: 700; font-size: 20px; color: #fff; }
        .close-modal { background: none; border: none; color: #94a3b8; font-size: 24px; cursor: pointer; }
        .fav-list { flex: 1; overflow-y: auto; list-style: none; }
        .fav-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .fav-info { flex: 1; text-align: left; direction: ltr; cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding-right: 15px; font-weight: 600; }
        .fav-remove { color: #ef4444; background: rgba(239, 68, 68, 0.1); border: none; width: 35px; height: 35px; border-radius: 8px; font-size: 16px; cursor: pointer; }

        /* --- PayPal Button & Circular Text --- */
        .paypal-wrapper {
            position: fixed; bottom: 20px; right: 20px;
            width: 120px; height: 120px;
            display: flex; align-items: center; justify-content: center;
            z-index: 100;
        }
        .paypal-svg { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .paypal-svg text { font-size: 12.5px; fill: #94a3b8; font-family: monospace; letter-spacing: 1px; font-weight: bold; }
        .donate-btn {
            width: 50px; height: 50px; background: #0070ba; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 22px; text-decoration: none;
            box-shadow: 0 5px 15px rgba(0, 112, 186, 0.4);
            position: relative; z-index: 2; transition: 0.3s;
        }
        .donate-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0, 112, 186, 0.6); }

        #loading { position: fixed; inset: 0; background: #0f172a; z-index: 999; display: flex; flex-direction: column; gap: 15px; align-items: center; justify-content: center; color: #3b82f6; font-size: 18px; font-weight: bold; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(59, 130, 246, 0.3); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loading">
        <div class="spinner"></div>
        جاري جلب المحطات...
    </div>

    <!-- PayPal Button with Circular Text -->
    <div class="paypal-wrapper">
        <svg class="paypal-svg" viewBox="0 0 100 100">
            <path id="curve" d="M 10 55 A 40 40 0 0 1 90 55" fill="transparent" />
            <text>
                <textPath href="#curve" startOffset="50%" text-anchor="middle">ˢᵘᵖᵖᵒʳᵗ ᵇᵒᵗ ᵈᵉᵛᵉˡᵒᵖᵉʳ</textPath>
            </text>
        </svg>
        <a href="https://www.paypal.com/qrcodes/p2pqrc/JE8TVPBFXA566" target="_blank" class="donate-btn">
            <i class="fab fa-paypal"></i>
        </a>
    </div>

    <!-- Main Player -->
    <div class="player-card">
        <div class="header">
            <button class="icon-btn" id="openFavsBtn" title="المحطات المحفوظة"><i class="fas fa-list-ul"></i></button>
        </div>

        <div class="logo" id="stationLogo"><i class="fas fa-music"></i></div>
        <div class="station-name" id="stationTitle">...</div>
        <div class="station-country" id="stationSub">...</div>

        <div class="controls">
            <button class="ctrl-btn" id="prevBtn" disabled><i class="fas fa-backward"></i></button>
            <button class="ctrl-btn play-btn" id="playBtn" disabled><i class="fas fa-play" id="playIcon"></i></button>
            <button class="ctrl-btn" id="nextBtn" disabled><i class="fas fa-forward"></i></button>
        </div>

        <div class="actions-bar">
            <!-- Volume Slider -->
            <div class="volume-container">
                <i class="fas fa-volume-down" style="color:#94a3b8; font-size:14px;"></i>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                <i class="fas fa-volume-up" style="color:#94a3b8; font-size:16px;"></i>
            </div>
            
            <div class="action-btns">
                <!-- Record Button -->
                <button class="action-btn" id="recordBtn" title="تسجيل المقطع"><i class="fas fa-microphone"></i></button>
                <!-- Save Fav Button -->
                <button class="action-btn" id="saveFavBtn" title="حفظ المحطة"><i class="fas fa-heart"></i></button>
            </div>
        </div>

        <div class="footer-note">تغيير الدولة يتم في دردشة البوت.</div>

        <!-- Audio Element (Returned exactly to your original code to guarantee playback) -->
        <audio id="audioPlayer" preload="metadata"></audio>
    </div>

    <!-- Favorites Modal -->
    <div class="modal" id="favModal">
        <div class="modal-header">
            <span>المحطات المحفوظة</span>
            <button class="close-modal" id="closeFavsBtn"><i class="fas fa-times"></i></button>
        </div>
        <ul class="fav-list" id="favList"></ul>
    </div>

    <script>
        // Telegram Init
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // DOM Elements
        var ui = {
            loading: document.getElementById('loading'),
            logo: document.getElementById('stationLogo'),
            title: document.getElementById('stationTitle'),
            sub: document.getElementById('stationSub'),
            playBtn: document.getElementById('playBtn'),
            playIcon: document.getElementById('playIcon'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            audio: document.getElementById('audioPlayer'),
            vol: document.getElementById('volumeSlider'),
            saveBtn: document.getElementById('saveFavBtn'),
            recordBtn: document.getElementById('recordBtn'),
            openFavs: document.getElementById('openFavsBtn'),
            closeFavs: document.getElementById('closeFavsBtn'),
            favModal: document.getElementById('favModal'),
            favList: document.getElementById('favList')
        };

        // Extraction of Country Name (Just like your original code)
        var params = new URLSearchParams(window.location.search);
        var urlName = params.get('name') || '';
        var startParam = tg.initDataUnsafe.start_param || '';
        var tgName = startParam.replace(/_/g, ' ');
        var countryName = tgName || urlName;

        // State Variables
        var stations = [];
        var currentIndex = 0;
        var isPlaying = false;
        var savedStations = JSON.parse(localStorage.getItem('radio_saved_list')) || [];
        
        // Recording State
        var mediaRecorder;
        var recordedChunks = [];
        var isRecording = false;

        // --- Core Fetching Logic (Identical to your original code) ---
        async function fetchRadio(name) {
            if (!name) throw new Error('No country');
            var url = "https://de1.api.radio-browser.info/json/stations/bycountry/" + encodeURIComponent(name) + "?order=votes&reverse=true";
            var resp = await fetch(url);
            if (!resp.ok) throw new Error('Fetch failed');
            var data = await resp.json();
            return data.filter(function(s) { 
                var u = s.url_resolved || s.url;
                return u && u.indexOf('https://') === 0; 
            });
        }

        async function init() {
            var name = countryName.trim();
            if (!name) {
                setEmptyState();
                return;
            }
            
            try {
                var data = await fetchRadio(name);
                if (data.length) {
                    stations = data;
                    currentIndex = 0;
                    loadStation(0);
                } else {
                    // Fallback to byname exactly like your original code
                    var fallbackUrl = "https://de1.api.radio-browser.info/json/stations/byname/" + encodeURIComponent(name) + "?order=votes&reverse=true";
                    var fallbackResp = await fetch(fallbackUrl);
                    var fallbackData = await fallbackResp.json();
                    var validFallback = fallbackData.filter(function(s) { 
                        var u = s.url_resolved || s.url;
                        return u && u.indexOf('https://') === 0; 
                    });
                    
                    if(validFallback.length) {
                        stations = validFallback;
                        currentIndex = 0;
                        loadStation(0);
                    } else {
                        setEmptyState();
                    }
                }
            } catch (e) {
                setEmptyState();
            }
            ui.loading.style.display = 'none';
        }

        function setEmptyState() {
            ui.title.textContent = 'لا توجد محطات';
            ui.sub.textContent = 'يرجى إدخال دولة صحيحة';
            ui.logo.innerHTML = '<i class="fas fa-times-circle" style="color:#ef4444;"></i>';
            ui.loading.style.display = 'none';
        }

        // --- Load & Play Logic ---
        function loadStation(index) {
            if (!stations.length) return;
            var item = stations[index];
            
            ui.title.textContent = item.name || 'محطة غير معروفة';
            ui.sub.textContent = countryName.toUpperCase() || 'RADIO';
            
            if (item.favicon) {
                var img = new Image();
                img.src = item.favicon;
                img.onload = function() { ui.logo.innerHTML = ''; ui.logo.appendChild(img); };
                img.onerror = function() { ui.logo.innerHTML = '<i class="fas fa-music"></i>'; };
            } else {
                ui.logo.innerHTML = '<i class="fas fa-music"></i>';
            }
            
            ui.audio.src = item.url_resolved || item.url || '';
            ui.audio.load();
            ui.audio.volume = ui.vol.value;
            
            ui.playBtn.disabled = false;
            ui.prevBtn.disabled = false;
            ui.nextBtn.disabled = false;
            
            checkFavState(item.stationuuid);
            
            if (isPlaying) {
                playAudio();
            }
            
            if (isRecording) stopRecording();
        }

        function playAudio() {
            var playPromise = ui.audio.play();
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    isPlaying = true;
                    ui.playIcon.className = 'fas fa-pause';
                }).catch(function() {
                    isPlaying = false;
                    ui.playIcon.className = 'fas fa-play';
                });
            }
        }

        function togglePlay() {
            if (!ui.audio.src) return;
            if (ui.audio.paused) {
                playAudio();
            } else {
                ui.audio.pause();
                isPlaying = false;
                ui.playIcon.className = 'fas fa-play';
            }
        }

        ui.playBtn.addEventListener('click', togglePlay);
        ui.nextBtn.addEventListener('click', function() {
            if (!stations.length) return;
            currentIndex = (currentIndex + 1) % stations.length;
            loadStation(currentIndex);
        });
        ui.prevBtn.addEventListener('click', function() {
            if (!stations.length) return;
            currentIndex = (currentIndex - 1 + stations.length) % stations.length;
            loadStation(currentIndex);
        });
        ui.vol.addEventListener('input', function(e) {
            ui.audio.volume = e.target.value;
        });

        // --- Favorites System ---
        function checkFavState(uuid) {
            var isFav = savedStations.some(function(s) { return s.id === uuid; });
            ui.saveBtn.className = isFav ? 'action-btn active-fav' : 'action-btn';
            ui.saveBtn.innerHTML = isFav ? '<i class="fas fa-heart"></i>' : '<i class="far fa-heart"></i>';
        }

        ui.saveBtn.addEventListener('click', function() {
            if (!stations.length) return;
            var station = stations[currentIndex];
            var idx = savedStations.findIndex(function(s) { return s.id === station.stationuuid; });
            
            if (idx > -1) {
                savedStations.splice(idx, 1);
            } else {
                savedStations.push({ id: station.stationuuid, name: station.name, url: station.url_resolved || station.url, img: station.favicon });
            }
            localStorage.setItem('radio_saved_list', JSON.stringify(savedStations));
            checkFavState(station.stationuuid);
            renderFavorites();
        });

        function renderFavorites() {
            ui.favList.innerHTML = '';
            if(savedStations.length === 0) {
                ui.favList.innerHTML = '<li style="text-align:center; color:#94a3b8; margin-top:20px;">لا توجد محطات محفوظة</li>';
                return;
            }
            
            savedStations.forEach(function(fav, i) {
                var li = document.createElement('li');
                li.className = 'fav-item';
                li.innerHTML = '<div class="fav-info">' + (fav.name || 'محطة') + '</div><button class="fav-remove" title="إزالة"><i class="fas fa-trash"></i></button>';
                
                li.querySelector('.fav-info').addEventListener('click', function() {
                    stations = [fav]; // Load single station to play
                    currentIndex = 0;
                    loadStation(0);
                    playAudio();
                    ui.favModal.classList.remove('open');
                });
                
                li.querySelector('.fav-remove').addEventListener('click', function() {
                    savedStations.splice(i, 1);
                    localStorage.setItem('radio_saved_list', JSON.stringify(savedStations));
                    renderFavorites();
                    if(stations[currentIndex] && stations[currentIndex].stationuuid === fav.id) checkFavState(fav.id);
                });
                
                ui.favList.appendChild(li);
            });
        }

        ui.openFavs.addEventListener('click', function() { renderFavorites(); ui.favModal.classList.add('open'); });
        ui.closeFavs.addEventListener('click', function() { ui.favModal.classList.remove('open'); });

        // --- Recording System ---
        function stopRecording() {
            if(mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            isRecording = false;
            ui.recordBtn.classList.remove('recording');
        }

        ui.recordBtn.addEventListener('click', function() {
            if (isRecording) {
                stopRecording();
            } else {
                if(ui.audio.paused) return alert("الرجاء تشغيل المحطة أولاً قبل التسجيل.");
                
                try {
                    // Attempt to capture stream
                    var stream = ui.audio.captureStream ? ui.audio.captureStream() : (ui.audio.mozCaptureStream ? ui.audio.mozCaptureStream() : null);
                    if (!stream) throw new Error("Capture not supported");
                    
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = function() {
                        if(recordedChunks.length === 0) return;
                        var blob = new Blob(recordedChunks, { type: 'audio/webm' });
                        var url = URL.createObjectURL(blob);
                        var a = document.createElement('a');
                        a.href = url;
                        a.download = 'Radio_Record_' + Date.now() + '.webm';
                        document.body.appendChild(a);
                        a.click();
                        URL.revokeObjectURL(url);
                        recordedChunks = [];
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    ui.recordBtn.classList.add('recording');
                } catch (e) {
                    alert("نعتذر، المتصفح يمنع تسجيل هذه المحطة بسبب حقوق النشر (CORS) المطبقة من سيرفر الإذاعة.");
                    isRecording = false;
                    ui.recordBtn.classList.remove('recording');
                }
            }
        });

        // Start
        init();
    </script>
</body>
</html>
